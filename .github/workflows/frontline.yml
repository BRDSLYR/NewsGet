name: Fetch Frontline (Current Issue)

on:
  schedule:
    # 12:00 IST on the 1st and 15th of each month = 01:30 UTC
    - cron: '30 4 1 * *'
    - cron: '30 4 15 * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: pip install requests beautifulsoup4 "ebooklib==0.18" lxml

      - name: Fetch Frontline (current issue)
        run: |
          mkdir -p output
          DISPLAY_DATE=$(date +'%-d %b %Y')
          echo "Checking for new Frontline issue on: $DISPLAY_DATE"
          python scripts/fetch_frontline.py "" "output/frontline-latest.epub"
          sed "s/{{LAST_UPDATED}}/${DISPLAY_DATE}/" scripts/frontline-index.html > output/index.html
          ls -lh output/

      - name: Publish to GitHub Pages (gh-pages branch)
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: gh-pages
          folder: output
          target-folder: frontline
          clean: false
