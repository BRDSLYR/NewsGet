Foreign", "page": "16", "teaser": "At least 930 people, including 36 health workers, have died in Congo’s Ebola outbreak, the country’s Ministry of Health said on Monday, with 37 new deaths recor...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tEbola death toll in Congo risesto 930, including health workers\n</h1><div class=\"article-picture\"><div class=\"picture verticle\"><img alt=\"Ebola death toll in Congo risesto 930, including health workers\" class=\"lazy\" data-device-variant=\"FREE~FREE~FREE~FREE\" data-src-template=\"https://eimg.thgim.com/ccidist-ws/th/th_delhi/issues/195330/OPS/Public/GCQG9E8C6.1+G6EG9G3UI.1.jpg\" src=\"../images/ch0095_001.jpg\" title=\"Ebola death toll in Congo risesto 930, including health workers\"/></div><figcaption class=\"caption\">\n                                \n  \n   \n    REUTERS\n   \n  \n \n                            </figcaption></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>At least 930 people, including 36 health workers, have died in Congo’s Ebola outbreak, the country’s Ministry of Health said on Monday, with 37 new deaths recorded between Friday and Saturday, one of the highest totals. There is no approved vaccine for the Bundibugyo virus responsible for the current outbreak. <span class=\"tagline_credit\" edition=\"EPaper\" layoutdesk=\"TH_Foreign\" multiline=\"0\" section=\"A\" zone=\"Delhi\">AP</span></p><p></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 95, "title": "Trump dismisses Mamdani’s threat to arrest Netanyahu in New York", "section": "Foreign", "page": "16", "teaser": "U.S. President Donald Trump on Monday vowed that Israeli Prime Minister Benjamin Netanyahu would not face arrest at a UN summit in New York, after the city’s Ma...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tTrump dismisses Mamdani’s threat to arrest Netanyahu in New York\n</h1><div class=\"article-picture\"><div class=\"picture verticle\"><img alt=\"Trump dismisses Mamdani’s threat to arrest Netanyahu in New York\" class=\"lazy\" data-device-variant=\"FREE~FREE~FREE~FREE\" data-src-template=\"https://eimg.thgim.com/ccidist-ws/th/th_delhi/issues/195330/OPS/Public/GCQG9E8C6.1+G6EG9G3UH.1.jpg\" src=\"../images/ch0096_001.jpg\" title=\"Trump dismisses Mamdani’s threat to arrest Netanyahu in New York\"/></div><figcaption class=\"caption\">\n                                \n  \n   \n    AP\n   \n  \n \n                            </figcaption></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>U.S. President Donald Trump on Monday vowed that Israeli Prime Minister Benjamin Netanyahu would not face arrest at a UN summit in New York, after the city’s Mayor Zohran Mamdani said he was investigating the move. The International Criminal Court in 2024 issued arrest warrant for Mr. Netanyahu over alleged war crimes. <span class=\"tagline_credit\" edition=\"EPaper\" layoutdesk=\"TH_Foreign\" multiline=\"1\" section=\"A\" zone=\"Delhi\">AFP</span></p><p></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 96, "title": "Torres the hero as Spanish Armada sinks Argentina", "section": "Sports", "page": "17", "teaser": "The substitute breaches the defending champion’s dogged defence in extra-time to win a second global crown for La Roja; Emiliano’s heroics not enough to save the day for the South Americans", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tTorres the hero as Spanish Armada sinks Argentina\n</h1><div class=\"author\"><div class=\"author-name\">Ayon Sengupta</div></div><div class=\"dateLine\"><div class=\"dateline\">New York</div></div><h2 class=\"sub-title\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n  The substitute breaches the defending champion’s dogged defence in extra-time to win a second global crown for La Roja; Emiliano’s heroics not enough to save the day for the South Americans\n</h2><div class=\"article-picture\"><div class=\"picture verticle\"><img alt=\"Torres the hero as Spanish Armada sinks Argentina\" class=\"lazy\" data-device-variant=\"FREE~FREE~FREE~FREE\" data-src-template=\"https://eimg.thgim.com/ccidist-ws/th/th_delhi/issues/195330/OPS/Public/GCQG9E8C7.1+G6EG9G3TV.1.jpg\" src=\"../images/ch0097_001.jpg\" title=\"Torres the hero as Spanish Armada sinks Argentina\"/></div><figcaption class=\"caption\">\n                                \n  \n   \n    Worthy winner: Spain didn’t give Argentina an inch, dominating the summit clash from start to finish.Getty ImagesHector Vivas - FIFA\n   \n  \n \n                            </figcaption></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p><span class=\"drop_initial\" edition=\"EPaper\" layoutdesk=\"Sports\" multiline=\"0\" section=\"A\" zone=\"Delhi\"></span>There are defeats that arrive in a single devastating blow. Others unfold so gradually that the victim barely notices the danger until the escape is no longer possible.</p><p>For more than two hours inside the MetLife Stadium on Sunday, Luis de la Fuente’s side tightened its grip around Argentina as every ball seemed to reach only the men in red. Playing this Spanish team must feel like being trapped in the coils of a Burmese python. Each time an opponent exhales, the grip tightens a little more, steadily squeezing away space, options and hope. Every unguarded patch of grass is occupied and every passing lane narrowed until the opposition is starved of air and ideas alike.</p><p>In the final, Spain was quick to strike the rhythm that had carried it through this World Cup. Rodri and Fabian Ruiz monopolised possession, forcing Argentina deeper into its own half as Lamine Yamal and Dani Olmo began probing for openings. Within minutes, Yamal had slipped a deflected pass towards Olmo, whose return ball released the Barcelona winger, but Emiliano Martinez was alert enough to smother the effort.</p><p>Argentina struggled to escape Spain’s suffocating press and looked instead for moments in transition. Julian Alvarez’s early through ball briefly released Lionel Messi behind Spain’s high defensive line, but Unai Simon sprinted out from his goal to snuff out the danger before the Argentine captain could reach its end.</p><p>The pressure forced Lionel Scaloni into an early reshuffle. Lisandro Martinez, already booked and struggling physically after repeatedly stretching to contain Spain’s fluid movement, made way for Nicolas Otamendi as Argentina searched for greater stability at the heart of its defence.</p><p>The first half unfolded entirely on Spain’s terms. Argentina failed to muster a single effort on goal or register a touch inside the Spanish penalty box. Yet for all its command of possession and territory, Spain failed to translate its superiority into clear-cut chances. It had controlled the contest but the scoreline did not reflect it.</p><p>Spain’s incursions into the Argentine penalty area increased as the game progressed. The players in blue and white, who had fought for every minute of this showpiece, were now surviving through sheer will, stretching every sinew to keep Spain at bay while clinging to the belief that a chance would eventually come their way.</p><p>Ferran Torres, introduced alongside Mikel Merino to sharpen Spain’s attack against Argentina’s reshaped defence, soon met a Yamal cutback with a glancing header that Emiliano gathered gratefully, having spilled the previous two strikes that had come his way.</p><p>With its back against the wall, Argentina defended with every man available. But it could find no route through Spain’s relentless press and no opportunity to launch the swift counterattacks that had carried it through much of the tournament.</p><p>The defending champion’s task became harder when Enzo Fernandez was sent off for a second bookable offence. Yet Argentina continued to resist. Emiliano flung himself to his left to keep out a curling Yamal free-kick and drag the contest into extra-time.</p><p>The goalkeeper, whose saves had crowned Argentina World champion four years earlier, was once again refusing to surrender the trophy. He tipped Nico Williams’s header onto the post before the Athletic Bilbao winger thought he had finally beaten him, only for the celebrations to be cut short by a foul from Merino in the build-up.</p><p>But even Martínez could only delay the inevitable. His moment of indecision, the first of an otherwise magnificent evening, allowed Williams to cushion a header back across goal and Torres crashed his finish beyond the stranded goalkeeper in the 106th minute.</p><p>At last, Spain had found the opening it had spent nearly two hours creating.</p><p>This was only the second World Cup meeting between two countries whose histories have long intertwined. The Atlantic, for generations, has carried language, literature and football between Spain and Argentina. But inside the MetLife Stadium there was no room for romance as Spain allowed Argentina neither space nor sentiment.</p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 97, "title": "Messi leaves the World Cup as its most enduring presence", "section": "Sports", "page": "17", "teaser": "For 120 minutes, Spain did what no other team at this World Cup had managed. It found a way to keep Lionel Messi quiet. The plan was simple in theory but brutal...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tMessi leaves the World Cup as its most enduring presence\n</h1><div class=\"author\"><div class=\"author-name\">Ayon Sengupta</div></div><div class=\"dateLine\"><div class=\"dateline\">New York</div></div><div class=\"article-picture\"><div class=\"picture verticle\"><img alt=\"Messi leaves the World Cup as its most enduring presence\" class=\"lazy\" data-device-variant=\"FREE~FREE~FREE~FREE\" data-src-template=\"https://eimg.thgim.com/ccidist-ws/th/th_delhi/issues/195330/OPS/Public/GCQG9E8C7.1+G6EG9G3TU.1.jpg\" src=\"../images/ch0098_001.jpg\" title=\"Messi leaves the World Cup as its most enduring presence\"/></div><figcaption class=\"caption\">\n                                \n  \n   \n    Fabled: No one can take away the imprint Messi has left on this tournament. Getty ImagesGetty Images\n   \n  \n \n                            </figcaption></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>For 120 minutes, Spain did what no other team at this World Cup had managed.</p><p>It found a way to keep Lionel Messi quiet.</p><p>The plan was simple in theory but brutally difficult in practice. Every time the 39-year-old drifted towards the right flank, another red shirt arrived. His every passing lane closed and every familiar slalom towards his left foot was met by bodies rather than space.</p><p>“The first idea was to keep Messi at bay,” Spain coach Luis de la Fuente admitted afterwards. He had learned his lesson when a 16-year-old Messi had terrorised his Sevilla team in an under-19 match in 2004.</p><p>But here, rather than man-marking the Argentine talisman, the Spanish coach looked at cutting the supply and isolating Messi. The Argentine captain managed only 15 touches in the first half and 54 across the entire final. There was no trademark curling finish, no defence-splitting pass, no decisive intervention.</p><p></p><p>It was here in MetLife in 2016, when Messi had missed in the Copa America final shootout against Chile and announced his international retirement before making a comeback 47 days later to complete his redemption arc.</p><p>Ten years later, he returned to the same stadium seeking one final crown, only for it to deny him again.</p><p>As Spain celebrated at the centre circle, Messi and his teammates walked towards the Argentina supporters gathered behind the southern goal. The applause that greeted them was as loud as anything heard all evening. Spain’s players, too, understood the moment.</p><p>Several, including Lamine Yamal, crossed the pitch to embrace Messi after the final whistle. Later, as Argentina climbed the podium to collect its runner-up medals, the new world champion formed a guard of honour. A few patted him on the back, Messi tried to smile, but the disappointment was hard to contain.</p><p>One match, however, cannot rewrite a career.</p><p>Messi leaves the World Cup as its most enduring presence with 34 appearances, 23 victories, 21 goals, 27 matches as captain, seven goals from outside the penalty area, 10 knockout-stage assists and, above all, the man who finally completed football’s greatest story by lifting the trophy in 2022. He remains the only player to score in every knockout round of a World Cup-winning campaign.</p><p>Spain may have denied him one final triumph, but no one can take away the imprint he has left on this tournament.</p><p>For generations to come, the World Cup’s story will be retold through many champions, but few names will echo as deeply as that of Lionel Messi’s.</p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 98, "title": "Spain was better and we accept it, says Argentina coach Scaloni", "section": "Sports", "page": "17", "teaser": "Lionel Scaloni admitted Spain deserved to be crowned the world champion but said he could not have asked for more from his Argentina players after their 0-1 ext...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tSpain was better and we accept it, says Argentina coach Scaloni\n</h1><div class=\"author\"><div class=\"author-name\">Ayon Sengupta</div></div><div class=\"dateLine\"><div class=\"dateline\">New York</div></div><div class=\"article-picture\"><div class=\"picture verticle\"><img alt=\"Spain was better and we accept it, says Argentina coach Scaloni\" class=\"lazy\" data-device-variant=\"FREE~FREE~FREE~FREE\" data-src-template=\"https://eimg.thgim.com/ccidist-ws/th/th_delhi/issues/195330/OPS/Public/GCQG9E8C7.1+G6EG9G3TS.1.jpg\" src=\"../images/ch0099_001.jpg\" title=\"Spain was better and we accept it, says Argentina coach Scaloni\"/></div><figcaption class=\"caption\">\n                                \n  \n   \n    Scaloni.REUTERSAGUSTIN MARCARIAN\n   \n  \n \n                            </figcaption></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>Lionel Scaloni admitted Spain deserved to be crowned the world champion but said he could not have asked for more from his Argentina players after their 0-1 extra-time loss in the World Cup final.</p><p></p><p>“I feel sad,” Scaloni said on Sunday. “They were better, that’s true, but I will have tremendous memories of what my players achieved. We are great in victory and must be so in defeat as well. We showed that we know how to lose. We lost, and we accept it.”</p><p>The Argentina coach thanked the squad that had carried the nation to a second successive World Cup final after another remarkable tournament. “Endless thanks to these players who once again took us to the final. If they give everything the way they did, it sets a great example for the people and for our country.”</p><p>Scaloni also paid tribute to Lionel Messi. “He’s 39 years old now. It was crystal clear for me that he was going to play until he decides not to,” Scaloni said.</p><p>“I hope everyone feels proud of him because he’s the best football player ever to set foot on a pitch. What he did during this World Cup was incredible.”</p><p>The 48-year-old then became visibly emotional while discussing his own future, with his contract due to expire later this year. “I will talk to the president. I think it’s only fair that I take this time for myself. In order to continue, you need to reset your mind. Creating a group like this again is very difficult.”</p><p>Scaloni paused, apologised to reporters and walked out of the press conference in tears, bringing an emotional end to Argentina’s reign as world champion.</p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 99, "title": "De la Fuente’s Spain keeps its ‘appointment with history’", "section": "Sports", "page": "17", "teaser": "Head coach Luis de la Fuente hailed his players after Spain defeated Argentina 1-0 in extra-time to win the World Cup on Sunday, saying that the triumph belonge...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tDe la Fuente’s Spain keeps its ‘appointment with history’\n</h1><div class=\"author\"><div class=\"author-name\">Ayon Sengupta</div></div><div class=\"dateLine\"><div class=\"dateline\">New York</div></div><div class=\"article-picture\"><div class=\"picture verticle\"><img alt=\"De la Fuente’s Spain keeps its ‘appointment with history’\" class=\"lazy\" data-device-variant=\"FREE~FREE~FREE~FREE\" data-src-template=\"https://eimg.thgim.com/ccidist-ws/th/th_delhi/issues/195330/OPS/Public/GCQG9E8C7.1+G6EG9G3TT.1.jpg\" src=\"../images/ch0100_001.jpg\" title=\"De la Fuente’s Spain keeps its ‘appointment with history’\"/></div><figcaption class=\"caption\">\n                                \n  \n   \n    De la Fuente.Getty ImagesRyan Pierse - FIFA\n   \n  \n \n                            </figcaption></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>Head coach Luis de la Fuente hailed his players after Spain defeated Argentina 1-0 in extra-time to win the World Cup on Sunday, saying that the triumph belonged to a generation that embraced collective sacrifice and wrote its place in football history.</p><p>“I never thought of anything like this,” de la Fuente said. “I always just wanted joy in moments. When you look back at this process, I would not have achieved anything without these players. The journey with this raw material, this talent... Spanish footballers, the way they compete. These players are amazing.”</p><p>The 65-year-old dedicated the victory to his squad and coaching staff, insisting that the players were the true architects of Spain’s second World Cup triumph. “First of all, I would like to thank the staff and everyone else who worked with us. The players are the true protagonists. We feel satisfaction, pride. It’s such an honour to be the coach of these amazing players.”</p><p>Before kick-off, de la Fuente reminded his squad of the occasion awaiting them. “I said, ‘Gentlemen, we have an appointment with history, and we want to be there first.’”</p><p></p><p>The Spain manager also singled out teenage star Lamine Yamal for praise, highlighting his willingness to put the team above individual glory. “I’d like to express my sincere gratitude to Lamine for becoming a great footballer. He’s really sacrificed for the collective good. In my opinion, he played a great World Cup.”</p><p>Asked what remained for a team that has now conquered Europe and the world, de la Fuente smiled. “Once we finished the game, there were footballers who said, ‘Now what else is there to win?’ The answer is the next match in September. This team is relentless”.</p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 100, "title": "A legend built without its decorated kings", "section": "Sports", "page": "17", "teaser": "Somewhere between Ferran Torres’ winner and the trophy lift, 12 club badges got to claim a piece of history. Spain’s World Cup title was stitched together by cl...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tA legend built without its decorated kings\n</h1><div class=\"author\"><div class=\"author-name\">R.K. Arjun</div></div><div class=\"article-picture\"><div class=\"picture verticle\"><img alt=\"A legend built without its decorated kings\" class=\"lazy\" data-device-variant=\"FREE~FREE~FREE~FREE\" data-src-template=\"https://eimg.thgim.com/ccidist-ws/th/th_delhi/issues/195330/OPS/Public/GCQG9E8C7.1+G6EG9G3TR.1.jpg\" src=\"../images/ch0101_001.jpg\" title=\"A legend built without its decorated kings\"/></div><figcaption class=\"caption\">\n                                \n  \n   \n    Cucurella... it’s real!REUTERSHannah McKay\n   \n  \n \n                            </figcaption></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>Somewhere between Ferran Torres’ winner and the trophy lift, 12 club badges got to claim a piece of history. Spain’s World Cup title was stitched together by clubs, its academies and leagues spread across Europe, and the breakdown tells a story as interesting as the triumph itself.</p><p>LaLiga dominated the numbers, with 17 of the 26 players coming from the Spanish top division. The Premier League supplied seven, while the Bundesliga and Ligue 1 contributed one each, reflecting how Spanish football has kept its biggest talents close to home even as the English top flight’s financial gravity pulls them elsewhere.</p><p>Barcelona led the club representation with nine players, from Lamine Yamal and Pedri to Pau Cubarsi, underlining a squad heavily shaped by La Masia’s production line.</p><p>Atletico Madrid, Athletic Bilbao, and Arsenal each sent three players.</p><p>Perhaps the most striking detail, though, was who was missing. For the first time in Spain’s World Cup history, not a single Real Madrid player featured in the squad. Marc Cucurella’s move to Real from Chelsea, confirmed during the tournament, added to the irony.</p><p></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 101, "title": "We always believed in ourselves and our football, says Torres", "section": "Sports", "page": "17", "teaser": "Ferran Torres dedicated the World Cup triumph to his compatriots. “The goal belongs to 47 million people. When you are up against Lionel Messi, there is nervous...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tWe always believed in ourselves and our football, says Torres\n</h1><div class=\"article-picture\"><div class=\"picture verticle\"><img alt=\"We always believed in ourselves and our football, says Torres\" class=\"lazy\" data-device-variant=\"FREE~FREE~FREE~FREE\" data-src-template=\"https://eimg.thgim.com/ccidist-ws/th/th_delhi/issues/195330/OPS/Public/GCQG9E8C7.1+G6EG9G3U3.1.jpg\" src=\"../images/ch0102_001.jpg\" title=\"We always believed in ourselves and our football, says Torres\"/></div><figcaption class=\"caption\">\n                                \n  \n   \n    AFPFRANCK FIFE\n   \n  \n \n                            </figcaption></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>Ferran Torres dedicated the World Cup triumph to his compatriots. “The goal belongs to 47 million people. When you are up against Lionel Messi, there is nervousness, but we always believed in our football and in ourselves.” Torres joined Mario Gotze as the only substitutes to score the winner in a final (both against Argentina).</p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 102, "title": "My journey is a lesson in overcoming adversity: Rodri", "section": "Sports", "page": "17", "teaser": "It feels like the perfect script. I certainly did not expect this. I would love for the younger generations to see that a player who touches the heaven, then de...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tMy journey is a lesson in overcoming adversity: Rodri\n</h1><div class=\"article-picture\"><div class=\"picture verticle\"><img alt=\"My journey is a lesson in overcoming adversity: Rodri\" class=\"lazy\" data-device-variant=\"FREE~FREE~FREE~FREE\" data-src-template=\"https://eimg.thgim.com/ccidist-ws/th/th_delhi/issues/195330/OPS/Public/GCQG9E8C7.1+G6EG9G3U2.1.jpg\" src=\"../images/ch0103_001.jpg\" title=\"My journey is a lesson in overcoming adversity: Rodri\"/></div><figcaption class=\"caption\">\n                                \n  \n   \n    AFPLARS BARON\n   \n  \n \n                            </figcaption></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>It feels like the perfect script. I certainly did not expect this. I would love for the younger generations to see that a player who touches the heaven, then descends into hell, can come back. It is a lesson in overcoming adversity — Spain captain and midfielder Rodri after winning the World Cup Golden Ball.</p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT
