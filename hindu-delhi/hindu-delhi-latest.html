ublisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 25, "title": "Protesters’ anger extends beyond paper leaks", "section": "Regional", "page": "12", "teaser": "Four years after the Prime Minister inaugurated the Central Vista Avenue and renamed Rajpath as Kartavya Path, police jeeps and motorcycle-borne police personne...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tProtesters’ anger extends beyond paper leaks\n</h1><div class=\"author\"><div class=\"author-name\">Sobhana K. Nair</div></div><div class=\"dateLine\"><div class=\"dateline\">New Delhi</div></div><div class=\"article-picture\"><div class=\"picture verticle\"><img alt=\"Protesters’ anger extends beyond paper leaks\" class=\"lazy\" data-device-variant=\"FREE~FREE~FREE~FREE\" data-src-template=\"https://eimg.thgim.com/ccidist-ws/th/th_delhi/issues/195330/OPS/Public/GCQG9E8C2.1+G6EG9G4SO.1.jpg\" src=\"../images/ch0026_001.jpg\" title=\"Protesters’ anger extends beyond paper leaks\"/></div><figcaption class=\"caption\">\n                                \n  \n   \n    Police lathi-charge CJP supporters during their march to the Parliament in New Delhi on Monday.Sushil Kumar VermaSHUBHOMOY SIKDAR\n   \n  \n \n                            </figcaption></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>Four years after the Prime Minister inaugurated the Central Vista Avenue and renamed Rajpath as Kartavya Path, police jeeps and motorcycle-borne police personnel drove on the verdant lawns, chasing down protesters who had gathered on Monday morning to take part in the march to Parliament.</p><p>The call was given by the newly minted Cockroach Janta Party (CJP), born on social media and focused solely on demanding the resignation of Union Education Minister Dharmendra Pradhan. But the accrued discontent of the protesters went beyond the anger over the spate of paper leak incidents. Their collective despair centred on what they saw as the government’s indifference and refusal to even acknowledge their concerns.</p><p>One of the many common threads connecting those who faced police lathis was that many of them had voted for the Bharatiya Janata Party in the past or came from families that had traditionally supported the BJP.</p><div class=\"subhead\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" section=\"A\" zone=\"Delhi\"><p>‘Modi’s arrogance’</p></div><p>“How can the government continue to ignore the spate of paper leaks?” asked Sadhna Singh (name changed). Ms. Singh wanted her real name to be withheld fearing retributive action from the government. The government, she said, sends regular updates on various social media groups but did not say a word about the paper leaks or recognise the protest.</p><p>“Yesterday, P.V. Sindhu won a gold medal in Japan in badminton, and the government is claiming credit for it. But you can’t bear to even acknowledge this,” Ms. Singh said.</p><p>Next to her, 50-year-old Kavita Verma had joined the protest. She has voted for the BJP since 2014.</p><p>“I felt pride for the brilliant roads they gave us. They did good work in the initial years, but it has been a sharp downslide. People can clearly see Narendra Modi’s arrogance. You cannot run a country on the power of lathi,” she said.</p><p>She is angry that the peaceful protest was disrupted by the police using lathis and tear gas shells. “Why are the students being treated as terrorists?” she added.</p><p>This group was resting at Rafi Marg, next to the artificial waterbody, at 1 p.m. after they were dispersed by the police from the barricade close to the Press Club of India. Since entry to Metro stations had been closed, they were wondering how to return home.</p><p>The calm broke with a fresh surge of protesters being chased down Rafi Marg by the police. Delhi Police vans and buses rolled down the road, picking up protesters at random and stuffing them into the vehicles. The protesters ran to the India Gate lawns. Just as they settled down there to continue their agitation, police motorcycles and vans arrived, driving on the lawns to chase them away.</p><div class=\"subhead_lead\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" section=\"A\" zone=\"Delhi\"><p>Change after noon</p></div><p>Rachna Chawla, 26, an IT professional, spoke to <span class=\"italic\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" multiline=\"0\" section=\"A\" zone=\"Delhi\">The Hindu</span> even as a police motorcycle tailed the group. Ms. Chawla said while anger over the paper leaks may have been the starting point, the protests had grown beyond that.</p><p>Ms. Chawla said she was surprised that for the first few hours the movement was unhindered, but something changed after noon. The conversation was punctuated by police sirens and persistent honking from police vans, warning protesters to stay away.</p><p></p><p>It started raining, and the protesters crowded at the bus stand on Janpath.</p><p>Nishant, 26, who hails from Nawada, Bihar, was livid. His life is not marked by stories of paper leaks. His anger is for inchoate reasons — from his low salary, to long hours of working, to the one-room tenement that he shares with his family near R.K. Puram, to schools shut down in his village, to rising inflation, to the ethanol-mixed petrol that is affecting his old motorcycle; the reasons keep going on.</p><p>“I voted for BJP, twice,” he underlined. “The government is blind, mute and deaf. It can’t see the protests, it can’t hear our complaints and it can’t speak a word about all this,” he said.</p><p></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 26, "title": "Delhi HC seeks medical reports of Wangchuk", "section": "Regional", "page": "12", "teaser": "Counsel says Wangchuk has a constitutional right to continue his protest; Solicitor-General says any deterioration in the activist’s health or any unforeseen event can have repercussions", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tDelhi HC seeks medical reports of Wangchuk\n</h1><div class=\"author\"><div class=\"author-name\">Soibam Rocky Singh</div></div><div class=\"dateLine\"><div class=\"dateline\">New Delhi</div></div><h2 class=\"sub-title\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n  Counsel says Wangchuk has a constitutional right to continue his protest; Solicitor-Generalsays any deterioration in the activist’s health or any unforeseen event can have repercussions\n</h2><div class=\"article-picture\"><div class=\"picture verticle\"><img alt=\"Delhi HC seeks medical reports of Wangchuk\" class=\"lazy\" data-device-variant=\"FREE~FREE~FREE~FREE\" data-src-template=\"https://eimg.thgim.com/ccidist-ws/th/th_delhi/issues/195330/OPS/Public/GCQG9E8C2.1+G6EG9G4SQ.1.jpg\" src=\"../images/ch0027_001.jpg\" title=\"Delhi HC seeks medical reports of Wangchuk\"/></div><figcaption class=\"caption\">\n                                \n  \n   \n    Activist Sonam Wangchuk was taken to Safdarjung hospital in New Delhi by police from the Jantar Mantar protest site on July 18. ANI ANI\n   \n  \n \n                            </figcaption></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p><span class=\"drop_initial\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" multiline=\"0\" section=\"A\" zone=\"Delhi\"></span>The Delhi High Court on Monday posted for hearing on Tuesday an appeal filed by Gitanjali J. Angmo, wife of climate activist Sonam Wangchuk, seeking his transfer from the government-run Safdarjung Hospital in New Delhi to a hospital of his choice.</p><p>A Division Bench comprising Chief Justice D.K. Upadhyaya and Justice Tejas Karia said its immediate concern was to “save his life first” and sought clarity on Mr. Wangchuk’s current medical condition. The activist has been on a hunger strike for 23 days.</p><p>The Bench directed that all pathological reports based on blood samples analysed by Safdarjung Hospital, AIIMS, and a private laboratory be placed on record.</p><p>The High Court also asked the lead doctor treating Mr. Wangchuk at Safdarjung hospital as well as the private physician consulted by the family to remain present at the next hearing.</p><p>Appearing for Ms. Angmo, senior advocate Akhil Sibal submitted that Mr. Wangchuk was “willing to be discharged against medical advice so that no blame falls on the treating doctors”.</p><p>“If he wishes, he will check into another hospital, if that situation is required. Today, he does not want to be restrained from leaving the premises. He is feeling fine, he is cogent, he is clear-headed. He is able to write representations in his own hand. That scenario of a life-threatening situation has not yet emerged. He is not in the ICU. If such a situation arises, he will take the necessary measures,” Mr. Sibal argued.</p><div class=\"subhead\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" section=\"A\" zone=\"Delhi\"><p>Right to protest</p></div><p>He contended that Mr. Wangchuk’s autonomy could not be curtailed without the sanction of law and emphasised that he had a constitutional right to continue his protest. Citing judicial precedents,</p><p>Mr. Sibal argued that “hunger strikes are a recognised form of constitutionally protected protest” and one’s “bodily autonomy should not be taken away like this without sanction of law”. Solicitor-General Tushar Mehta, appearing for the authorities, countered that while the right to protest is a fundamental right, it is not absolute when public interest and preservation of life are involved. “The life of everyone, including the petitioner’s husband, is precious and needs to be protected,” Mr. Mehta submitted.</p><p>Mr. Mehta argued that the State’s interest becomes relevant when deterioration in a protester’s health could have wider consequences.</p><p></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 27, "title": "Police outnumbered by a sea of marching protesters", "section": "Regional", "page": "12", "teaser": "The Delhi Police and other security personnel were outnumbered and taken aback by thousands of protesters who arrived in and around Jantar Mantar on Monday, a s...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tPolice outnumbered by a sea of marching protesters\n</h1><div class=\"author\"><div class=\"author-name\">Vijaita Singh, Nistula Hebbar</div></div><div class=\"dateLine\"><div class=\"dateline\">New Delhi</div></div><div class=\"article-picture\"><div class=\"picture verticle\"><img alt=\"Police outnumbered by a sea of marching protesters\" class=\"lazy\" data-device-variant=\"FREE~FREE~FREE~FREE\" data-src-template=\"https://eimg.thgim.com/ccidist-ws/th/th_delhi/issues/195330/OPS/Public/GCQG9E8C2.1+G6EG9G4SN.1.jpg\" src=\"../images/ch0028_001.jpg\" title=\"Police outnumbered by a sea of marching protesters\"/></div><figcaption class=\"caption\">\n                                \n  \n   \n    Police personnel deployed during the CJP’s march to Parliament in New Delhi on Monday. SHIV KUMAR PUSHPAKARSHIV KUMAR PUSHPAKAR\n   \n  \n \n                            </figcaption></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>The Delhi Police and other security personnel were outnumbered and taken aback by thousands of protesters who arrived in and around Jantar Mantar on Monday, a senior government official said.</p><p>Despite multiple layers of barricades, deployment of around 3,000 security personnel and an Internet shutdown, large crowds comprising mostly students and young people were able to reach the doorsteps of Parliament, before they were tear-gassed and beaten with batons.</p><p>The “leaderless” protesters faced little resistance from the police as they marched from Jantar Mantar towards Raisina Marg, <span class=\"italic\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" multiline=\"0\" section=\"A\" zone=\"Delhi\">The Hindu</span> witnessed.</p><p>All radial roads leading to Parliament were teeming with protesters who brought down the barricades as they marched on, with the police using buses to block their movement, just 100 metres from the Parliament complex, where the first day of the Monsoon Session commenced on Monday.</p><p>The crowd had gathered based on a call given by the online youth group, Cockroach Janta Party (CJP), to march to Parliament demanding the resignation of Education Minister Dharmendra Pradhan over the recent NEET(UG) examination paper leak.</p><p>The forcible removal of activist Sonam Wangchuk from the dais at Jantar Mantar likely gave a fillip to the protest as hundreds of people started pouring in in solidarity.</p><div class=\"subhead\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" section=\"A\" zone=\"Delhi\"><p>Swelling protest</p></div><p>On Sunday evening, after intelligence sources conveyed to the government that the numbers were growing at the protest site, the Union government through the Deputy Commissioner of Police, New Delhi, Sachin Sharma, reached out to the CJP members for the first time. “The DCP approached us first on Sunday evening, offering a meeting with the district magistrate. After we declined, this morning they offered talks with Minister of State (Independent Charge) and subsequently a Union Secretary. When we refused, the DCP asked us what we want to do. We said a delegation will meet a Union Cabinet Minister. Then they asked us to give a list of names of possible Ministers and that is how Health Minister J.P. Nadda met us,” said Saurav Das of the CJP.</p><p>Seeing the intensity of the protests, the Union government deputed Mr. Nadda to engage with members of the CJP.</p><p>Posting on X after the meeting, the Minister said: “The meeting took place in a cordial atmosphere. An initial verbal discussion was held in detail with their delegation and they submitted a written petition around 4 p.m. I have requested all those protesting to end their sit-in and assist the administration in restoring normalcy.” Within Parliament too, senior Ministers of the NDA government went into a huddle with one meeting between Union Home Minister Amit Shah and Mr. Pradhan lasting nearly three-and-a-half hours.</p><p>No briefing was done post the meeting but it is assumed that issues with regard to the leak of NEET question papers and the resulting protests were discussed.</p><p></p><p>A government official told <span class=\"italic\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" multiline=\"0\" section=\"A\" zone=\"Delhi\">The Hindu</span> that clear directions were given to the police to not use force against the protesters. However, when they broke barricades and marched towards Parliament, police personnel first fired tear gas shells as warning shots and then baton-charged them.</p><p></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 28, "title": "Students’ demands ‘legitimate’; Modi is anti-youth PM: Rahul", "section": "Regional", "page": "12", "teaser": "The Leader of the Opposition in the Lok Sabha, Rahul Gandhi, on Monday accused Prime Minister Narendra Modi of being “the most anti-youth Prime Minister India h...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tStudents’ demands ‘legitimate’; Modi is anti-youth PM: Rahul\n</h1><div class=\"author\"><div class=\"author-name\">Sandeep Phukan</div></div><div class=\"dateLine\"><div class=\"dateline\">New Delhi</div></div><div class=\"article-picture\"><div class=\"picture verticle\"><img alt=\"Students’ demands ‘legitimate’; Modi is anti-youth PM: Rahul\" class=\"lazy\" data-device-variant=\"FREE~FREE~FREE~FREE\" data-src-template=\"https://eimg.thgim.com/ccidist-ws/th/th_delhi/issues/195330/OPS/Public/GCQG9E8C2.1+G6EG9G4SP.1.jpg\" src=\"../images/ch0029_001.jpg\" title=\"Students’ demands ‘legitimate’; Modi is anti-youth PM: Rahul\"/></div><figcaption class=\"caption\">\n                                \n  \n   \n    Rahul Gandhi Rohan Pillay A _12511\n   \n  \n \n                            </figcaption></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>The Leader of the Opposition in the Lok Sabha, Rahul Gandhi, on Monday accused Prime Minister Narendra Modi of being “the most anti-youth Prime Minister India has ever had” while backing the students’ demands related to recurring examination paper leaks as “legitimate”.</p><p>The Congress, while condemning the police action against protesters attempting to march to Parliament on the opening day of the Monsoon Session, also sought to underline that it had been raising the issue of paper leaks long before the present agitation led by the Cockroach Janta Party (CJP).</p><p>In a video message, Mr. Gandhi stressed that the Congress had been raising the issue “not for weeks or months, but for years”.</p><p>“The country has a majority of young people. Prime Minister Modi is the most anti-youth PM India has ever had. The boys and girls who are walking the streets of Delhi are not criminals. They are demanding their rights,” Mr. Gandhi said.</p><p>The Opposition leader said it was the right of a student to have “an education system that respects them, that is fair and that is working”.</p><p>“There’s absolutely nothing wrong in what they are doing. And it is disgusting what the government is doing and what the police is doing,” he said.</p><p>“Tear-gassing students, lathi-charging students is not democratic. It is not India’s way… They have legitimate demands. The Prime Minister should accept these demands and do something about it,” Mr. Gandhi said. In a post on X, Mr. Gandhi, addressing the police and government employees, said the right to protest was an inviolable fundamental right. “Power does not last forever. Accountability will certainly be enforced,” he said.</p><p></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 29, "title": "Several CJP protesters injured in crackdown", "section": "Regional", "page": "12", "teaser": "Seeing the “brutality with which peacefully protesting youth are being dealt with”, activist Sonam Wangchuk said he will continue fasting “until the youth leade...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tSeveral CJP protesters injured in crackdown\n</h1><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p></p><p>Seeing the “brutality with which peacefully protesting youth are being dealt with”, activist Sonam Wangchuk said he will continue fasting “until the youth leaders are allowed to meet the parliamentarians at the Sansad Bhawan, or I am allowed to meet them here at the hospital”.</p><p>Mr. Wangchuk had earlier indicated that he was on the verge of calling off his fast if MPs met and assured him that they would raise the issue of education in the Monsoon Session.</p><p>Earlier, CJP leaders did not begin the march to the Parliament in the morning, having established contact with the government through New Delhi’s deputy commissioner of police. Delhi Police said in a statement that over 118 police personnel sustained injuries, and that 60 protesters were injured in the melee. “During today’s protest by CJP in the New Delhi area, the protesters displayed unruly, aggressive and violent behaviour,” the police statement said, accusing the “violent mob [of causing] extensive damage to public property”.</p><p>By early afternoon, hundreds of protesters slipped through barricades onto Sansad Marg, heading southwest to the new Parliament building. When they were a few hundred metres away from the Parliament house, security forces lathi-charged a small gathering, around which time mobile internet too was cut at 150 spots across central Delhi.</p><p></p><p><span class=\"italic\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" multiline=\"2\" section=\"A\" zone=\"Delhi\"> (With inputs from Shrimansi Kaushik, Sreeparna Chakraborty, Ashna Butani, and Sobhana K.)</span></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 30, "title": "Iran in a ‘full-scale war’, says Pezeshkian as U.S. strikes go on", "section": "Regional", "page": "12", "teaser": "Iran is fighting a “full-scale war” with the U.S., President Masoud Pezeshkian said on Monday, as Washington expanded its strikes across the Islamic republic in...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tIran in a ‘full-scale war’, says Pezeshkian as U.S. strikes go on\n</h1><div class=\"author\"><div class=\"author-name\">Agence France-Presse</div></div><div class=\"dateLine\"><div class=\"dateline\">Tehran</div></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>Iran is fighting a “full-scale war” with the U.S., President Masoud Pezeshkian said on Monday, as Washington expanded its strikes across the Islamic republic including a city hosting a nuclear power plant.</p><p>Iran kept up its own attacks across the region in response, with its Revolutionary Guards announcing they had hit targets in Bahrain, Jordan, and Syria, while Bahrain said its air navigation systems were targeted.</p><p>“The reality is that today the Islamic Republic of Iran is engaged in a full-scale war,” said Mr. Pezeshkian, according to a presidency statement. “We must be realistic and accept the natural consequences of this resistance.”</p><p>His comments came after state media and local authorities reported U.S. strikes on Monday in the north and centre of the country, areas away from the blockaded Strait of Hormuz waterway.</p><p></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 31, "title": "New U.K. PM Andrew Burnham vows to bring social reform", "section": "Regional", "page": "12", "teaser": "Former Manchester Mayor, Andrew Burnham, was appointed Prime Minister of the U.K. on Monday, its seventh in a decade. Mr. Burnham described the moment as a “cir...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tNew U.K. PM Andrew Burnham vows to bring social reform\n</h1><div class=\"author\"><div class=\"author-name\">Sriram Lakshman</div></div><div class=\"dateLine\"><div class=\"dateline\">LONDON</div></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>Former Manchester Mayor, Andrew Burnham, was appointed Prime Minister of the U.K. on Monday, its seventh in a decade. Mr. Burnham described the moment as a “circuit breaker”, as he promised to usher in a new political and social model for the country, taking power out of London and spreading it across the regions of the U.K.</p><p>The outgoing Prime Minister Keir Starmer, who had made history two years ago, when he led the Labour Party in one of the largest victories in modern times, made history again on Monday, but this time for becoming the U.K.’s shortest serving Labour Prime Minister in modern history. “I go with good grace, I go with a smile, and I go proud of everything that we have achieved,” Mr. Starmer said in brief remarks outside on Downing Street, as he wished his successor “every success”.</p><p></p><p></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 32, "title": "4 Indian seafarers killed near Ukrainian port", "section": "Regional", "page": "12", "teaser": "“India condemns such attacks and reiterates that targeting commercial shipping and endangering innocent civilian crew members, or otherwise impeding freedom of ...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\t4 Indian seafarers killed near Ukrainian port\n</h1><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p></p><p>“India condemns such attacks and reiterates that targeting commercial shipping and endangering innocent civilian crew members, or otherwise impeding freedom of navigation and commerce is deplorable and should be avoided,” said the MEA in its statement.</p><p>Ukraine’s Acting Foreign Minister said the attack was not an isolated incident. “Russia has now struck a civilian vessel navigating Ukraine’s maritime corridor. The crew included citizens of Syria and India. A Ukrainian maritime pilot was killed”. He said Russia attacked another merchant vessel with the flag of Antigua and Barbuda in the Black Sea on Saturday.</p><p>Mr. Sybiha said Ukraine had informed the International Maritime Organization and Ukraine’s international partners “about Russia’s latest attacks on civilian shipping, as well as the governments of the States whose citizens were killed or injured.”</p><p><span class=\"italic\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" multiline=\"0\" section=\"A\" zone=\"Delhi\">Maritime Trade News</span> has reported that <span class=\"italic\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" multiline=\"0\" section=\"A\" zone=\"Delhi\">Golden Leo</span> was carrying a crew of 17 Syrian and Indian nationals and that at least 10 sailors were killed in the attack. The Russian authorities are yet to comment on the incident.</p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 33, "title": "Internet cut off for mobile phone users in Central Delhi", "section": "Regional", "page": "12", "teaser": "In the first widespread communications blackout in Delhi since the farmers’ agitation in 2021, mobile Internet was switched off throughout Central Delhi, even a...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tInternet cut off for mobile phone users in Central Delhi\n</h1><div class=\"author\"><div class=\"author-name\">Aroon Deep, Vijaita Singh</div></div><div class=\"dateLine\"><div class=\"dateline\">NEW DELHI</div></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>In the first widespread communications blackout in Delhi since the farmers’ agitation in 2021, mobile Internet was switched off throughout Central Delhi, even as demonstrators poured into Jantar Mantar and security forces were dispersing them with force. The shutdown impeded the flow of visuals from the area. Protesters and journalists alike resorted to Wi-Fi hotspots at nearby establishments.</p><p></p><p>Mobile Internet was also shut down for a two-hour period last Saturday morning when activist Sonam Wangchuk was forcibly hospitalised by plain-clothespolice officers.</p><p>An industry source told <span class=\"italic\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" multiline=\"0\" section=\"A\" zone=\"Delhi\">The Hindu </span>that 150 sites across Central Delhi were ordered to have Internet access cut off; the order was first issued till noon and subsequently extended till 6 p.m.</p><p></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 34, "title": "Monsoon Session off to a stormy start amid Opposition protests", "section": "Regional", "page": "13", "teaser": "Opposition MPs raise NEET paper leak, Ram Temple donation theft issues; Lok Sabha adjourned after repeated disruptions; MPs of Congress, SP and Trinamool troop into the Well of the House; DMK raises Mekedatu issue, skips Cong.-led meeting", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tMonsoon Session off to a stormy start amid Opposition protests\n</h1><div class=\"author\"><div class=\"author-name\">The Hindu Bureau</div></div><div class=\"dateLine\"><div class=\"dateline\">New Delhi</div></div><h2 class=\"sub-title\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n  Opposition MPs raise NEET paper leak, Ram Temple donation theft issues; Lok Sabha adjourned after repeated disruptions; MPs of Congress, SP and Trinamool troop into the Well of the House; DMK raises Mekedatu issue, skips Cong.-led meeting\n</h2><div class=\"article-picture\"><div class=\"picture verticle\"><img alt=\"Monsoon Session off to a stormy start amid Opposition protests\" class=\"lazy\" data-device-variant=\"FREE~FREE~FREE~FREE\" data-src-template=\"https://eimg.thgim.com/ccidist-ws/th/th_delhi/issues/195330/OPS/Public/GCQG9E8C3.1+G6EG9G400.1.jpg\" src=\"../images/ch0035_001.jpg\" title=\"Monsoon Session off to a stormy start amid Opposition protests\"/></div><figcaption class=\"caption\">\n                                \n  \n   \n     Turbulent start: Lok Sabha proceedings under way on the first day of the Monsoon Session of Parliament, in New Delhi on Monday. Sansad TVANI\n   \n  \n \n                            </figcaption></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p><span class=\"drop_initial\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" multiline=\"0\" section=\"A\" zone=\"Delhi\"></span>The proceedings in the Lok Sabha were disrupted on the first day of the Monsoon Session of Parliament on Monday as Opposition parties raised various issues, primarily the alleged National Eligibility-cum-Entrance Test (NEET) paper leak and Ram Temple donation theft.</p><p>The disruption over the NEET issue came amid attempts by protesters, led by the Cockroach Janta Party (CJP), to break barricades to march to Parliament, demanding the resignation of Union Education Minister Dharmendra Pradhan over the alleged paper leak and CBSE exam irregularities.</p><p>The House was adjourned six times since it met in the morning, and was later adjourned for the day at 3 p.m. The only business transacted was the introduction of a Bill by Union Law Minister Arjun Ram Meghwal to replace an Ordinance which increased the number of Supreme Court judges from 34 to 38.</p><p>The changed political alignments following the recent Assembly election were also visible during the proceedings.</p><p>As soon as the Lok Sabha assembled, Opposition MPs raised slogans, with the Congress, the Samajwadi Party and the Trinamool Congress members protesting over alleged NEET paper leaks and the donation embezzlement at the Ram Temple in Ayodhya. However, the Trinamool MPs who trooped into the Well of the House did not include the 20 rebel MPs who now claim to be a part of the National Citizens Party of India (NCPI).</p><p>The Dravida Munnetra Kazhagam (DMK), which has parted ways with the Congress after the latter switched sides and allied with the newly elected TVK government in Tamil Nadu, too entered the Well. But the party members raised slogans over the Karnataka government’s proposal to build a dam at Mekedatu across the Cauvery river rather than the issues flagged by the Congress.</p><p>The split between the Congress and the DMK appeared clear inside the Lok Sabha, although DMK MP T. R. Baalu continued to occupy his earlier seat next to Congress MP K.C. Venugopal, with Speaker Om Birla yet to approve the party’s request for separate seating. The DMK skipped the customary strategy meeting of Opposition parties convened by Congress president Mallikarjun Kharge at his Parliament office on Monday morning.</p><p>Sources told <span class=\"italic\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" multiline=\"0\" section=\"A\" zone=\"Delhi\">The Hindu </span>that DMK chief M.K. Stalin made it clear that the party’s Lok Sabha members should not associate themselves with issues raised by the Congress on the floor of the House.</p><div class=\"subhead\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" section=\"A\" zone=\"Delhi\"><p>Repeated adjournments</p></div><p>Mr. Birla, who began the proceedings with obituary references to six former MPs, first adjourned the House till noon as Opposition MPs raised slogans during the Question Hour.</p><p></p><p>Earlier, at 2 p.m., BJP MP Jagdambika Pal, who was officiating as the Speaker, said there was adequate quorum to conduct business, but some Opposition MPs alleged they were being prevented from entering the House.</p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 35, "title": "Govt. introduces Bill in Lok Sabha to raise strength of judges in SC to 38", "section": "Regional", "page": "13", "teaser": "The Union government on Monday introduced a Bill in the Lok Sabha to replace an ordinance that raised the sanctioned strength of judges in the Supreme Court fro...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tGovt. introduces Bill in Lok Sabha to raise strength of judges in SC to 38\n</h1><div class=\"author\"><div class=\"author-name\">Ishita Mishra</div></div><div class=\"dateLine\"><div class=\"dateline\">New Delhi</div></div><div class=\"article-picture\"><div class=\"picture verticle\"><img alt=\"Govt. introduces Bill in Lok Sabha to raise strength of judges in SC to 38\" class=\"lazy\" data-device-variant=\"FREE~FREE~FREE~FREE\" data-src-template=\"https://eimg.thgim.com/ccidist-ws/th/th_delhi/issues/195330/OPS/Public/GCQG9E8C3.1+G6EG9G3VU.1.jpg\" src=\"../images/ch0036_001.jpg\" title=\"Govt. introduces Bill in Lok Sabha to raise strength of judges in SC to 38\"/></div><figcaption class=\"caption\">\n                                \n  \n   \n    Union Law Minister Arjun Ram Meghwal introduced the Bill amid protests by Opposition members in the Lok Sabha. Sansad TV\n   \n  \n \n                            </figcaption></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>The Union government on Monday introduced a Bill in the Lok Sabha to replace an ordinance that raised the sanctioned strength of judges in the Supreme Court from 34 to 38, amid concerns over mounting backlog of cases.</p><p>It seeks to replace the Supreme Court (Number of Judges) Amendment Ordinance, 2026, promulgated in May, to increase the sanctioned strength of the court from 33 to 37, excluding the Chief Justice of India.</p><p>Union Law Minister Arjun Ram Meghwal introduced the Supreme Court (Number of Judges) Amendment Bill amid protests by Opposition members, who raised slogans over alleged NEET examination paper leak and claims of ‘theft’ of donations made to the Ram Temple in Ayodhya.</p><p>The statement of objects and reasons attached to the Bill states that the court had 92,101 pending cases as of January 1, underscoring the need to expand its strength of judges. It adds that the court has been functioning with nearly its full sanctioned strength of 34 judges since 2019.</p><div class=\"subhead\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" section=\"A\" zone=\"Delhi\"><p>Rising pendency</p></div><p>However, the number of fresh cases filed has continued to be higher than that of disposals. In 2025, the court registered 75,410 new cases while disposing of 65,615 matters, adding to the pendency.</p><p>The Bill states that the persistent gap between the institution and the disposal of cases<span class=\"bold\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" multiline=\"0\" section=\"A\" zone=\"Delhi\"></span>has made docket management<span class=\"bold\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" multiline=\"0\" section=\"A\" zone=\"Delhi\"></span>increasingly difficult, particularly in relation to older pending matters and cases requiring adjudication by larger Benches.</p><p>It said augmenting the court’s strength was among the most effective measures to reduce the backlog of cases. It added that the increase in strength would enable the Chief Justice of India to constitute Constitution Benches more regularly to hear cases involving substantial questions of law.</p><div class=\"subhead\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" section=\"A\" zone=\"Delhi\"><p>Cost estimates</p></div><p>A Financial Memorandum accompanying the Bill estimates that creating four additional posts of judges, along with the required supporting staff, will entail an annual recurring expenditure of approximately ₹10.56 crore. Also, a sum of ₹3.47 crore is expected to be incurred as one-time expenditure on official vehicles, furnishing official residences, and other related expenses, taking the<span class=\"bold\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" multiline=\"0\" section=\"A\" zone=\"Delhi\"></span>total initial cost to about ₹14.04 crore.</p><p>In May, the Union Cabinet approved the proposal to increase the top court’s sanctioned strength, following which the President<span class=\"bold\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" multiline=\"0\" section=\"A\" zone=\"Delhi\"></span>promulgated an ordinance.</p><p>After the ordinance came into effect, four judges were appointed to the Supreme Court against the enhanced sanctioned strength.</p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 36, "title": "Modi stresses vital role of Parliament, urges MPs to engage in informed debate", "section": "Regional", "page": "13", "teaser": "Prime Minister Narendra Modi urged MPs to engage in informed and respectful debate, with a shared commitment to the country’s progress, in the Monsoon Session o...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tModi stresses vital role of Parliament, urges MPs to engage in informed debate\n</h1><div class=\"author\"><div class=\"author-name\">Devesh Pandey</div></div><div class=\"dateLine\"><div class=\"dateline\">New Delhi</div></div><div class=\"article-picture\"><div class=\"picture verticle\"><img alt=\"Modi stresses vital role of Parliament, urges MPs to engage in informed debate\" class=\"lazy\" data-device-variant=\"FREE~FREE~FREE~FREE\" data-src-template=\"https://eimg.thgim.com/ccidist-ws/th/th_delhi/issues/195330/OPS/Public/GCQG9E8C3.1+G6EG9G3VV.1.jpg\" src=\"../images/ch0037_001.jpg\" title=\"Modi stresses vital role of Parliament, urges MPs to engage in informed debate\"/></div><figcaption class=\"caption\">\n                                \n  \n   \n    Parliament begins: Prime Minister Narendra Modi addressing the media in New Delhi on Monday. SHIV KUMAR PUSHPAKAR SHIV KUMAR PUSHPAKAR\n   \n  \n \n                            </figcaption></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>Prime Minister Narendra Modi urged MPs to engage in informed and respectful debate, with a shared commitment to the country’s progress, in the Monsoon Session of Parliament that began on Monday.</p><p>In a veiled attack on the Leader of the Opposition in the Lok Sabha, Rahul Gandhi, he spoke about the innovators at the start-up Skyroot Aerospace, saying the company’s team — with an average age of 28 — had taken India’s flag to space. “I am not talking about some 56-year-old ‘youngster’. I am talking about a start-up, the young people with an average age of 28 who have planted India’s flag in space... these are the kinds of achievements that fill India with immense pride,” he said.</p><p>“India’s youth have truly soared to new heights in the space sector, it is a tremendous success,” he said.</p><p>Built by Skyroot, the Vikram-1 rocket lifted off from the ISRO’sSriharikota launch pad on July 18 and placed its payloads in an orbit about 450 km above earth, making India the third country after the U.S. and China whose private industry has demonstrated such a capability. India’s expanding presence in space reflected the talent, aspirations, and limitless potential of the country’s youth, he said.</p><p></p><p>Mr. Modi said India had achieved several key milestones over the past month, enhancing its standing and credibility on the global stage. He said an oil refinery in Rajasthan was dedicated to the country, India’s third semiconductor plant commissioned, and a green hydrogen-powered train launched.</p><p></p><p>He said India remained the world’s fastest-growing major economy, recording a 7.7% GDP growth rate, despite disruptions to supplies of petrol, diesel, LPG and other commodities caused by the conflicts in West Asia.</p><p>Stressing that facts and reason should guide discussions, Mr. Modi said every point of view deserves respect.</p><p>He said that as India gathers pace in its development journey, Parliament had a vital role in providing a fresh impetus through constructive debates. He called for cooperation across party lines and contributions by experienced MPs to address the aspirations of the country.</p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hid
