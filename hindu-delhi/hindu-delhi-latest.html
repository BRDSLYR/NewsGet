lacrity with which the government is ready to treat allegations against Ministers as criminal misinformation or defamation, rather than let them take the natural course of civil suits or political contestation, is disheartening. A new government has the opportunity to rewrite the rules of engagement with the public, to be tolerant of dissent, and not to misdirect the power it is vested with, just to curb opposition. Every government keen on development could be enriched by criticism and dissent articulated on public platforms, if it is willing. It must remember that the restriction of harmful, obscene and indecent content must be balanced with the overwhelming supremacy of freedom of speech.</p><p></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 66, "title": "Press and play", "section": "Edit", "page": "8", "teaser": "Spain smothered the opposition with possession and positional football", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tPress and play\n</h1><h2 class=\"sub-title\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n  Spain smothered the opposition with possession and positional football\n</h2><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p></p><p><span class=\"drop_initial\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" multiline=\"0\" section=\"A\" zone=\"Delhi\"></span>Spain’s second World Cup title, achieved after a narrow extra-time victory over Argentina in the final, was a triumph of the collective. The Luis de la Fuente-coached outfit conceded just one goal in eight matches, was unmatched in the centre of the pitch with playmaker and Golden Ball winner Rodri completing a record 790 passes, and exhibited diffused excellence up front by having seven different players score its 14 goals. So much so that even the individual brilliance of the teenaged Lamine Yamal was astutely subsumed within the whole. In fact, de la Fuente and Rodri had combined to deliver the 2024 European Championship too, with the latter adjudged the world’s best later that year. A second Ballon d’Or for the 30-year-old midfield metronome appears a certainty. The win also cemented Spain’s position as the pre-eminent footballing force of the first quarter of this century. Starting 2008, the country has won two of the five World Cups and three of the five Euros. Spain is the reigning women’s World Champion, and the assembly line of coaches it produces and players it exports make the nation a true powerhouse. Interestingly, after its maiden World Cup win in 2010, Spain had not gone past the round of 16 at three subsequent editions. The success in North America is thus a full-circle moment.</p><p>Another high point for the tournament was Lionel Messi’s enduring genius. Argentina’s quality in the final was dire and the behaviour of its players petulant, but that should not detract from the 39-year-old’s excellence in bringing his country to the cusp of defending its crown. Kylian Mbappe’s experience was bitter-sweet; he won the Golden Boot (10 goals) and became the all-time top-scorer in World Cups (22) but remained a mute spectator as Spain subjugated his star-studded France in the semifinal. Jude Bellingham inspired England to third place, the best performance for the nation since winning in 1966. But the summer sojourn laid bare the team’s continued lack of cutting edge after back-to-back runner-up finishes at Euro 2020 and 2024. The World Cup will also be etched in memory for a plethora of missteps, which governing body FIFA unfortunately condoned. By arbitrarily invoking immigration rules, and trying to interfere politically in on-field matters, the co-host U.S. pushed the envelope in undesirable ways. Commercially driven hydration breaks and the half-time show in the final were tedious and disruptive. Football should be allowed to flow freely, on and off the turf.</p><p></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 67, "title": "Spain’s collective effort demolishes Argentine threat", "section": "Edit", "page": "9", "teaser": "In the World Cup final, Spain passed and pressed with gusto, denying the Albiceleste any meaningful play until deep into extra time", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tSpain’s collective effort demolishes Argentine threat\n</h1><div class=\"author\"><div class=\"author-name\">Srinivasan Ramani, Devyanshi Bihani, Pon Vasanth B.A.</div></div><h2 class=\"sub-title\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n  In the World Cup final, Spain passed and pressed with gusto, denying the Albiceleste any meaningful play until deep into extra time\n</h2><div class=\"article-picture\"><div class=\"picture verticle\"><img alt=\"Spain’s collective effort demolishes Argentine threat\" class=\"lazy\" data-device-variant=\"FREE~FREE~FREE~FREE\" data-src-template=\"https://eimg.thgim.com/ccidist-ws/th/th_delhi/issues/195330/OPS/Public/GCQG9E8BV.1+G6EG9G4BT.1.jpg\" src=\"../images/ch0068_001.jpg\" title=\"Spain’s collective effort demolishes Argentine threat\"/></div><figcaption class=\"caption\"></figcaption></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p><span class=\"drop_initial\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" multiline=\"0\" section=\"A\" zone=\"Delhi\"></span>Spain’s win over Argentina in the 2026 FIFA World Cup final might have read a modest 1-0, but the scoreline hid what was in plain sight throughout. Spain smothered the Argentines, denying them the ball and disrupting any fluid move, so that the defending champions ended the full 120 minutes, including extra time with zero shots on target. How did it manage that against a team featuring Lionel Messi?</p><p>La Roja has prized possession as a mark of its identity ever since Luis Aragonés took charge in the mid-2000s followed by Vicente del Bosque building around midfielders such as Xavi, Iniesta and Xabi Alonso, and later Sergio Busquets. This style, termed “tiki-taka”, kept the ball as a way of denying it to the opposition and with it, the danger of any attack.</p><p>In 2026, Luis de la Fuente’s Spain built on that identity with a sharp second quality: counter-pressing — swarming the ball in compact packs the instant it is lost, to win it straight back. Spain was the tournament’s best at this, and the combination of slick passing and aggressive recovery let it concede just one goal in the whole competition.</p><p>In the final, Spain passed and pressed with gusto, denying the Albiceleste any meaningful sequence until deep into extra time. Two metrics capture that grip: possession share per period, and field tilt. Split into 15-minute phases, the game gave Argentina the majority of possession in only two (57% between half-time and the hour mark, and 52% in the second period of extra time). Spain controlled the other six <span class=\"bold\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" multiline=\"0\" section=\"A\" zone=\"Delhi\">(Chart 1)</span>.</p><p>Field tilt measures a team’s territorial dominance as its share of both teams’ possession in the final third — the third of the pitch nearest the opponent’s goal. It thus captures which side controlled the ball in the zones that most directly threaten the goal, rather than possession spread across the pitch.</p><p>By this measure Spain dominated every phase but one, and did so almost totally — 100% in three periods and above 90% in two more, with Argentina barely reaching the attacking third. The exception came in the second period of extra time, when Argentina, chasing an equaliser after Ferran Torres had put Spain ahead, posted a 95% field tilt <span class=\"bold\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" multiline=\"0\" section=\"A\" zone=\"Delhi\">(Chart 2)</span>. But this was also after Enzo Fernández had been sent off in second-half stoppage time, leaving Argentina to play all of extra time a man down against a tiring Spain in late game. Spain’s stranglehold was marked throughout regulation as its 100% phases came in open, eleven-a-side play.</p><p>The charts show what Spain did. The question is how. Possession football rests on two things: technical command of the ball, evading tackles, passing precisely and positional awareness, with players drifting into space to offer passing lanes and wingers stretching the pitch alongside fullbacks and midfielders. Spain has long selected for these qualities and drilled them over years, many of its players having come through de la Fuente’s youth sides.</p><p>Rodri, named the tournament’s best player with the Golden Ball, led the press with relentless running while distributing from deep. Pau Cubarsí, its Young Player winner, made line-breaking passes from defence and marshalled a high line that let Spain press through tight, compact spacing. On the goalkeeping front, Unai Simon’s role was minimal as he was required to barely make any saves. But he was an effective sweeper behind a line that Argentina rarely breached. For Messi, in what was surely his last World Cup, it made for a quiet farewell. His team was not merely beaten so much as suffocated.</p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 68, "title": "Defections affect moral sanctity of democracy", "section": "Edit", "page": "9", "teaser": "Winston Churchill once said that, “some men change parties for the sake of their principles; others change principles for the sake of their party”. India, howev...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tDefections affect moral sanctity of democracy\n</h1><h2 class=\"sub-title\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n  The greatest victim of political defections is not the Opposition party that loses a legislator. It is the voter\n</h2><div class=\"article-picture\"><div class=\"picture verticle\"><img alt=\"Defections affect moral sanctity of democracy\" class=\"lazy\" data-device-variant=\"FREE~FREE~FREE~FREE\" data-src-template=\"https://eimg.thgim.com/ccidist-ws/th/th_delhi/issues/195330/OPS/Public/GCQG9E8BV.1+G6EG9G4BU.1.jpg\" src=\"../images/ch0069_001.jpg\" title=\"Defections affect moral sanctity of democracy\"/></div><figcaption class=\"caption\">\n                                \n  \n   \n    Prabal Basu Roy\n    \n     Sloan Fellow of the London Business School\n    \n   \n  \n \n                            </figcaption></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p><span class=\"drop_initial\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" multiline=\"0\" section=\"A\" zone=\"Delhi\"></span>Winston Churchill once said that, “some men change parties for the sake of their principles; others change principles for the sake of their party”. India, however, seems to have perfected a third category — politicians who abandon both party and principle for the sake of power.</p><p>The break-up of the Trinamool Congress and the Shiv Sena-UBT (Uddhav Bal Thackeray) are only the latest examples of a disturbing trend concerning elections. Leaders campaign bitterly, questioning each other’s integrity and commitment to the nation, with voters asked to choose between sharply contrasting visions for India’s future. Yet once the ballots are counted, many of those differences dissolve, and hitherto irreconcilable opponents become political partners. Principles give way to pragmatism, and power becomes the only enduring conviction.</p><p>The immediate consequences are political, with governments becoming stronger, and Opposition parties weaker. But the deeper casualty is something far more precious — the sanctity of the democratic mandate.</p><div class=\"subhead\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" section=\"A\" zone=\"Delhi\"><p>Far-reaching consequences</p></div><p>In a parliamentary democracy, citizens do not vote merely for individuals. They vote for an idea, a manifesto, and a political alternative. When an elected representative crosses over after winning on another party’s symbol, it is not simply a change of affiliation; it is a unilateral rewriting of the contract entered into with the voter. The mandate, which belongs to the electorate, now becomes the private property of the elected representative.</p><p>It also exposes the perverse incentives increasingly operating within Indian politics. Politicians facing investigations or legal troubles often appear to discover ideological compatibility with the party in power. Equally striking is the troubling public perception that investigative intensity frequently diminishes after such realignments. Democracies rely not only on fairness, but also on public confidence that institutions operate without political favour. Once that confidence erodes, the damage extends far beyond any single party or government.</p><p>The larger casualty is democratic competition itself. Every democracy requires an elected government as well as an Opposition capable of scrutinising, questioning, and presenting a credible alternative. Without that balance, elections risk becoming contests over access to power rather than contests of ideas.</p><p>Yet there is an even larger paradox. Prime Minister Narendra Modi continues to command the trust of a significant majority of Indian voters. Few leaders in independent India’s history have enjoyed such sustained popular support. The Bharatiya Janata Party has repeatedly demonstrated that it can win elections on its own political appeal. If the electorate has already bestowed such a powerful mandate, why must that mandate be reinforced through the steady migration of dubious legislators elected on rival party symbols?</p><p>History suggests that great democracies are distinguished not by governments that accumulate the greatest power, but by governments confident enough to allow a credible Opposition to survive and compete.</p><p>Aristotle argued more than two millennia ago that political systems cease to be virtuous when public office becomes an instrument of private advantage rather than public good. Kautilya’s wisdom was in knowing that a ruler’s legitimacy rested on the confidence of the people. Even Machiavelli, often caricatured as an apostle of raw power, warned that the destruction of all independent centres of influence ultimately weakens the state itself. The tragedy of modern democracies is that electoral mandates are increasingly treated not as solemn covenants of public trust, but as negotiable assets in the marketplace of power.</p><p>History offers sobering parallels. Italy’s post-war Transformismo saw politicians frequently switching allegiances and governments held together more by patronage than ideology. Brazil’s coalition presidentialism has often encouraged transactional politics. The Philippines has long struggled with a culture of political turncoatism. Though not identical, they share a common lesson: when political office becomes a tradable asset, institutional decay begins, with citizens losing faith in the system.</p><div class=\"subhead\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" section=\"A\" zone=\"Delhi\"><p>The voter’s loss</p></div><p>Perhaps, however, the hardest questions are not for politicians alone. Why do parties continue to nominate candidates whose convictions appear so negotiable? Why does mainstream media celebrate defections as strategic manoeuvres instead of condemning them as betrayals of the electorate? And why do voters so often forgive the very conduct they publicly denounce?</p><p>If opportunism is flourishing, it is because parties reward it and institutions fail to discourage it, with citizens gradually coming to accept it as normal.</p><p>The greatest victim of political defections is not the Opposition party that loses a legislator. It is the voter. The voter casts a ballot believing it represents a choice between competing visions for the country. When that representative later abandons the very platform on which the vote was sought, the voter is left dispossessed.</p><p></p><p>India’s democracy is strong enough to produce decisive mandates. It must also be strong enough to preserve the sanctity of those mandates. A vote is not a transferable asset that belongs to the elected representative; it is a trust reposed by the citizen. When that trust can be traded for power, the real defector is not the politician — it is democracy itself.</p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 69, "title": "Battleground Bidadi", "section": "Edit", "page": "9", "teaser": "In Karnataka, enduring political rivalries clash over the Bidadi township project", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tBattleground Bidadi\n</h1><div class=\"author\"><div class=\"author-name\">Nagesh Prabhu</div></div><h2 class=\"sub-title\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n  In Karnataka, enduring political rivalries clash over the Bidadi township project\n</h2><div class=\"article-picture\"><div class=\"picture verticle\"><img alt=\"Battleground Bidadi\" class=\"lazy\" data-device-variant=\"FREE~FREE~FREE~FREE\" data-src-template=\"https://eimg.thgim.com/ccidist-ws/th/th_delhi/issues/195330/OPS/Public/GCQG9E8BV.1+G6EG9G4BV.1.jpg\" src=\"../images/ch0070_001.jpg\" title=\"Battleground Bidadi\"/></div><figcaption class=\"caption\"></figcaption></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p><span class=\"drop_initial\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" multiline=\"0\" section=\"A\" zone=\"Delhi\"></span>The escalating political duel between Chief Minister D.K. Shivakumar and Janata Dal (Secular) leader and Union Minister H.D. Kumaraswamy over the proposed Greater Bengaluru Integrated Township (GBIT), popularly known as the Bidadi township project, is much more than just a tussle about land acquisition. It reflects a broader contest for political dominance in Karnataka’s Old Mysore region, where both leaders are seeking to shape the political narrative ahead of the local body elections and the 2028 Assembly polls.</p><p>The immediate trigger has been the government’s decision to proceed with the township project on Bengaluru’s outskirts. The project envisages acquiring about 9,600 acres across 25 villages in the Bengaluru South district. Both leaders, who belong to the influential land-owning Vokkaliga community, have sought to position themselves as defenders of farmers and the region’s agrarian identity.</p><p>Mr. Shivakumar has pointed out repeatedly that it was Mr. Kumaraswamy who had conceived the township project during his tenure as Chief Minister in 2006, while the JD(S) leader has charged the Congress government with attempting to acquire fertile agricultural land.</p><p>However, the confrontation is rooted in a long-standing rivalry between the two principal Vokkaliga leaders, whose political fortunes are closely tied to the Old Mysore belt.</p><p>The region remains one of Karnataka’s most decisive electoral battlegrounds. Although the Congress made significant gains there in the 2023 Assembly election, the Bharatiya Janata Party (BJP)-JD(S) alliance continues to regard it as a JD(S) stronghold. Consequently, every major issue — from irrigation to land acquisition — assumes political significance as both parties compete for rural and semi-urban voters.</p><p>For the Congress, weakening the JD(S) in the region is critical to consolidating its electoral gains. For the JD(S), opposing the township is central to reinforcing its “pro-farmer” credentials. The agitation has expanded beyond landowners, with farmers’ organisations joining the protests, making it harder for the government to dismiss them as politically motivated.</p><div class=\"subhead\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" section=\"A\" zone=\"Delhi\"><p>Long-standing rivalry</p></div><p>Recognising the widening social and political dimensions of the agitation, Mr. Shivakumar has announced a committee to re-examine the project. The move appears to be a political balancing act — defusing public anger without abandoning what the government considers an important urban planning initiative. Although the Chief Minister has insisted that the township is “not my dream project”, he has continued to defend its planning rationale, arguing that Bengaluru requires orderly expansion.</p><p>The dispute has since led to personal attacks. Mr. Kumaraswamy has questioned the Chief Minister’s accumulation of wealth over the past two decades, while posters targeting the JD(S) leader and his family have appeared in the notified villages. Congress leaders have portrayed his opposition as stemming from political insecurity over the rise of another influential Vokkaliga leader.</p><p>Both sides have crafted competing narratives. Mr. Shivakumar has released official records to argue that the project has enjoyed continuity across successive governments and that the present opposition is politically selective. Mr. Kumaraswamy, however, maintains that the current government alone is accountable for the proposed acquisition and cannot evade responsibility by citing decisions of previous administrations. These positions allow each leader to appeal to different constituencies, one emphasising planned urbanisation, the other championing farmers’ rights.</p><p></p><p>The rivalry between Mr. Shivakumar and the family of former Prime Minister H.D. Deve Gowda stretches back across four decades. After losing to Mr. Gowda in the erstwhile Sathanur Assembly constituency in 1985, Mr. Shivakumar defeated Mr. Kumaraswamy there in 1999. Now, the renaming of Ramanagara as the Bengaluru South district, Mr. Shivakumar’s call to JD(S) workers to join the Congress, and the party’s recent setback in the Legislative Council elections have further sharpened the rivalry.</p><p>The BJP-JD(S) alliance’s decision to launch a padayatra against the GBIT before the State legislature’s monsoon session suggests that the rivalry is only likely to intensify.</p><p><span class=\"tagline_credit\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" multiline=\"0\" section=\"A\" zone=\"Delhi\">nagesh.p@thehindu.co.in</span></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 70, "title": "Viking craft lands on Mars, sends back clear pictures", "section": "Edit", "page": "9", "teaser": "Pasadena, July 20: The American unmanned Viking spaceprobe lander touched its three slender aluminium legs down on Mars to-day after an 11-month 800 million-kil...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tViking craft lands on Mars, sends back clear pictures\n</h1><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>Pasadena, July 20: The American unmanned Viking spaceprobe lander touched its three slender aluminium legs down on Mars to-day after an 11-month 800 million-kilometre voyage from earth, and sent back two “unbelievably” clear photographs showing hills and small rocks.</p><p>Scientists at Mission Control here speculated that the terrain seen in the second photo up to three of five kilometres from the 600 kg craft on the Martian plain of Chryse could be made of volcanic lava or basalt.</p><p>The ground was soft with rocks and gravel, but the aluminium legs did not sink in. One leg could be seen in the first photo. Several of the rocks about 30 cm across had sharp angles as if they had been broken by sandstorm.</p><p>Alongside the hills in the second panoramic picture were “kinds of dunes”.</p><p>The first photo was taken only 25 seconds after the craft touched down. The camera took five minutes to complete each picture, line by line, as it swept the scene. It took the photos 35 minutes to reach earth.</p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 71, "title": "Australia’s new capital", "section": "Edit", "page": "9", "teaser": "Rugby, July 20: It is officially announced that the Duke and Duchess of York will visit Australia on the occasion of the official opening of the Federal Capital...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tAustralia’s new capital\n</h1><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>Rugby, July 20: It is officially announced that the Duke and Duchess of York will visit Australia on the occasion of the official opening of the Federal Capital at Canberra on May 9th next. The invitation to their Royal Highnesses was conveyed in a telegram from the Governor-General of the Common-Wealth to the Secretary of State for the Dominican Affairs for submission to the King. It recalls that the King himself opened the first Federal Parliament of Australia in 1901. The telegram proceeds, “We would regard it as singularly appropriate, if your son were permitted to represent you at the establishment of the Federal Capital, which marks another important phase in the development of this great British Commonwealth and is regarded by our people as an event of deep national significance and importance. We feel that the presence of His Royal Highness on such an occasion would evoke the strongest possible expressions of loyalty and enthusiasm and further strengthen the bonds which unite us to the mother country and to your Royal House.”</p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 72, "title": "Why inflation is rising in India", "section": "Edit", "page": "10", "teaser": "India’s recent inflation surge has been mainly driven by higher fuel costs and food price pressures rather than excess demand; food inflation stems largely from supply shocks such as poor monsoons, while rising oil prices have pushed up production costs and manufactured goods inflation", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tWhy inflation is rising in India\n</h1><div class=\"author\"><div class=\"author-name\">Indranil Chowdhury</div></div><h2 class=\"sub-title\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n  India’s recent inflation surge has been mainly driven by higher fuel costs and food price pressures rather than excess demand; food inflation stems largely from supply shocks such as poor monsoons, while rising oil prices have pushed up production costs and manufactured goods inflation\n</h2><div class=\"article-picture\"><div class=\"picture verticle\"><img alt=\"Why inflation is rising in India\" class=\"lazy\" data-device-variant=\"FREE~FREE~FREE~FREE\" data-src-template=\"https://eimg.thgim.com/ccidist-ws/th/th_delhi/issues/195330/OPS/Public/GCQG9E8C0.1+G6EG9G4BM.1.jpg\" src=\"../images/ch0073_001.jpg\" title=\"Why inflation is rising in India\"/></div><figcaption class=\"caption\"></figcaption></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p><span class=\"drop_initial\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" multiline=\"0\" section=\"A\" zone=\"Delhi\"></span>Inflation, except during the COVID-19 pandemic, has remained relatively low in India for over a decade. But it is back with a bang. Wholesale Price Index (WPI) inflation is hovering close to 10% in June <span class=\"bold\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" multiline=\"0\" section=\"A\" zone=\"Delhi\">(Chart 1a)</span>. After remaining low — negative, or close to 0 — until December last year, the climb started with a sharp jump since March this year.</p><p>Even those with only a fleeting connection to economics believe that prices rise when demand outpaces supply (overheating), and vice versa. But is that really the case?</p><p>Before we go into the causes, let us look at what contributed to this rise in WPI inflation in the first place. The WPI is a weighted average of three sub-categories of commodities: primary articles (food, minerals, etc.), fuel and power and manufactured products. <span class=\"bold\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" multiline=\"0\" section=\"A\" zone=\"Delhi\">Chart 1b </span>shows the contribution of each to total WPI inflation. The latter two — the orange and the red bars — have contributed to this dramatic jump in recent months. Fuel and power prices require little explanation as they are determined by oil prices purchased from abroad and are essentially imported prices. However, primary commodity and manufactured product prices need to be understood.</p><div class=\"subhead\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" section=\"A\" zone=\"Delhi\"><p>Structural differences in pricing</p></div><p>The Polish economist Michal Kalecki argued that while primary commodity prices are demand-determined, industrial prices are cost-determined. In other words, inflation of industrial commodities is not determined by a demand and supply mismatch. Come to think of it, this is commonsensical if you leave aside the quintessential demand-supply curves out of your head. After all, prices of cars, cycles, or toothbrushes do not fluctuate with a change in their demand. If more cars are demanded, more are produced and supplied to the customer instead of increasing the price. Prices of tomatoes or mangoes, on the other hand, vary quite significantly with a mismatch between demand and supply.</p><p>Viewed this way, the demand and supply curves need to be reconstructed <span class=\"bold\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" multiline=\"0\" section=\"A\" zone=\"Delhi\">(Graph 1)</span>. For primary commodities (panel (a)), supply is virtually fixed, represented by a vertical curve on the quantity axis, whereas demand follows the usual downward sloping curve. A decline in supply (shifting of the supply curve in panel (a) to the left) will increase its prices. In the case of food, for example, a bad monsoon will affect production adversely, thereby decreasing supply and increasing its prices. A good monsoon, on the other hand, will bring the prices down. Inflation here is demand-pull.</p><p>For the manufactured commodities (panel (b)), the supply curve is flat, which means a rise or a fall in demand (shifting of the demand curve) will bring about an equivalent supply of such commodities with no change in their prices. Again, the reason is simple. Most such commodities, except in cases of supply constraints, are produced in factories that run below capacity, so an increase in their demand simply increases their production. Demand here, quite opposite to the earlier case, has no role to play in determining their prices. Prices are determined instead by the cost of production. The supply curve is nothing but a profit markup over the cost (the vertical difference between supply and cost is the profit markup). A rise in the costs would push the cost curve up, and, unless the capitalists want to absorb this rise in cost through a lower markup, this would get passed on as higher prices in the market. Inflation here is purely cost-push.</p><div class=\"subhead\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" section=\"A\" zone=\"Delhi\"><p>What happened in the Indian case?</p></div><p>Having seen this difference, let us apply this idea to the inflationary problem currently facing India. If manufactured prices are cost-determined, what do their costs depend on? While wage cost is an important component of total costs, it is usually not the factor that pushes prices up because Indian workers do not really have space to bargain for higher wages. In other words, Indian workers are mostly price-takers; they make do with what they get. It is the material costs instead, which create the inflationary impulse.</p><p>One of the most important materials used in the production of any industrial commodity is oil. If we plot the movement of fuel and power against the manufactured prices <span class=\"bold\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" multiline=\"0\" section=\"A\" zone=\"Delhi\">(Chart 2)</span>, we can see almost a one-to-one correspondence between the two. A rise in fuel and power prices raised the manufactured inflation as well.</p><p>Food prices, too, have risen. One likely reason is the adverse impact of an inadequate monsoon, as a result of the El Niño effect, on agricultural production this year. <span class=\"bold\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" multiline=\"0\" section=\"A\" zone=\"Delhi\">Chart 3</span> plots data on food price inflation with years in which the country experienced droughts. In every instance, drought conditions were accompanied by a significant rise in food inflation, much in line with the Kaleckian structuralist idea. To be sure, there have been instances in which food price inflation has taken place even in the absence of such supply shocks. These could perhaps be the years of high demand. Suffice to say that a drought is a sufficient, even if not a necessary, condition for food prices to soar.</p><div class=\"subhead\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" section=\"A\" zone=\"Delhi\"><p>What is to be done?</p></div><p>Given these structural differences, can something be done to control inflation? Let us start with the food prices. We believe food prices need to be decoupled from the vagaries of nature to the extent possible. That India solely depends on the rain gods to feed its population is in itself quite unscientific and an anachronism in the modern era of technology. The country must invest heavily in agriculture, particularly in irrigation infrastructure, which is not entirely dependent on the monsoon.</p><p>As for manufactured goods, controlling fuel and power costs, when crude oil prices are rising, may be difficult, but there are still ways that they can be controlled. Instead of the ill-thought-out inflation targeting framework, the government should apply a countercyclical indirect tax policy to keep fuel and power prices in check. If the government can reduce the customs and excise duties when crude prices soar, the cost at the pump can be controlled. In fact, this is exactly what the government did a few months ago, which is why pump prices were held constant despite soaring crude prices in the international markets. Unfortunately, the government has withdrawn this measure, which is one of the primary reasons WPI inflation has risen sharply.</p><p><span class=\"italic\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" multiline=\"2\" section=\"A\" zone=\"Delhi\"> (The authors are a part of the DevMac (Development Macroeconomics) network, which seeks pluralism in Economics)</span></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 73, "title": "How magnetic levitation lifts and propels high-speed maglev trains", "section": "Edit", "page": "11", "teaser": "Maglev trains use powerful magnetic fields to move above the track without wheels, eliminating rolling friction, enabling speeds of over 400 km/hr; however, the technology requires dedicated guideways with precision engineering, making construction and operation expensive", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tHow magnetic levitation lifts and propels high-speed maglev trains\n</h1><div class=\"author\"><div class=\"author-name\">Vasudevan Mukunth</div></div><h2 class=\"sub-title\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n  Maglev trains use powerful magnetic fields to move above the track without wheels, eliminating rolling friction, enabling speeds of over 400 km/hr; however, the technology requires dedicated guideways with precision engineering, making construction and operation expensive\n</h2><div class=\"article-picture\"><div class=\"picture verticle\"><img alt=\"How magnetic levitation lifts and propels high-speed maglev trains\" class=\"lazy\" data-device-variant=\"FREE~FREE~FREE~FREE\" data-src-template=\"https://eimg.thgim.com/ccidist-ws/th/th_delhi/issues/195330/OPS/Public/GCQG9E8C1.1+G6EG9G4BF.1.jpg\" src=\"../images/ch0074_001.jpg\" title=\"How magnetic levitation lifts and propels high-speed maglev trains\"/></div><figcaption class=\"caption\">\n                                \n  \n   \n    Engineers get the train to float above the tracks using electromagnetic suspension.SPECIAL ARRANGEMENT\n   \n  \n \n                            </figcaption></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p><span class=\"drop_initial__quote\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" multiline=\"0\" section=\"A\" zone=\"Delhi\"></span><span class=\"TypographyTag1\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" multiline=\"0\" section=\"A\" zone=\"Delhi\">‘M</span>aglev’ is a portmanteau of ‘magnetic levitation’. Instead of running on wheels, maglev technology uses strong magnetic fields to lift the train and move it forward. Since the train floats above the track, there is no rolling friction during normal operations, nor are operations affected by inclement weather, like rain or snow. The result: the train can move at extremely high speed, topping 400 km/hr, while also giving passengers a smooth ride.</p><div class=\"subhead\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" section=\"A\" zone=\"Delhi\"><p>How is a train lifted?</p></div><p>Nature has four fundamental forces: the two nuclear forces, the electromagnetic force, and gravity. Of them, gravity is the weakest by far — around 1039 times weaker than the electromagnetic force. This is why a small magnet can stay stuck to your fridge despite having the entire gravitational force of the earth pulling it down. The same idea applies to lifting a train weighing somewhere from 150 to 500 tonnes.</p><p>Engineers get the train to float above the tracks using electromagnetic suspension (EMS). The train has two ‘arms’ that wrap around the guideway over which it runs. Strong electromagnets on these arms point magnetic fields up towards the protruding parts of the guideway. Say you are lifting a bag with your hand. Your fingers wrap around the bag’s strap. The train’s arms do something like this — they wrap only just halfway, and from the bottom part, i.e., where the tip of your finger would be, exert a magnetic field into the underside of the strap. When these electromagnets are turned on, they exert a magnetic field that attracts them towards the guideway, i.e., your fingers would be attracted towards the strap. As a result, the train is pushed upwards. The train is fit with sensors that help it float around 10 mm above the guideway at all times.</p><p>In a closely related technology called electrodynamic suspension (EDS), there are superconducting magnets on the train that are cooled to a very low temperature. When the train moves, the magnets that move with it induce an electric current in coils built into the sides of the tracks. (The phenomenon is called electromagnetic induction.) The result is a repulsive force that pushes the train up. Since the magnets have to move to induce the current, the train often needs to be travelling at around 100 km/hr before the effect can kick in, and until then it uses wheels. The train also hovers higher above the track, at around 100 mm.</p><p>But in exchange for requiring wheels, EDS can support higher speeds. EMS systems operate at around or under 500 km/hr whereas the SCMAGLEV EDS system in Japan achieved 603 km/hr during testing in 2015.</p><div class=\"subhead\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" section=\"A\" zone=\"Delhi\"><p>How does the train move forward?</p></div><p>The walls of the guideway are lined with coils that carry an alternating current (AC). This current creates a magnetic field that constantly shifts its poles (north to south) along the track. The magnets on the train are attracted to the ‘opposite’ pole ahead and repelled by the ‘like’ pole behind. As a result, the train is simultaneously pulled forward from the front and pushed forward from the back. And to make the train go faster, engineers just need to increase the frequency of the AC.</p><p>Similarly, the current is used to switch the direction of the magnetic field to slow the train or altogether stop it. This process may also use regenerative braking to divert the energy ‘saved’ by braking to the electric grid.</p><p>If a fast-moving maglev train starts to drift, there are magnets on the sides that repel/attract accordingly to ensure it stays centered. For emergencies or when the magnetic braking fails, the system is also fit with friction brakes. They come in two forms, although there are other technologies as well. One: the maglev train is also fit with ‘regular’ auxiliary wheels, and these wheels have a braking system akin to those in other trains and cars. Two: braking pads between the guideway and the train apply friction to further slow it down.</p><div class=\"subhead\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" section=\"A\" zone=\"Delhi\"><p>What are the downsides of maglev?</p></div><p>The maglev system including the guideway cannot reuse existing guideways and stations vis-à-vis non-maglev trains. It needs its own. And this infrastructure is very expensive as the guideway needs to have magnets and coils with precision engineering.</p><p>The Shanghai Maglev, which was completed in 2004, cost ₹580 crore to ₹720 crore per kilometre (adjusted for inflation). This is excluding the cost of preparing the local terrain first — and operational costs like maintenance. Ergo, there needs to be very high and consistent passenger demand. Otherwise, the economics won’t work out.</p><p>On the engineering front, while there is no rolling friction, a train moving very fast — especially over 300 km/hr — experiences aerodynamic resistance due to the flow of air around the train’s body. This is why maglev trains have aerodynamic designs (which can add to the cost), including a front portion that resembles a bird’s beak.</p><div class=\"subhead\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" section=\"A\" zone=\"Delhi\"><p>Is maglev technology used elsewhere?</p></div><p>Maglev is essential about using magnetic fields to support or move objects — a use-case that arises in many enterprises. High-speed turbines and compressors suspend their rotating shafts in a magnetic field instead of conventional bearings, minimising mechanical contact and allowing the blades to turn faster. Similarly, modern aircraft carriers use the linear motor technology that pushes maglev trains forward to accelerate aircraft on the vessels’ runways.</p><p>Factory automation systems also use it to achieve the rapid, precise motion crucial in semiconductor manufacturing, food and medicine packaging, CNC machining, inspection cameras involving lasers or X-rays, and DNA sequencing, among others.</p><p>Scientists have also used magnetic fields to levitate biological samples, liquid droplets, molten metals, and even small animals for experiments. Following a suggestion by his wife, the British physicists Andre Geim and Michael Berry used a magnetic field to levitate a frog in 1997. This was possible because a form of magnetism called diamagnetism gives all materials a very weak magnetic field. The duo had to work out the strength of the field required to ‘cancel out’ the gravitational force exerted on the frog by the earth. Thus, they were able to get the frog to float using a 10-tesla magnet.</p><p>For this work the duo won an Ig Nobel Prize in 2000. Today, Geim remains the only scientist to have won both an Ig Nobel Prize and a Nobel Prize. Berry is also a noted physicist, known for his work on semi-classical physics.</p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 74, "title": "The DAILY QUIZ", "section": "Edit", "page": "11", "teaser": "Question 1 What was the monument called, and to which Greek deity was it dedicated? Question 2 Who deliberately set fire to the temple in 356 BCE, and what was ...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tOn July 21, 356 BCE, one of the Seven Wonders of the Ancient World was destroyed in an act of deliberate vandalism. Test your knowledge of the monument\n</h1><div class=\"author\"><div class=\"author-name\">Prathmesh Kher</div></div><style>\n.item img {\n    height: 310px !important;\n}\n</style><div class=\"inline_gallery media-body\"><div class=\"article-photo-gallery\"><div class=\"owl-carousel owl-theme photo-gallery\" id=\"photo-gallery-\"><div class=\"item\"><img alt=\"\" class=\"slideshowimg lazy\" data-device-variant=\"FREE~FREE~FREE~FREE\" data-src-template=\"https://eimg.thgim.com/ccidist-ws/th/th_delhi/issues/195330/OPS/Public/GCQG9E8C1.1+G6EG9G4BH.1.jpg\" src=\"../images/ch0075_001.jpg\"/><figcaption class=\"caption\">\n                    \n  \n   \n    1 of 2  Visual Question:\n    This illustration from the 1610 work Emblemas morales (Moral Emblems), imagining Herostratus burning the Temple of Artemis, is topped by the Latin phrase ‘In flammis fama paratur’. What does it mean?Sebastián de Covarrubias/Public Domain\n   \n  \n \n                </figcaption></div><div class=\"item\"><img alt=\"\" class=\"slideshowimg lazy\" data-device-variant=\"FREE~FREE~FREE~FREE\" data-src-template=\"https://eimg.thgim.com/ccidist-ws/th/th_delhi/issues/195330/OPS/GCQG9E8C1.1+GTBG9EAGB.1.jpg\" src=\"../images/ch0075_002.jpg\"/><figcaption class=\"caption\">\n                    \n  \n   2 of 2 \n  \n \n                </figcaption></div></div></div></div><link href=\"https://www.thehindu.com/theme/css/th-online/owl.carousel.min.css\" rel=\"stylesheet\" type=\"text/css\"/><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><div class=\"subhead_lead\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" section=\"A\" zone=\"Delhi\"><p>Question 1</p></div><p>What was the monument called, and to which Greek deity was it dedicated?</p><div class=\"subhead_lead\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" section=\"A\" zone=\"Delhi\"><p>Question 2</p></div><p>Who deliberately set fire to the temple in 356 BCE, and what was his stated motive?</p><div class=\"subhead_lead\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" section=\"A\" zone=\"Delhi\"><p>Question 3</p></div><p>What measure did the Ephesian authorities reportedly take to deny Herostratus the fame he sought?</p><div class=\"subhead_lead\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" section=\"A\" zone=\"Delhi\"><p>Question 4</p></div><p>Besides being a place of worship, what important civic and economic function did the temple serve?</p><div class=\"subhead_lead\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" section=\"A\" zone=\"Delhi\"><p>Question 5</p></div><p><span class=\"TypographyTag11\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" multiline=\"1\" section=\"A\" zone=\"Delhi\">Which ancient writer included the Temple of Artemis among the Seven Wonders of the World in his famous epigram?</span></p><p><span class=\"bold\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" multiline=\"0\" section=\"A\" zone=\"Delhi\">Questions and Answers to the previous day’s daily quiz: </span>1. With which physical oddity was Sobers born? <span class=\"bold\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" multiline=\"0\" section=\"A\" zone=\"Delhi\">Ans: Six fingers in each hand</span></p><p>2. To make his inclusion legitimate in the Police Cricket Club, how was Sobers, still in his teens, recruited? <span class=\"bold\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" multiline=\"0\" section=\"A\" zone=\"Delhi\">Ans: Bugle player in the police band</span></p><p>3. According to his autobiography, Sobers never ducked into a bouncer in his career after being hit on the forehead by a legendary fast bowler in a match against the touring English side in 1953-54. <span class=\"bold\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" multiline=\"0\" section=\"A\" zone=\"Delhi\"> Ans: Fred Trueman</span></p><p>4. Name the sci-fi book he supposedly authored in 1967. <span class=\"bold\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" multiline=\"0\" section=\"A\" zone=\"Delhi\">Ans: ‘<span class=\"italic\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" multiline=\"0\" section=\"A\" zone=\"Delhi\">Bonaventure and the Flashing Blade</span>’</span></p><p>5. Where and against whom did he notch up the record-breaking knock? <span class=\"bold\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" multiline=\"0\" section=\"A\" zone=\"Delhi\">Ans: At Kingston against Pakistan</span></p><p>6. Name the bowler at the receiving end when Sobers hit six sixes in an over. <span class=\"bold\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" multiline=\"0\" section=\"A\" zone=\"Delhi\">Ans: Malcolm Nash</span></p><p>7. The winner of which ICC award is given the ‘Sir Garfield Sobers Trophy’? <span class=\"bold\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" multiline=\"0\" section=\"A\" zone=\"Delhi\">Ans: Men’s Cricketer of the Year</span></p><p>8. Which innings by Sobers did the great Don Bradman describe as ‘probably the greatest exhibition of batting ever seen in Australia’? <span class=\"bold\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" multiline=\"0\" section=\"A\" zone=\"Delhi\">Ans: 254 for the Rest of the World at the MCG in 1972</span></p><p>Visual: Name this Indian actress and model to whom Sobers was briefly engaged in the 1960s. <span class=\"bold\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" multiline=\"0\" section=\"A\" zone=\"Delhi\">Ans: Anju Mahendru</span></p><p><span class=\"bold\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" multiline=\"0\" section=\"A\" zone=\"Delhi\">Early Birds: </span>Tamal Biswas | Piyali Tuli | Lalchand Bhutani | Tito Shiladitya | Arun Kumar Singh</p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP :
