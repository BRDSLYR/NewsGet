/22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 75, "title": "Know your English", "section": "Edit", "page": "11", "teaser": "What is the meaning of “apple polishing”? (Rahul Sharma, Kola, Rajasthan) It means “flattery”. Believe it or not, this is an expression which owes its origin to...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tKnow your English\n</h1><div class=\"author\"><div class=\"author-name\">S. Upendran</div></div><div class=\"article-picture\"><div class=\"picture verticle\"><img alt=\"Know your English\" class=\"lazy\" data-device-variant=\"FREE~FREE~FREE~FREE\" data-src-template=\"https://eimg.thgim.com/ccidist-ws/th/th_delhi/issues/195330/OPS/Public/GCQG9E8C1.1+G6EG9G4BG.1.jpg\" src=\"../images/ch0076_001.jpg\" title=\"Know your English\"/></div><figcaption class=\"caption\"></figcaption></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><div class=\"subhead_lead\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" section=\"A\" zone=\"Delhi\"><p>What is the meaning of “apple polishing”? (Rahul Sharma, Kola, Rajasthan)</p></div><p>It means “flattery”. Believe it or not, this is an expression which owes its origin to the practice followed by school children. What is it that people do in order to win the approval of their superiors? They either give them gifts or flatter them. Some school going children did the same thing in order to be in the teacher’s good books. These kids took apples to school and polished them till they gleamed. Then they presented them to the class teacher! They hoped that by doing this, the teacher would overlook their poor performance in class and instead give them good marks.</p><p><span class=\"italic\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" multiline=\"0\" section=\"A\" zone=\"Delhi\">Vani’s apple-polishing didn’t get her anywhere.</span></p><p><span class=\"italic\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" multiline=\"0\" section=\"A\" zone=\"Delhi\"></span></p><p>Do not use this word in formal contexts. It is considered slang.</p><div class=\"subhead_lead\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" section=\"A\" zone=\"Delhi\"><p>What is the difference between “homophone” and “homonym”? (P.V.V.S. Lakshmi, Kakinada)</p></div><p>In everyday contexts these two words are used interchangeably. But there is a difference in meaning between the two. The word “homophone” comes from the Greek “homo” meaning “same” and “phone” meaning “sound”. Strictly speaking therefore, the word homophone is used to refer to words which sound alike, although they have a different spelling and meaning. Here are a few examples: mail, male; wear, ware; metal, mettle; etc. A homonym, on the other hand, is used to refer to words which have the same spelling and pronunciation but have a different meaning. For example May (month), may (possibility); can (be able), can (put something in container); bear (the animal), bear (to carry). As I mentioned earlier, this distinction is seldom maintained in everyday conversation. People in general tend to use “homonym” to mean “homophone”.</p><p>A note about the pronunciation. The first “o” in both the words is pronounced like the “o” in “hot”, “pot”, and “got”. The second “o” is like the “a” in “China”. It’s the first syllable which has the stress in both words. This is one way of pronouncing the words.</p><div class=\"subhead_lead\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" section=\"A\" zone=\"Delhi\"><p>How do you answer someone who says “Nice to meet you”? (P. Lokeshwar Rao, Mosopalli)</p></div><p>When you are introduced to someone and the person says, “Nice to meet you” the standard reply is “Nice to meet you” with the emphasis on “you”. It’s like “How do you do?” When someone says “How do you do?” your reply is, “How do you do?”. Other ways of responding to “Nice to meet you” are “Likewise”, “It’s a pleasure meeting you”, “Same here”, etc.</p><p></p><div class=\"subhead_lead\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" section=\"A\" zone=\"Delhi\"><p>Is the word “orange” a Tamil word? (P. Somasundaram, Chennai)</p></div><p>Many Tamilians would like to think so! Some argue that the word orange comes from the Tamil words “six” and “five” respectively. The good news is that the word does come from an Indian language — Sanskrit. Scholars who have studied the origin of words contend that the word “orange” comes from the Sanskrit “naranga”.</p><p></p><p><span class=\"italic\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" multiline=\"2\" section=\"A\" zone=\"Delhi\"> Published in The Hindu on May 1, 2001</span></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 76, "title": "Insurance firms using ‘ambiguous’, ‘sloppy’ terms to evade liability: SC", "section": "Business", "page": "15", "teaser": "Bench observes that insurers exploit the ambiguity to either evade liability which they should rightfully bear, or conversely found themselves burdened with liability they never intended to assume simply because their policy language was sloppy", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tInsurance firms using ‘ambiguous’, ‘sloppy’ terms to evade liability: SC\n</h1><div class=\"author\"><div class=\"author-name\">Aaratrika Bhaumik</div></div><div class=\"dateLine\"><div class=\"dateline\">NEW DELHI</div></div><h2 class=\"sub-title\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n  Bench observes that insurers exploit the ambiguity to either evade liability which they should rightfully bear, or conversely found themselves burdened with liability they never intended to assume simply because their policy language was sloppy\n</h2><div class=\"article-picture\"><div class=\"picture verticle\"><img alt=\"Insurance firms using ‘ambiguous’, ‘sloppy’ terms to evade liability: SC\" class=\"lazy\" data-device-variant=\"FREE~FREE~FREE~FREE\" data-src-template=\"https://eimg.thgim.com/ccidist-ws/th/th_delhi/issues/195330/OPS/Public/GCQG9E8C5.1+G6EG9G3UR.1.jpg\" src=\"../images/ch0077_001.jpg\" title=\"Insurance firms using ‘ambiguous’, ‘sloppy’ terms to evade liability: SC\"/></div><figcaption class=\"caption\">\n                                \n  \n   \n    When the party with all drafting power writes an ambiguous policy, it is the policyholder who suffers, says SC. gettyimages/istock\n   \n  \n \n                            </figcaption></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p><span class=\"drop_initial\" edition=\"EPaper\" layoutdesk=\"TH_Business\" multiline=\"0\" section=\"A\" zone=\"Delhi\"></span>The Supreme Court on Monday observed that the practice of insurers drafting “ambiguous” and “sloppy” insurance policies to escape liabilities they ought to bear had caused ordinary policyholders to suffer. The court said such “uncertainty” was also creating hurdles in the timely disposal of motor accident compensation claims.</p><p>A Bench of Justices Sanjay Karol and N. Kotiswar Singh observed that insurance companies must use clear and precise language while drafting standard-form insurance contracts to avoid multiple interpretations.</p><p>“When the party with all the drafting power writes an ambiguous policy, it is the ordinary policyholder who suffers. Insurers have, in many cases, exploited this ambiguity, either to escape liability which they should rightfully bear, or, conversely, found themselves burdened with liability they never intended to assume simply because their policy language was sloppy,” the Bench observed.</p><p>The observations came while the court was hearing an appeal filed by the Oriental Insurance Company against a February 4, 2025 judgment of the Chhattisgarh High Court directing it to pay ₹32.67 lakh as compensation in a motor accident claim.</p><p>The case arose from an accident involving a vehicle insured with the company, which was carrying passengers on a religious tour to various destinations in Nepal. The vehicle collided with a hill, killing three persons, including the driver, Riaz Khan, and passenger Harish Yadav.</p><p>Following the accident, Mr. Yadav’s wife, children and mother filed a claim petition before the Motor Accident Claims Tribunal (MACT) seeking compensation of ₹48.99 lakh.</p><p>The Tribunal directed the owner of the vehicle to pay the compensation along with interest at 6% per annum from October 22, 2011, the date of institution of the claim petition.</p><p>However, the High Court modified the award and held the insurer liable to satisfy the claim instead of the vehicle owner.</p><p>The Bench also expressed reservations about the manner in which orders were being passed by MACTs, observing that many were devoid of “adequate and clear reasoning”.</p><p>It said that unless this was addressed, claim petitions would continue to be delayed and appeals would continue to rise.</p><p>“In certain cases that have come up before this Court, including the present one, the tone, tenor and extent of the orders passed by the concerned Tribunals has caused us considerable disturbance. In this case, for example, the Tribunal elaborately recorded the submissions and evidence. However, their correlation with the facts of the case, and the effect of this correlation on the ultimate outcome, was lacking,” the judgment by Justice Karol said.</p><p>The insurance company had contended that since the accident had occurred outside the territory of India, the policy did not cover the claim. The Bench, however, rejected the contention, holding that if the insurer intended to exclude coverage for accidents occurring outside India, it ought to have “expressly mentioned” so in the policy. It noted that the offending vehicle had been lawfully permitted to travel into Nepal only after the authorities at the international border post were satisfied that all legal requirements had been complied with.</p><p>“It should have effectively and clearly communicated the terms of the contract, as the terms are unilaterally drafted by the insurer only. Essentially, ‘Cover what you want. Exclude what you want. But make sure you do it clearly. Sloppy drafting could cost you something’..,” the Bench said.</p><p>It added that where the terms of an insurance policy are capable of more than one interpretation, courts should adopt the interpretation that best advances the beneficial object of the Motor Vehicles Act, 1988.</p><p>Accordingly, the top court directed that if cross-border coverage is excluded, insurance policies must expressly state so and inform policyholders that they would be required to obtain a separate endorsement before undertaking inter-country travel.</p><p></p><div class=\"subhead\" edition=\"EPaper\" layoutdesk=\"TH_Business\" section=\"A\" zone=\"Delhi\"><p>‘No clarification’</p></div><p>The court also pointed to a regulatory vacuum governing cross-border insurance coverage. It observed that while the Inter-Country Transport Vehicles Rules, 2021 provide a legal framework for Indian vehicles to travel abroad under valid inter-country permits, they do not clarify whether a domestic insurance policy extends to the country where the vehicle is permitted to operate.</p><p>“It appears that there is, as of today, no clear statute, binding precedent or regulatory clarification in force that clarifies the extension of insurance policies for cross-border travel. This uncertainty causes hurdles in deciding motor accident claims in a timely and efficient manner, thereby affecting the claimants the most,” the Bench said.</p><p>To address this lacuna, the Bench advised the Insurance Regulatory and Development Authority of India (IRDAI), the regulatory authority for the insurance sector, to consider issuing a master circular standardising cross-border coverage clauses across all motor insurance policies.</p><p>The court accordingly directed the insurance company to deposit the claim amount within four weeks and disposed of the appeal.</p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 77, "title": "HDFC Bank stock plunges over 5% on investor concern over earnings", "section": "Business", "page": "15", "teaser": "Shares of India’s largest private sector lender HDFC Bank on Monday slid 5.08% ₹777.95 apiece on the NSE on investor concern over its first quarter (Q1 FY27) pe...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tHDFC Bank stock plunges over 5%on investor concern over earnings\n</h1><div class=\"author\"><div class=\"author-name\">Lalatendu Mishra</div></div><div class=\"dateLine\"><div class=\"dateline\">MUMBAI</div></div><div class=\"article-picture\"><div class=\"picture verticle\"><img alt=\"HDFC Bank stock plunges over 5%on investor concern over earnings\" class=\"lazy\" data-device-variant=\"FREE~FREE~FREE~FREE\" data-src-template=\"https://eimg.thgim.com/ccidist-ws/th/th_delhi/issues/195330/OPS/Public/GCQG9E8C5.1+G6EG9G3UP.1.jpg\" src=\"../images/ch0078_001.jpg\" title=\"HDFC Bank stock plunges over 5%on investor concern over earnings\"/></div><figcaption class=\"caption\">\n                                \n  \n   \n    Investors lost 74,250 cr. in a day bl-online Administrator\n   \n  \n \n                            </figcaption></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>Shares of India’s largest private sector lender HDFC Bank on Monday slid 5.08% ₹777.95 apiece on the NSE on investor concern over its first quarter (Q1 FY27) performance.</p><p>The fall resulted in shareholders’ wealth erosion of ₹74,250 crore in one day. As per NSE data, the market cap of the bank is down to ₹11,88,000 crore from ₹12,62,250 crore on Friday.</p><p>The bank had on Saturday reported a 5% growth in net profit to ₹19,060 crore viewed as below-market expectation.</p><p>While HDFC Bank saw 5% growth in Q1 net profit, peers ICICI Bank and Axis Bank on the same day reported 16% and 23% growth respectively in net profit to ₹14,805 crore and ₹7,114 crore.</p><p>This comparison brought HDFC Bank’s underperformance to the fore, said analysts.</p><div class=\"subhead\" edition=\"EPaper\" layoutdesk=\"TH_Business\" section=\"A\" zone=\"Delhi\"><p>NIM drops</p></div><p>Although HDFC Bank reported profit growth and healthy expansion in loans and deposits, investors reacted negatively as the bank’s net interest margin (NIM), a key performance indicator. slid to 3.26% or significantly below the levels seen before the bank’s merger with HDFC Ltd.</p><p>This was owing to rising cost of funds, intense competition for deposits and pressure on lending yields, analysts said adding this would keep pressure on the bank’s performance in the coming quarters.</p><p>Several brokerages downgraded ratings of the bank following the results, adding to the negative sentiment in the market.</p><p>The bank had been on the radar since former part time chairman Atanu Chakraborty stepped down abruptly citing ethical concerns. The bank named ex-Finance Secretary Rajiv Kumar in his place, which the RBI approved. It also named Puneet Sharma as the new CFO to replace Srinivasan Vaidyanathan who will retire in November.</p><p>The markets were already under pressure due to rising crude prices on West Asia tensions.</p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 78, "title": "RBI special swap sees over $20 bn inflow", "section": "Business", "page": "15", "teaser": "The Reserve Bank of India’s (RBI) foreign currency swap facility operationalised through Foreign Currency Non-Resident-Bank (FCNR(B)) deposits, external commerc...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tRBI special swap sees over $20 bn inflow\n</h1><div class=\"author\"><div class=\"author-name\">Lalatendu Mishra</div></div><div class=\"dateLine\"><div class=\"dateline\">MUMBAI</div></div><div class=\"article-picture\"><div class=\"picture verticle\"><img alt=\"RBI special swap sees over $20 bn inflow\" class=\"lazy\" data-device-variant=\"FREE~FREE~FREE~FREE\" data-src-template=\"https://eimg.thgim.com/ccidist-ws/th/th_delhi/issues/195330/OPS/Public/GCQG9E8C5.1+G6EG9G3UQ.1.jpg\" src=\"../images/ch0079_001.jpg\" title=\"RBI special swap sees over $20 bn inflow\"/></div><figcaption class=\"caption\">\n                                \n  \n   \n    Banks have been asked to\n    mobilise maximum forex. Dado Ruvic\n   \n  \n \n                            </figcaption></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>The Reserve Bank of India’s (RBI) foreign currency swap facility operationalised through Foreign Currency Non-Resident-Bank (FCNR(B)) deposits, external commercial borrowings (ECBs) and overseas foreign currency borrowings (OFCBs) to mobilise foreign exchange has generated more than $20 billion, according to data released by the RBI.</p><p>“The swap facility has seen avid interest and attracted steady forex inflows since June 8, 2026,” the RBI said.</p><p>Based on the data received from authorised dealer banks of forex inflows mobilised till July 17, was $20.72 billion in all.</p><p>This includes $17.4 billion via FCNR (B), $1.97 billion via OFCBs and $1.34 via ECBs.</p><p>To strengthen India’s balance of payments and incentivise capital inflows, the central bank had on June 5 announced a series of measures, including a facility for offering concessional swaps for fresh FCNR(B) deposits, OFCB and ECB inflows.</p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 79, "title": "No decision on ethanol blending with petrol beyond 20%: MoS", "section": "Business", "page": "15", "teaser": "Notwithstanding a series of measures taken in the recent past to popularise bio-fuel blending, the Centre informed on Monday that no decision had been taken to ...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tNo decision on ethanol blending with petrol beyond 20%: MoS\n</h1><div class=\"author\"><div class=\"author-name\">The Hindu Bureau</div></div><div class=\"dateLine\"><div class=\"dateline\">New Delhi</div></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>Notwithstanding a series of measures taken in the recent past to popularise bio-fuel blending, the Centre informed on Monday that no decision had been taken to increase the blending quantum with petrol beyond the present 20%.</p><p>The government further added that no decision had been taken to blend ethanol with diesel for commercial usage.</p><p>“At present, no decision has been taken by the government to increase ethanol blending in petrol beyond 20% or to introduce ethanol blending in diesel for commercial use,” Suresh Gopi, Minister of State in the Ministry of Petroleum and Natural Gas, told Rajya Sabha while responding to a query.</p><p>“Any future decision, if considered, will be based on comprehensive scientific evaluation, vehicle compatibility studies, stakeholder consultations and the availability of adequate domestic production capacity,” he added.</p><p>However, the government, had in June this year, exempted petrol blended with higher quantum of ethanol, that is, 22-30%, from the levy of central excise duties in an effort to boost biofuel blending.</p><p>Further, the Bureau of Indian Standards (BIS) had notified the technical standards to be adhered to if it was to be rolled out commercially.</p><p></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 80, "title": "IndiGo to order 1,000 engines from CFM International", "section": "Business", "page": "15", "teaser": "IndiGo on Monday announced the signing of a Memorandum of Understanding (MoU) with CFM International to order more than 1,000 LEAP-1A engines for the 510 Airbus...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tIndiGo to order 1,000 engines from CFM International\n</h1><div class=\"article-picture\"><div class=\"picture verticle\"><img alt=\"IndiGo to order 1,000 engines from CFM International\" class=\"lazy\" data-device-variant=\"FREE~FREE~FREE~FREE\" data-src-template=\"https://eimg.thgim.com/ccidist-ws/th/th_delhi/issues/195330/OPS/Public/GCQG9E8C5.1+G6EG9G3US.1.jpg\" src=\"../images/ch0081_001.jpg\" title=\"IndiGo to order 1,000 engines from CFM International\"/></div><figcaption class=\"caption\"></figcaption></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>IndiGo on Monday announced the signing of a Memorandum of Understanding (MoU) with CFM International to order more than 1,000 LEAP-1A engines for the 510 Airbus A320neo family aircraft it has on order. The deal marks the largest single order ever placed for LEAP engines and sets a new record for CFM International. The MoU also covers CFM International’s support for setting up IndiGo’s upcoming engine maintenance, repair and overhaul (MRO) facility.</p><p></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 81, "title": "Indo MIM’s ₹3,812 cr. IPO price band set at ₹461-₹485", "section": "Business", "page": "15", "teaser": "Bengaluru-headquartered Indo MIM Ltd., a precision engineering manufacturer, on Monday fixed a price band of ₹461-485 per share for its ₹3,812 crore initial pub...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tIndo MIM’s ₹3,812 cr. IPO price band set at ₹461-₹485\n</h1><div class=\"author\"><div class=\"author-name\">The Hindu Bureau</div></div><div class=\"dateLine\"><div class=\"dateline\">Mumbai</div></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>Bengaluru-headquartered Indo MIM Ltd., a precision engineering manufacturer, on Monday fixed a price band of ₹461-485 per share for its ₹3,812 crore initial public offering (IPO), which will hit the market on July 23. The maiden offer consists of a fresh issue of equity shares worth ₹500 crore and an offer for sale (OFS) of up to 6.82 crore equity shares by the existing shareholders. At the upper end of the price band, Indo MIM is valued at almost ₹24,000 crore.</p><p>The company plans to use the proceeds of the fresh issue for repaying loans. The issue will close on July 27.</p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 82, "title": "IOB Q1 net profit climbs 49.3% to ₹1,659 crore", "section": "Business", "page": "15", "teaser": "Chennai headquartered Indian Overseas Bank (IOB) saw its net profit rise 49.3% to ₹1,659 crore for the quarter ended June. Net interest income (NII) climbed 34....", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tIOB Q1 net profit climbs 49.3% to ₹1,659 crore\n</h1><div class=\"author\"><div class=\"author-name\">The Hindu Bureau</div></div><div class=\"dateLine\"><div class=\"dateline\">CHENNAI</div></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>Chennai headquartered Indian Overseas Bank (IOB) saw its net profit rise 49.3% to ₹1,659 crore for the quarter ended June. Net interest income (NII) climbed 34.3% year-on- year to ₹3,688 crore.</p><p>Domestic NIM (net interest margin) increased to 3.48% while Global NIM rose to 3.37%.</p><p>Total business went up 17.7% to ₹6,98,325 crore. Deposits grew by 13.72% to ₹3,76,193 crore. For the quarter, the bank saw savings bank deposits rise 18% to ₹1,27,262 crore. The lender expanded domestic network to 3,522 branches with the addition of 28 new branches during Q1.</p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP
