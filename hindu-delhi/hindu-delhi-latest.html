e\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 37, "title": "RS adjourned six times as Opposition parties seek action in paper leak case", "section": "Regional", "page": "13", "teaser": "The Rajya Sabha was adjourned six times on Monday, with the Opposition demanding action against those guilty in the National Eligibility-cum-Entrance Test (NEET...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tRS adjourned six times as Opposition parties seek action in paper leak case\n</h1><div class=\"author\"><div class=\"author-name\">Sobhana K. Nair</div></div><div class=\"dateLine\"><div class=\"dateline\">New Delhi</div></div><h2 class=\"sub-title\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n  Nine newly elected members took oath on the first day of the Monsoon Session amid sloganeering\n</h2><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>The Rajya Sabha was adjourned six times on Monday, with the Opposition demanding action against those guilty in the National Eligibility-cum-Entrance Test (NEET) question paper leak case.</p><p>The day’s proceedings began with Rajya Sabha Chairman C.P. Radhakrishnan administering oath to nine newly elected members, including three who recently switched from the Trinamool Congress to the BJP — Prakash Chik Baraik, Sushmita Dev, and Sukhendu Sekhar Ray. The Opposition shouted slogans when they took oath. Congress members heckled BJP leader Mahesh Kewat, the newly elected member from Madhya Pradesh, where the candidature of Congress’s Meenakshi Natrajan was disqualified.</p><p>BJP member Satish Poonia from Rajasthan, Congress member Pawan Khera from Karnataka, Mukeshbhai J. Rathwa (BJP-Gujarat), James Sangma (National People’s Party-Meghalaya), and Khiangte Laltluangkima (Zoram People’s Movement -Mizoram) were the others who took oath.</p><p>After the oath-taking and customary laying of papers, Leader of the Opposition in the Rajya Sabha Mallikarjun Kharge flagged the recent paper leak, drawing the government’s attention to the police action at Jantar Mantar.</p><div class=\"subhead\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" section=\"A\" zone=\"Delhi\"><p>‘Suppressing issue’</p></div><p>“Thousands of students have reached Jantar Mantar (where the protest is on), and they were lathi-charged,” he said. “The government is trying to beat them down and suppress the issue,” Mr. Kharge said, as Opposition members shouted “shame, shame”.</p><p>Amid the uproar, the Chairman adjourned the House till noon.</p><p>The proceedings were adjourned for the second time till 12.30 p.m. It was adjourned further till 12.50 p.m. and then again till 2 p.m. As the Opposition members continued to raise slogans when the House reassembled, Deputy Chairman Harivansh urged them to maintain decorum.</p><p>When the members refused to relent, he adjourned the House for half-an-hour till 2.30 p.m. and then for the day.</p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 38, "title": "Confer award on ex-police officer within 4 weeks: SC", "section": "Regional", "page": "13", "teaser": "The Supreme Court expressed displeasure with the Union government on Monday over the repeated delay in conferring the President’s Gallantry Award on a former Ma...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tConfer award on ex-police officer within 4 weeks: SC\n</h1><div class=\"author\"><div class=\"author-name\">The Hindu Bureau</div></div><div class=\"dateLine\"><div class=\"dateline\">NEW DELHI</div></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>The Supreme Court expressed displeasure with the Union government on Monday over the repeated delay in conferring the President’s Gallantry Award on a former Madhya Pradesh police officer Vivek Singh Chouhan, who gunned down two dreaded dacoits in an encounter over two decades ago.</p><p>A Bench of Justices Vikram Nath, Sandeep Mehta and R. Mahadevan, hearing an application filed by Union Home Secretary Govind Mohan, granted the Centre time till July 29 to comply with the Madhya Pradesh High Court’s direction to confer the award on Mr. Chouhan. “This concerns a police officer who risked his life in service. The High Court has directed the award to be conferred. What is the justification for seeking further time now?” it asked.</p><p>Solicitor-General Tushar Mehta, appearing for the Centre, informed the Bench that the government had filed a review petition against the Supreme Court’s March 25 order affirming the High Court’s direction.</p><p></p><p>The Bench granted the Centre four weeks as the “last and final opportunity” to comply with the direction and warned that any further non-compliance would invite serious consequences.</p><p></p><p> </p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 39, "title": "HC rejects Trinamool plea to operate three frozen bank accounts", "section": "Regional", "page": "13", "teaser": "The Calcutta High Court on Monday refused the plea of the Trinamool Congress seeking permission to operate three bank accounts containing around ₹440 crore that...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tHC rejects Trinamool plea to operate three frozen bank accounts\n</h1><div class=\"author\"><div class=\"author-name\">Senjuti Sengupta</div></div><div class=\"dateLine\"><div class=\"dateline\">Kolkata</div></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>The Calcutta High Court on Monday refused the plea of the Trinamool Congress seeking permission to operate three bank accounts containing around ₹440 crore that were frozen by the Enforcement Directorate (ED) in a money laundering case.</p><p>The case involved the alleged transfers of party funds for the purchase of an aircraft and a helicopter.</p><p>The Bidhannagar police had earlier frozen the same three accounts on June 19, in response to an FIR lodged by MLA Sandipan Saha, who now belongs to the Ritabrata Banerjee-led faction of the Trinamool Congress. In the FIR, he alleged illegal fund diversion from those accounts.</p><p>However, on July 9, a Bench led by Justice Saugata Bhattacharyya had directed the police to let the Mamata Banerjee-led faction use money from the accounts for daily administrative purposes under the supervision of a special judicial officer.</p><p>Monday’s order came in response to another plea filed by the Mamata Banerjee-led faction on July 10, challenging the ED’s decision to freeze the same accounts following a fresh FIR registered by the agency on July 8.</p><p>The matter has been listed for further hearing on August 26.</p><p></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 40, "title": "SC proposes SIT probe into Ram Temple case", "section": "Regional", "page": "14", "teaser": "Court tells petitioners not to play politics with donation embezzlement case; complainants sought a CBI probe, publication of all financial details of the Trust; Bench lists case for orders on July 27", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tSC proposes SIT probe into Ram Temple case\n</h1><div class=\"author\"><div class=\"author-name\">Krishnadas Rajagopal</div></div><div class=\"dateLine\"><div class=\"dateline\">NEW DELHI</div></div><h2 class=\"sub-title\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n  Court tells petitioners not to play politics with donation embezzlement case; complainants sought a CBI probe, publication of all financial details of the Trust; Bench lists case for orders on July 27\n</h2><div class=\"article-picture\"><div class=\"picture verticle\"><img alt=\"SC proposes SIT probe into Ram Temple case\" class=\"lazy\" data-device-variant=\"FREE~FREE~FREE~FREE\" data-src-template=\"https://eimg.thgim.com/ccidist-ws/th/th_delhi/issues/195330/OPS/Public/GCQG9E8C4.1+G6EG9G3V5.1.jpg\" src=\"../images/ch0041_001.jpg\" title=\"SC proposes SIT probe into Ram Temple case\"/></div><figcaption class=\"caption\">\n                                \n  \n   \n    The police detain Samajwadi Party workers at a recent protest in Lucknow against the alleged embezzlement of donations.  PTI  \n   \n  \n \n                            </figcaption></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p><span class=\"drop_initial\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" multiline=\"0\" section=\"A\" zone=\"Delhi\"></span>The Supreme Court on Monday proposed a Special Investigation Team (SIT) of senior police officers to probe the alleged embezzlement of Ram Temple donations even as it cautioned petitioners against politicising a “simple case of commission of offence”.</p><p>The petitioners have demanded a Central Bureau of Investigation (CBI) probe and publication of the complete financial details, including foreign contributions, of the Shri Ram Janmabhoomi Teerth Kshetra Trust.</p><p>The hearing before a three-judge Bench headed by Chief Justice Surya Kant began with Solicitor-General Tushar Mehta, for the Uttar Pradesh government, informing it that a status report of investigation had been filed in the top court.</p><p>Mr. Mehta briefly said eight people had been arrested and it was better not to divulge more details of an active investigation. The confidential report was filed in a sealed cover in the Supreme Court.</p><p>The Chief Justice enquired whether the SIT mentioned in the report was conducting the probe. Mr. Mehta replied that the State Police was investigating under the oversight of the SIT.</p><p>The Chief Justice, speaking for the Bench, suggested re-constituting the SIT to directly investigate the case. Mr. Mehta agreed to consult the Director-General of Police of the State.</p><p>It was at this point that the Chief Justice turned to petitioners with a stern observation to not “play politics with the case. “We are cautioning… It is a simple case of commission of offence,” the CJI said.</p><div class=\"subhead\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" section=\"A\" zone=\"Delhi\"><p>MP seeks transparency</p></div><p>Appearing for Rashtriya Janata Dal MP Sudhakar Singh, senior advocate Devadatt Kamat urged the court to direct the Temple Trust to publish records of the donations made since inception, and be transparent towards devotees.</p><p>“Devotees have given silver and gold. There are reports that these have vanished. There should be an inventory. It should be published,” Mr. Kamat submitted.</p><p>The Chief Justice raised the possibility of such direction giving someone impetus to falsely claim donation of diamonds and so on. “We have to look at the practical side,” the Chief Justice said, while agreeing that an inventory of valuable offerings must be maintained and accounted for.</p><div class=\"subhead\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" section=\"A\" zone=\"Delhi\"><p>Hearing next week</p></div><p>The Bench listed the case for detailed hearing and orders on July 27.</p><p>During the previous hearing on July 13, the court directed the State to file a status report on the ongoing probe into the case and sought the Trust’s response to petitions seeking to hand over the case to the CBI.</p><p>Mr. Singh’s petition has sought a direction to the Trust to produce a complete statement of cash donations, bank transfers, digital payments, foreign contributions, gold, silver and other valuables, together with the particulars of their accounting, custody and utilisation since its inception.</p><p></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style= _AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 42, "title": "7 killed in landslide in Jammu and Kashmir as rain toll hits 21", "section": "Regional", "page": "14", "teaser": "Seven people, including four women and two children from a family, were killed in a landslide in Poonch district, while three others died in separate shooting-s...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\t7 killed in landslide in Jammu and Kashmir as rain toll hits 21\n</h1><div class=\"author\"><div class=\"author-name\">Peerzada Ashiq</div></div><div class=\"dateLine\"><div class=\"dateline\">Srinagar</div></div><div class=\"article-picture\"><div class=\"picture verticle\"><img alt=\"7 killed in landslide in Jammu and Kashmir as rain toll hits 21\" class=\"lazy\" data-device-variant=\"FREE~FREE~FREE~FREE\" data-src-template=\"https://eimg.thgim.com/ccidist-ws/th/th_delhi/issues/195330/OPS/Public/GCQG9E8C4.1+G6EG9G3V2.1.jpg\" src=\"../images/ch0043_001.jpg\" title=\"7 killed in landslide in Jammu and Kashmir as rain toll hits 21\"/></div><figcaption class=\"caption\">\n                                \n  \n   \n    People look through debris after a mud house was hit by a landslide in Poonch, Jammu and Kashmir, on Monday.  PTI  PTI \n   \n  \n \n                            </figcaption></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>Seven people, including four women and two children from a family, were killed in a landslide in Poonch district, while three others died in separate shooting-stone incidents in Doda district after another spell of heavy rain lashed Jammu and Kashmir on Monday, taking the death toll from rain-related incidents in the past 24 hours to 21.</p><p>Officials said a landslide and flash floods hit the Loran area of Poonch late on Sunday night. Seven people were buried under the debris when the landslide hit their house. All the bodies were retrieved after a day-long rescue operation.</p><p>“The J&amp;K Police actively participated in the rescue operation after a tragic landslide hit a mud house. Rescue efforts are continuing in coordination with all agencies concerned,” said a police spokesman.</p><p>A fresh spell of rain lashed parts of J&amp;K on Monday morning. According to the Meteorological Department, parts of J&amp;K will witness “intense weather over the next 48 hours”. The authorities have issued advisories for all hilly areas, warning people to stay away from streams and landslide-prone areas.</p><p>The flash floods and landslides also disrupted water and electricity supplies in Poonch.</p><p>In Chenab Valley’s Doda district, three persons were killed in separate shooting-stone incidents.</p><p></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 43, "title": "India approves first dengue vaccine for persons aged 4-60", "section": "Regional", "page": "14", "teaser": "The Drug Controller General of India (DCGI) has granted market authorisation to Takeda Biopharmaceuticals India’s QDENGA (TAK-003), making it the first dengue v...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tIndia approves first dengue vaccine for persons aged 4-60\n</h1><div class=\"author\"><div class=\"author-name\">The Hindu Bureau</div></div><div class=\"dateLine\"><div class=\"dateline\">Chennai</div></div><div class=\"article-picture\"><div class=\"picture verticle\"><img alt=\"India approves first dengue vaccine for persons aged 4-60\" class=\"lazy\" data-device-variant=\"FREE~FREE~FREE~FREE\" data-src-template=\"https://eimg.thgim.com/ccidist-ws/th/th_delhi/issues/195330/OPS/Public/GCQG9E8C4.1+G6EG9G3V4.1.jpg\" src=\"../images/ch0044_001.jpg\" title=\"India approves first dengue vaccine for persons aged 4-60\"/></div><figcaption class=\"caption\">\n                                \n  \n   \n    India accounts for one-third of the global dengue burden. \n   \n  \n \n                            </figcaption></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>The Drug Controller General of India (DCGI) has granted market authorisation to Takeda Biopharmaceuticals India’s QDENGA (TAK-003), making it the first dengue vaccine to be approved in the country, according to a press release from the company.</p><p>The vaccine has been approved for the prevention of dengue in individuals aged four to 60. QDENGA is a live-attenuated tetravalent vaccine designed to provide protection against all four dengue virus serotypes and is administered as a two-dose regimen, with doses given three months apart.</p><p>According to the company, the vaccine can be administered irrespective of whether an individual has had a previous dengue infection, and does not require pre-vaccination screening.</p><p>The approval comes as dengue continues to pose a significant public health challenge in India, where reported cases have increased nearly 11-fold over the past two decades. India accounts for nearly one-third of the global dengue burden, although modelling studies suggest the actual number of infections is substantially higher than reported.</p><div class=\"subhead\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" section=\"A\" zone=\"Delhi\"><p>Clinical trials</p></div><p>The approval is based on Takeda’s global clinical development programme comprising 19 Phase I, II and III clinical trials involving over 28,000 participants in dengue-endemic and non-endemic regions.</p><p>The company’s pivotal Phase III trial enrolled more than 20,000 participants across eight dengue-endemic countries.</p><p>According to Takeda, the vaccine demonstrated an efficacy of 80.2% against virologically confirmed dengue 12 months after the second dose, and 90.4% efficacy against dengue-related hospitalisation at 18 months.</p><p>The approval in India was also supported by a Phase III clinical trial conducted among participants aged 4 to 60 years. The company said the study found the vaccine to be safe, well tolerated and immunogenic in children, adolescents and adults.</p><p>Takeda said QDENGA has been approved in 43 countries across Asia, Latin America and Europe, with more than 32 million doses distributed through public and private immunisation programmes.</p><p></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 44, "title": "Humility is devotion", "section": "Regional", "page": "14", "teaser": "‘My way or highway’ seems to be the mantra in this Kali Yuga. This wanting more for oneself is the root cause of one’s dissatisfaction in life. Many of us fail ...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tHumility is devotion\n</h1><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>‘My way or highway’ seems to be the mantra in this Kali Yuga. This wanting more for oneself is the root cause of one’s dissatisfaction in life. Many of us fail to grasp that good principles and leading a dharmic life as guided by one’s guru are the gateway to mental peace, spiritual progress and true happiness, said P. Swaminathan.</p><p>Swami Prabhupada said, “Accepting a guru is not merely for civilisation. A guru is essential for everyone who is genuinely interested in knowing God, on leading a spiritual life, the process of it and (their) relationship with God.” A guru is one who brings you from darkness to light. Such a person is without ego, placing emphasis on the importance of truth. The court of King Janaka was always filled with vedic pundits and scholars, engaged in heated but healthy debates. The court maharshi was Yajnavalkya, who was held in high regard. Spiritual conferences were held often in the court and during one such event, a number of scholars, sages and pundits arrived to take part in the same. Even Janaka was amazed at the turnout. The debates were of high quality and after the end of many rounds, only two were left standing. One was Yajnavalkya and the other was Maitreyi. The two, one male and the other female, engaged in a heated debate at the end of which Maitreyi emerged victorious. Accepting defeat, the maharshi fell at her feet and begged her to take him on as her disciple. Seeing the ocean of wisdom supplicating to her, Maitreyi was overcome with emotion and urged the royal rishi to wed her instead. One may feel the urge to be praised — it is human nature — but humility is devotion. It trumps everything.</p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div>< dy": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tSC refuses to intervene in HC decision on CPV tenders\n</h1><div class=\"article-picture\"><div class=\"picture verticle\"><img alt=\"SC refuses to intervene in HC decision on CPV tenders\" class=\"lazy\" data-device-variant=\"FREE~FREE~FREE~FREE\" data-src-template=\"https://eimg.thgim.com/ccidist-ws/th/th_delhi/issues/195330/OPS/Public/GCQG9E8C4.1+G6EG9G3VD.1.jpg\" src=\"../images/ch0046_001.jpg\" title=\"SC refuses to intervene in HC decision on CPV tenders\"/></div><figcaption class=\"caption\"></figcaption></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>The Supreme Court on Monday refused to intervene against a Delhi High Court decision to quash tenders outsourcing Consular, Passport and Visa (CPV) services at Indian missions in Abu Dhabi, Kuwait, Singapore and Canberra. It said the Centre was free to evolve a temporary mechanism to provide services “in a manner as may be appropriate” till fresh allocation of work was made after the new tender process was completed. The High Court, on July 15, had set aside the tendering of CPV services on the ground that the technical evaluation of bidders was unfair and lacked transparency.</p><p></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 46, "title": "Tripura DGP found dead; investigation launched", "section": "Regional", "page": "14", "teaser": "Tripura Director-General of Police Anurag Dhankar was found dead under mysterious circumstances in his office on Monday. His body was reportedly found in the wa...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tTripura DGPfound dead; investigation launched\n</h1><div class=\"author\"><div class=\"author-name\">The Hindu Bureau</div></div><div class=\"dateLine\"><div class=\"dateline\">Agartala</div></div><div class=\"article-picture\"><div class=\"picture verticle\"><img alt=\"Tripura DGPfound dead; investigation launched\" class=\"lazy\" data-device-variant=\"FREE~FREE~FREE~FREE\" data-src-template=\"https://eimg.thgim.com/ccidist-ws/th/th_delhi/issues/195330/OPS/Public/GCQG9E8C4.1+G6EG9G3V3.1.jpg\" src=\"../images/ch0047_001.jpg\" title=\"Tripura DGPfound dead; investigation launched\"/></div><figcaption class=\"caption\">\n                                \n  \n   \n    Anurag Dhankar  \n   \n  \n \n                            </figcaption></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>Tripura Director-General of Police Anurag Dhankar was found dead under mysterious circumstances in his office on Monday. His body was reportedly found in the washroom adjoining his chamber at the police headquarters in Agartala around 11.40 a.m.</p><p>Sources indicate that Mr. Dhankar entered the office bathroom around 11 a.m. and after a prolonged absence, his staff forced open the door only to find him hanging. He was swiftly transported to Agartala Medical College and GBP Hospital, where he was admitted to the ICU before being declared dead. The police have registered a case of unnatural death and begun investigation.</p><p></p><p><span class=\"italic\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" multiline=\"0\" section=\"A\" zone=\"Delhi\">(Those in distress can call the Tele-MANAS helpline 14416)</span></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 47, "title": "APAAR: SC to direct CBSE to comply with HC order", "section": "Regional", "page": "14", "teaser": "The Supreme Court agreed to clarify on Monday that the Central Board of Secondary Education’s implementation of the Automated Permanent Academic Account Registr...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tAPAAR: SC to direct CBSEto comply with HC order\n</h1><div class=\"author\"><div class=\"author-name\">Krishnadas Rajagopal</div></div><div class=\"dateLine\"><div class=\"dateline\">NEW DELHI</div></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>The Supreme Court agreed to clarify on Monday that the Central Board of Secondary Education’s implementation of the Automated Permanent Academic Account Registry (APAAR) across India must be voluntary as per an Orissa High Court judgment of last year, which had directed a clear “opt-out/refusal option” in the consent form.</p><p>A three-judge Bench headed by Chief Justice of India Surya Kant told petitioner-parents led by Abhishek Baxi, represented by senior advocate Indira Jaising and Paras Nath Singh, in open court that it would pass an order requiring the CBSE to comply with an Orissa High Court judgment of December 12, 2025. The High Court judgment in <span class=\"italic\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" multiline=\"0\" section=\"A\" zone=\"Delhi\">Rohit Anand Das versus State Of Odisha </span>had directed the APAAR consent form to “include an opt out/refusal of consent option”.</p><p>“We will pass an order to the CBSE to give effect to the judgment on a pan-India basis,” the Chief Justice said.</p><p></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 48, "title": "Don’t level baseless graft claims against judiciary: SC", "section": "Regional", "page": "14", "teaser": "The Supreme Court on Monday cautioned against levelling unsubstantiated corruption allegations against judicial officers, observing that the virality of content...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tDon’t level baseless graft claims against judiciary: SC\n</h1><div class=\"author\"><div class=\"author-name\">Aaratrika Bhaumik</div></div><div class=\"dateLine\"><div class=\"dateline\">NEW DELHI</div></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>The Supreme Court on Monday cautioned against levelling unsubstantiated corruption allegations against judicial officers, observing that the virality of content on social media could irreparably “tarnish” a judge’s career.</p><p>The court was hearing a plea filed by activist Gulshan Pahuja challenging a High Court order refusing to extend the time granted to him to surrender. Mr. Pahuja has been sentenced to six months’ imprisonment for criminal contempt over allegedly derogatory videos targeting judicial officers.</p><p>A Bench of Justices Dipankar Datta and Sheel Nagu observed that while it had “sympathies” for Mr. Pahuja, allegations of corruption against judicial officers could not be levelled in the absence of any credible evidence.</p><p></p><p></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 49, "title": "Fake OMR sheets will invite legal action: NTA", "section": "Regional", "page": "14", "teaser": "In the wake of many optical mark recognition (OMR) sheets submitted for scrutiny turning out to be fake or AI-generated, students and parents are advised to sub...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tFake OMR sheets will invite legal action: NTA\n</h1><div class=\"author\"><div class=\"author-name\">The Hindu Bureau</div></div><div class=\"dateLine\"><div class=\"dateline\">New Delhi</div></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>In the wake of many optical mark recognition (OMR) sheets submitted for scrutiny turning out to be fake or AI-generated, students and parents are advised to submit only original OMRs for scrutiny, the National Testing Agency (NTA) stated on Monday.</p><p>“Any fake or AI-generated OMR may invite legal action against the complainant. The NTA is closely scrutinising and monitoring all complaints,” the agency has further said.</p><p>It has come to the notice of the National Testing Agency that images of OMR answer sheets said to be the “correct” record of certain candidates who appeared in NEET(UG) 2026 are being circulated on social media, in support of claims that the results declared against those candidates are wrong, the NTA further said.</p><p></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 50, "title": "Family of H.P. seafarer killed in U.S. strike seeks justice", "section": "Regional", "page": "14", "teaser": "More than a month after his son was killed in a U.S. strike on a commercial ship, Rajesh Sharma on Monday urged Himachal Pradesh Chief Minister Sukhvinder Singh...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tFamily of H.P. seafarer killed in U.S. strike seeks justice\n</h1><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>More than a month after his son was killed in a U.S. strike on a commercial ship, Rajesh Sharma on Monday urged Himachal Pradesh Chief Minister Sukhvinder Singh Sukhu to raise the matter with the Centre, alleging that no action has been taken in the incident. Aditya Sharma, 23, a merchant navy cadet from Hamirpur district, was killed after the U.S. military struck Palau-flagged vessel near the Strait of Hormuz on June 10. Mr. Sharma, accompanied by his wife, met Mr. Sukhu and sought justice for his son, according to an official statement. <span class=\"tagline_contrib\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" multiline=\"0\" section=\"A\" zone=\"Delhi\">PTI</span></p><p></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 51, "title": "Kerala double murder case convict sentenced to death", "section": "National", "page": "6", "teaser": "Palakkad court says the case is ‘rarest of rare’ and convict remains a threat to society, citing that he had killed a relative of the victims before; it directs State to pay ₹20 lakh to the victims’ children", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tKerala double murder case convict sentenced to death\n</h1><div class=\"author\"><div class=\"author-name\">Abdul Latheef Naha</div></div><div class=\"dateLine\"><div class=\"dateline\">PALAKKAD</div></div><h2 class=\"sub-title\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n  Palakkad court says the case is ‘rarest of rare’ and convict remains a threat to society, citing that he had killed a relative of the victims before; it directs State to pay ₹20 lakh to the victims’ children\n</h2><div class=\"article-picture\"><div class=\"picture verticle\"><img alt=\"Kerala double murder case convict sentenced to death\" class=\"lazy\" data-device-variant=\"FREE~FREE~FREE~FREE\" data-src-template=\"https://eimg.thgim.com/ccidist-ws/th/th_delhi/issues/195330/OPS/Public/GCQG9E8BS.1+G6EG9G4CB.1.jpg\" src=\"../images/ch0052_001.jpg\" title=\"Kerala double murder case convict sentenced to death\"/></div><figcaption class=\"caption\">\n                                \n  \n   \n    Chenthamara being transferred from a court in Palakkad, to Viyyur Central Jail in Thrissur. K. K. Mustafah \n   \n  \n \n                            </figcaption></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p><span class=\"drop_initial\" edition=\"EPaper\" layoutdesk=\"TH_National\" multiline=\"0\" section=\"A\" zone=\"Delhi\"></span>Additional District and Sessions Court-IV, Palakkad, on Monday sentenced Chenthamara, the lone convict in the Pothundy double murder case, to death by hanging. The court held that the case fell under the “rarest of rare” category. The sentence is subject to confirmation by the Kerala High Court.</p><p>Judge Kenneth George also imposed a fine of ₹20 lakh and directed that it be paid as compensation to the victims’ children. As Chenthamara has no means to pay, the court directed the State to provide the compensation. The court had found Chenthamara guilty of murdering Sudhakaran, 50, and his 75-year-old mother, Lakshmi, at their home at Boyan Colony, Pothundy on January 27, 2025. They were hacked to death. Chenthamara was convicted under Sections 103(1) and 126(2) of the Bharatiya Nyaya Sanhita (BNS).</p><p>The judge accepted the prosecution’s case that the murders were premeditated. He also held that Chenthamara remained a threat to society.</p><div class=\"subhead\" edition=\"EPaper\" layoutdesk=\"TH_National\" section=\"A\" zone=\"Delhi\"><p>Lack of remorse</p></div><p>The court said the circumstantial nature of the evidence did not preclude the death penalty and cited Chenthamara’s lack of remorse, repeated attempts to justify the killings, and threats against the victims’ family.</p><p></p><p>The court also took note of Chenthamara’s earlier conviction for the murder of Sudhakaran’s wife Sajita. In October 2025, the same court had sentenced him to double life imprisonment in that case.</p><p>According to the prosecution, Chenthamara blamed Sudhakaran’s family for his wife and daughter leaving him and later believed they had used black magic against him.</p><p>While out on bail in the Sajita murder case, he returned to Pothundy in violation of bail conditions and hacked Sudhakaran and Lakshmi to death. The murders drew criticism against the police after relatives alleged that complaints about the man’s threats had been ignored.</p><p></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 52, "title": "Hidden history", "section": "National", "page": "6", "teaser": "", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tHidden history\n</h1><div class=\"article-picture\"><div class=\"picture verticle\"><img alt=\"Hidden history\" class=\"lazy\" data-device-variant=\"FREE~FREE~FREE~FREE\" data-src-template=\"https://eimg.thgim.com/ccidist-ws/th/th_delhi/issues/195330/OPS/Public/GCQG9E8BS.1+G6EG9G4CA.1.jpg\" src=\"../images/ch0053_001.jpg\" title=\"Hidden history\"/></div><figcaption class=\"caption\">\n                                \n  \n   \n    Coastal relic: A World War II-era pillbox is partially visible on R.K. Beach in Visakhapatnam following seasonal sea erosion on Monday. Built by the British as coastal defence bunkers, four such pillboxes along the beach are exposed for a few months each year.K.R. DEEPAKKR DEEPAK\n   \n  \n \n                            </figcaption></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 53, "title": "Core sectors grow at five-month high of 5%", "section": "National", "page": "6", "teaser": "India’s core industrial sectors grew at 5% in June 2026, the fastest in five months, as per the inaugural release of the new and updated series of the Index of ...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tCore sectors grow at five-month high of 5%\n</h1><div class=\"author\"><div class=\"author-name\">T.C.A. Sharad Raghavan</div></div><div class=\"dateLine\"><div class=\"dateline\">NEW DELHI</div></div><div class=\"article-picture\"><div class=\"picture verticle\"><img alt=\"Core sectors grow at five-month high of 5%\" class=\"lazy\" data-device-variant=\"FREE~FREE~FREE~FREE\" data-src-template=\"https://eimg.thgim.com/ccidist-ws/th/th_delhi/issues/195330/OPS/Public/GCQG9E8BS.1+G6EG9G4C7.1.jpg\" src=\"../images/ch0054_001.jpg\" title=\"Core sectors grow at five-month high of 5%\"/></div><figcaption class=\"caption\"></figcaption></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>India’s core industrial sectors grew at 5% in June 2026, the fastest in five months, as per the inaugural release of the new and updated series of the Index of Core Industries (ICI).</p><p></p><p>The Ministry of Commerce and Industry on Monday released
