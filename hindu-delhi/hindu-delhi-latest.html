iv></div></div></div></div>"}, {"id": 83, "title": "Bondada bags NTPC order for 100 MWh battery storage", "section": "Business", "page": "15", "teaser": "Bondada Engineering has bagged an engineering, procurement and construction (EPC) package from NTPC Renewable Energy (NTPC REL) for developing a 100 MWh Vanadiu...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tBondada bags NTPC order for 100 MWh battery storage\n</h1><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>Bondada Engineering has bagged an engineering, procurement and construction (EPC) package from NTPC Renewable Energy (NTPC REL) for developing a 100 MWh Vanadium Redox Flow Battery Energy Storage System (VRFB BESS) at Khavda Solar Park in Gujarat, with Delectrik Systems as the technology partner. The project will leverage VRFB technology that offers several advantages over conventional lithium iron phosphate (LFP) battery systems.</p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 84, "title": "India joins WTO’s agreement on fisheries subsidies", "section": "Business", "page": "15", "teaser": "India on Monday announced it had joined the WTO’s agreement on fisheries subsidies, which prohibits government support to illegal fishing activities and over-ex...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tIndia joins WTO’s agreement on fisheries subsidies\n</h1><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>India on Monday announced it had joined the WTO’s agreement on fisheries subsidies, which prohibits government support to illegal fishing activities and over-exploitation of stocks. The agreement focuses on subsidies related to marine wild capture fishing and fishing-related activities at sea. It was adopted by consensus at the 12th WTO Ministerial Conference in Geneva in 2022 and the first multilateral WTO agreement with an environmental sustainability objective.<span class=\"tagline_contrib\" edition=\"EPaper\" layoutdesk=\"TH_Business\" multiline=\"1\" section=\"A\" zone=\"Delhi\">pti</span></p><p></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 85, "title": "Houthis declare maritime blockade of Saudi Arabia at Red Sea gateway", "section": "Foreign", "page": "16", "teaser": "Iran-aligned group based in Yemen says the naval ban at the Bab el-Mandeb Strait will be effective immediately, calling the move an ‘equation of an eye for an eye’; blockade will strain Saudi Arabia’s economy by cutting off access to its Red Sea ports", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tHouthis declare maritime blockade of Saudi Arabia at Red Sea gateway\n</h1><div class=\"author\"><div class=\"author-name\">Agence France-Presse</div></div><div class=\"dateLine\"><div class=\"dateline\">Sanaa</div></div><h2 class=\"sub-title\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n  Iran-aligned group based in Yemen says the naval ban at the Bab el-Mandeb Strait will be effective immediately, calling the move an ‘equation of an eye for an eye’; blockade will strain Saudi Arabia’s economy by cutting off access to its Red Sea ports\n</h2><div class=\"article-picture\"><div class=\"picture verticle\"><img alt=\"Houthis declare maritime blockade of Saudi Arabia at Red Sea gateway\" class=\"lazy\" data-device-variant=\"FREE~FREE~FREE~FREE\" data-src-template=\"https://eimg.thgim.com/ccidist-ws/th/th_delhi/issues/195330/OPS/Public/GCQG9E8C6.1+G6EG9G3UG.1.jpg\" src=\"../images/ch0086_001.jpg\" title=\"Houthis declare maritime blockade of Saudi Arabia at Red Sea gateway\"/></div><figcaption class=\"caption\">\n                                \n  \n   \n    Strategic waterway: Yemeni fishermen pass by a commercial ship at the Bab el-Mandeb Strait, Yemen.AP\n   \n  \n \n                            </figcaption></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p><span class=\"drop_initial\" edition=\"EPaper\" layoutdesk=\"TH_Foreign\" multiline=\"0\" section=\"A\" zone=\"Delhi\"></span>Yemen’s Iran-backed Houthis announced a maritime embargo of Saudi Arabia on Monday, stepping up the U.S.-Iran war as the rebels threatened the top oil exporter’s ability to bypass the Strait of Hormuz.</p><p>Deputy head of the Houthi media office, Nasruddin Amer, said on X that the Bab el-Mandeb strait will be closed in response to what he called Saudi Arabia’s “unjust blockade on Yemenis for over 10 years.”</p><p>The group’s announcement came as Iran said it was back to a “full-scale war” with the United States.</p><p>Houthi military spokesperson, Yahya Saree, said in a video statement that the ban will be effective immediately, describing it as an “equation of ‘an eye for an eye.’”</p><p>“Any foolish act committed by the reckless Saudi enemy will be met with a comprehensive escalation,” Mr. Saree added.</p><p>Bab el-Mandeb, at the southern tip of the Arabian Peninsula, is the gateway to the Red Sea through which around 12% of the world’s trade passes. The Houthis earlier demonstrated their ability to disrupt shipping there when they targeted ships for months over the Israel-Hamas war in Gaza, with over 100 vessels attacked.</p><div class=\"subhead\" edition=\"EPaper\" layoutdesk=\"TH_Foreign\" section=\"A\" zone=\"Delhi\"><p>First fire</p></div><p>Saudi Arabia and the Houthis traded fire last week for the first time in years, threatening a 2022 truce that has held despite expiring.</p><p>The exchange of fire was set off when an Iranian plane arriving from Tehran attempted to land in Sanaa, challenging Saudi Arabia’s hegemony over Yemeni skies.</p><p>The Houthis’ naval blockade, if enforced, could further strain Saudi Arabia’s economy by cutting off access to its Red Sea ports, which have been vital for oil exports as renewed fighting limits passage through the Strait of Hormuz.</p><p>The blockade is also expected to hurt global markets that rely on Saudi Arabia — the world’s leading crude exporter, producing over 10 million barrels per day — for their energy imports.</p><p><span class=\"italic\" edition=\"EPaper\" layoutdesk=\"TH_Foreign\" multiline=\"1\" section=\"A\" zone=\"Delhi\">(With inputs from The Associated Press)</span></p><p></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 86, "title": "Sathiyan keeps Delhi’s hopes alive", "section": "Foreign", "page": "16", "teaser": "Captain G. Sathiyan led from the front as Dabang Delhi TTC kept its Ultimate Table Tennis (UTT) Season 7 semifinal hopes alive with a hard-fought victory over A...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tSathiyan keeps Delhi’s hopes alive\n</h1><div class=\"author\"><div class=\"author-name\">Amol Karhadkar</div></div><div class=\"dateLine\"><div class=\"dateline\">Panaji</div></div><div class=\"article-picture\"><div class=\"picture verticle\"><img alt=\"Sathiyan keeps Delhi’s hopes alive\" class=\"lazy\" data-device-variant=\"FREE~FREE~FREE~FREE\" data-src-template=\"https://eimg.thgim.com/ccidist-ws/th/th_delhi/issues/195330/OPS/Public/GCQG9E8C6.1+G6EG9G3UC.1.jpg\" src=\"../images/ch0087_001.jpg\" title=\"Sathiyan keeps Delhi’s hopes alive\"/></div><figcaption class=\"caption\">\n                                \n  \n   \n    Sathiyan... on the prowl. BUTTERFLY UTTR. Parthibhan\n   \n  \n \n                            </figcaption></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>Captain G. Sathiyan led from the front as Dabang Delhi TTC kept its Ultimate Table Tennis (UTT) Season 7 semifinal hopes alive with a hard-fought victory over Ahmedabad APL Pipers at the Dr. Shyama Prasad Mukherjee Indoor Stadium on Monday.</p><p>Sathiyan’s clean sweep of Payas Jain, an opponent who has troubled him over the past few seasons, proved decisive in a closely contested tie. The 9-6 result means that Delhi will head into its final league fixture against PBG Pune Jaguars on Thursday precisely knowing the permutations.</p><p>With Dempo Goa Challengers, U Mumba TT and HVR Kolkata Thunder Blades having already secured last-four berths, both Delhi and Ahmedabad needed a convincing victory to stay in the race. After the opening three matches, there was little to separate the teams, with Delhi holding a slender 5-4 advantage. The onus fell on Sathiyan to deliver against Payas.</p><p>The youngster looked set to turn the contest in Ahmedabad’s favour as he surged to a 10-6 lead in the first game, his powerful winners repeatedly piercing Sathiyan’s defence.</p><p>But the veteran responded with his trademark composure, reeling off five consecutive points to snatch the opener. Buoyed by the comeback, Sathiyan adopted a more aggressive approach to take the second game comfortably.</p><p>Even when he trailed 2-5 in the third game, Sathiyan refused to relent. He continued to pile pressure on Payas, forcing errors at crucial moments before completing a facile win.</p><p>Ahmedabad stayed alive in the semifinal race only because Manika Batra defeated Sutirtha Mukherjee in the final match. Had Sutirtha prevailed, Delhi would have knocked Pipers out of top-four contention.</p><p><span class=\"leadin\" edition=\"EPaper\" layoutdesk=\"TH_Foreign\" multiline=\"2\" section=\"A\" zone=\"Delhi\"><span class=\"bold\" edition=\"EPaper\" layoutdesk=\"TH_Foreign\" multiline=\"0\" section=\"A\" zone=\"Delhi\">The result: Dabang Delhi TTC bt Ahmedabad APL Pipers 9-6</span> (Youssef Abdelaziz bt Adrien Rassenfosse 11-6, 5-11, 11-10; Maria Xiao lost to Sofia Polcanova 2-11, 11-9, 10-11; G. Sathiyan &amp; Maria bt Payas Jain &amp; Polcanova 11-7, 9-11, 11-4; Sathiyan bt Payas 11-10, 11-8, 11-7; Sutirtha Mukherjee lost to Manika Batra 5-11, 3-11, 11-9).</span></p><p><span class=\"leadin\" edition=\"EPaper\" layoutdesk=\"TH_Foreign\" multiline=\"2\" section=\"A\" zone=\"Delhi\"><span class=\"bold\" edition=\"EPaper\" layoutdesk=\"TH_Foreign\" multiline=\"0\" section=\"A\" zone=\"Delhi\">The standings:</span> Dempo Goa Challengers 46 points (5 ties), Ahmedabad APL Pipers 45 (6), U Mumba TT 41 (5), HVR Kolkata Thunder Blades 41 (5), Dabang Delhi TTC 36 (5), PBG Pune Jaguars 34 (5), UP Prometheans 27 (5).</span></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 87, "title": "A sad story: Sharath on TT’s CWG omission", "section": "Foreign", "page": "16", "teaser": "The Commonwealth Games has long been a rich hunting ground for Indian sportspersons, and table tennis emerged as one of the country’s most successful discipline...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tA sad story: Sharath on TT’s CWG omission\n</h1><div class=\"author\"><div class=\"author-name\">K. Keerthivasan</div></div><div class=\"article-picture\"><div class=\"picture verticle\"><img alt=\"A sad story: Sharath on TT’s CWG omission\" class=\"lazy\" data-device-variant=\"FREE~FREE~FREE~FREE\" data-src-template=\"https://eimg.thgim.com/ccidist-ws/th/th_delhi/issues/195330/OPS/Public/GCQG9E8C6.1+G6EG9G3UD.1.jpg\" src=\"../images/ch0088_001.jpg\" title=\"A sad story: Sharath on TT’s CWG omission\"/></div><figcaption class=\"caption\">\n                                \n  \n   \n    Sharath. FILE PHOTO: R. RAVINDRANRAVINDRAN R\n   \n  \n \n                            </figcaption></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>The Commonwealth Games has long been a rich hunting ground for Indian sportspersons, and table tennis emerged as one of the country’s most successful disciplines from 2006.</p><p>Since the sport made its debut at Manchester in 2002, India has tasted success at every edition, amassing 28 medals, including 10 gold.</p><p>No one has contributed more to that success than A. Sharath Kamal. The 44-year-old has won 13 medals — seven gold, three silver and three bronze — accounting for 46% of India’s overall Commonwealth Games table tennis tally.</p><p>Until Sharath burst onto the scene, India’s contribution to Commonwealth Games table tennis had been modest. Sharath’s breakthrough at the 2006 Melbourne Games — where he won the men’s singles and team gold medals — started the medal rush at CWG.</p><p>The omission of table tennis from the 2026 Commonwealth Games in Glasgow beginning August 23, alongside shooting, wrestling, badminton, hockey and squash, has therefore come as a major disappointment.</p><p>Sharath believes the decision is a huge setback for Indian athletes, many of whom rely on the Games for recognition and financial rewards.</p><p>“It’s quite a sad story for sport, by and large, especially for athletes who are training for these major competitions. Winning here gives us that platform, make a mark in our career and bring those major achievements with which we can get high cash incentives,” Sharath said during a recent virtual media interaction organised by the Sports Authority of India.</p><p>Despite table tennis missing out in Glasgow, Sharath expects India to perform well and hopes to be there in some capacity to support the contingent.</p><p>Looking ahead to the Asian Games in Japan where the two-time medallist will be the Deputy Chef-de-Mission, Sharath believes India’s strongest medal prospects lie in doubles events.</p><p>“In doubles, we stand a fantastic chance with Manav Thakkar and Manush Shah, World No. 2 in men’s doubles. We also have a good chance in mixed doubles with Manush and Diya Chitale. Singles is going to be very tough,” he said.</p><p><span class=\"italic\" edition=\"EPaper\" layoutdesk=\"TH_Foreign\" multiline=\"0\" section=\"A\" zone=\"Delhi\">(The Commonwealth Games will be shown live on Sony Sports Network and Sony LIV). </span></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 88, "title": "Thousands of Israelis march seeking return of settlements in Gaza Strip", "section": "Foreign", "page": "16", "teaser": "Thousands of Israelis, including settlers and right-wing activists, marched towards the border with Gaza on Sunday, calling on the government to re-establish Is...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tThousands of Israelis march seeking return of settlements in Gaza Strip\n</h1><div class=\"author\"><div class=\"author-name\">Agence France-Presse</div></div><div class=\"dateLine\"><div class=\"dateline\">Tel Aviv</div></div><div class=\"article-picture\"><div class=\"picture verticle\"><img alt=\"Thousands of Israelis march seeking return of settlements in Gaza Strip\" class=\"lazy\" data-device-variant=\"FREE~FREE~FREE~FREE\" data-src-template=\"https://eimg.thgim.com/ccidist-ws/th/th_delhi/issues/195330/OPS/Public/GCQG9E8C6.1+G6EG9G3UE.1.jpg\" src=\"../images/ch0089_001.jpg\" title=\"Thousands of Israelis march seeking return of settlements in Gaza Strip\"/></div><figcaption class=\"caption\">\n                                \n  \n   \n    Settler push: Israeli Minister Itamar Ben-Gvir seen during the march towards the Gaza Strip in southern Israel on Sunday.REUTERS\n   \n  \n \n                            </figcaption></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>Thousands of Israelis, including settlers and right-wing activists, marched towards the border with Gaza on Sunday, calling on the government to re-establish Israeli settlements in the war-shattered Palestinian territory.</p><p>The demonstrators gathered near the border before walking in large numbers towards the fence overlooking northern Gaza, where Israeli security forces were deployed to prevent participants from advancing further.</p><p></p><p>“We are walking today to tell the government of Israel and show all the world that this land belongs to us and that Gaza really belongs to us and that we want to go back there,” a participant said.</p><p></p><p>Another participant said the event marked what he viewed as “just the beginning” of a campaign to restore Israeli communities in the coastal territory.</p><p>“We are having a big march back to the Gaza Strip, back to where Jews lived for hundreds, thousands of years,” he said, adding that the 2005 withdrawal had been temporary.</p><p></p><p>Previous marches have likewise sought to pressure the government of Prime Minister Benjamin Netanyahu to re-establish settlements in the territory—much of which has been rendered uninhabitable by more than two years of war.</p><p></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 89, "title": "Ukrainian, Russian strikes kill over a dozen civilians", "section": "Foreign", "page": "16", "teaser": "A Ukrainian drone strike on a bus in Russia’s Belgorod region killed five people including a child on Monday, authorities said, while Kyiv said Russian strikes ...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tUkrainian, Russian strikes kill over a dozen civilians\n</h1><div class=\"author\"><div class=\"author-name\">Agence France-Presse</div></div><div class=\"dateLine\"><div class=\"dateline\">Moscow</div></div><div class=\"article-picture\"><div class=\"picture verticle\"><img alt=\"Ukrainian, Russian strikes kill over a dozen civilians\" class=\"lazy\" data-device-variant=\"FREE~FREE~FREE~FREE\" data-src-template=\"https://eimg.thgim.com/ccidist-ws/th/th_delhi/issues/195330/OPS/Public/GCQG9E8C6.1+G6EG9G3UF.1.jpg\" src=\"../images/ch0090_001.jpg\" title=\"Ukrainian, Russian strikes kill over a dozen civilians\"/></div><figcaption class=\"caption\">\n                                \n  \n   \n    Caught in crossfire: Residents look at their ruined home following a Russian air strike in Zaporizhzhia on Sunday.AP\n   \n  \n \n                            </figcaption></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>A Ukrainian drone strike on a bus in Russia’s Belgorod region killed five people including a child on Monday, authorities said, while Kyiv said Russian strikes on several Ukrainian cities left at least eight dead.</p><p>Russia has escalated its bombardment of Ukraine, killing dozens of people in missile strikes since the beginning of the month, according to Ukrainian authorities. Kyiv has also intensified its retaliatory strikes.</p><p></p><p>In Russia’s Shebekino, a Ukrainian drone “deliberately and cynically struck a passenger coach”, the acting Governor of Russia’s Belgorod region said.</p><p>“Five civilians, including a minor, were killed as a result of this attack... In addition, 23 civilians were injured, including a teenager,” he added.</p><p>In Ukraine, Russian strikes on the cities of Pavlograd and Kramatorsk killed two people each, while Russian bombardment of the Ukrainian regions of Odesa and Zaporizhzhia killed four others, according to Ukrainian authorities.</p><p>Earlier on Monday, Ukraine launched scores of drones at the Moscow region, sparking fires and wounding at least 10 people, Russia said.</p><p>Both Russia and Ukraine — which deny targeting civilians — have launched repeated strikes on each other in recent months, as U.S.-led talks on ending the nearly four-and-a-half year conflict remain stalled.</p><p></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 90, "title": "Chess legend Judit Polgar declines post of Hungary President", "section": "Foreign", "page": "16", "teaser": "Chess legend Judit Polgar on Monday turned down Hungarian Prime Minister Peter Magyar’s offer to join his push to break with the Viktor Orban era as the country...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tChess legend Judit Polgar declines post of Hungary President\n</h1><div class=\"author\"><div class=\"author-name\">Agence France-Presse</div></div><div class=\"dateLine\"><div class=\"dateline\">Budapest</div></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>Chess legend Judit Polgar on Monday turned down Hungarian Prime Minister Peter Magyar’s offer to join his push to break with the Viktor Orban era as the country’s President.</p><p>The pro-European conservative had nominated Ms. Polgar, widely considered the greatest woman to have taken to the chequered board, as a figure from outside politics to help carry out his promise of “regime change” from Mr. Orban’s hardline 16-year tenure.</p><p>“I do not feel I have the strength to take on the historic responsibility of uniting a divided nation, and so I am unable to accept the invitation,” Ms. Polgar posted on social media.</p><p>“I will do everything in my power to support a new, independent, and respected President of the Republic in achieving these goals,” she added.</p><p>President Tamas Sulyok was removed by a constitutional amendment last week.</p><p></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 91, "title": "China, Philippines trade barbs in South China Sea encounter", "section": "Foreign", "page": "16", "teaser": "The Philippine military on Monday accused China’s coast guard of allegedly injuring a Filipino sailor during an incident in the disputed Second Thomas Shoal in ...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tChina, Philippines trade barbs in South China Sea encounter\n</h1><div class=\"author\"><div class=\"author-name\">Associated Press</div></div><div class=\"dateLine\"><div class=\"dateline\">MANILA</div></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>The Philippine military on Monday accused China’s coast guard of allegedly injuring a Filipino sailor during an incident in the disputed Second Thomas Shoal in the South China Sea.</p><p>The military said Chinese coast guard personnel aboard a motorboat repeatedly struck the sailor on the head with a wooden baton, injuring him and damaging his smaller vessel.</p><p></p><p>China’s coast guard responded by claiming that two rubber boats belonging to a Filipino vessel had rammed the Chinese patrol boat. “During the incident, Philippine personnel attacked Chinese law enforcement personnel using oars and long sticks,” the Chinese coast guard said in a statement on social media.</p><p>The row was just the latest altercation between Chinese and Philippines personnel in disputed waters in the South China Sea, which Beijing claims virtually in its entirety.</p><p></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Deskt </div>"}, {"id": 92, "title": "Khalil al-Hayya, Hamas’ negotiator in Gaza talks, named group chief", "section": "Foreign", "page": "16", "teaser": "Palestinian group Hamas said on Monday that it had elected Khalil al-Hayya, the group’s negotiator in indirect truce talks with Israel, as the head of its polit...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tKhalil al-Hayya, Hamas’ negotiator in Gaza talks, named group chief\n</h1><div class=\"article-picture\"><div class=\"picture verticle\"><img alt=\"Khalil al-Hayya, Hamas’ negotiator in Gaza talks, named group chief\" class=\"lazy\" data-device-variant=\"FREE~FREE~FREE~FREE\" data-src-template=\"https://eimg.thgim.com/ccidist-ws/th/th_delhi/issues/195330/OPS/Public/GCQG9E8C6.1+G6EG9G3UK.1.jpg\" src=\"../images/ch0093_001.jpg\" title=\"Khalil al-Hayya, Hamas’ negotiator in Gaza talks, named group chief\"/></div><figcaption class=\"caption\">\n                                \n  \n   \n    AFP (FILE PHOTO)\n   \n  \n \n                            </figcaption></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>Palestinian group Hamas said on Monday that it had elected Khalil al-Hayya, the group’s negotiator in indirect truce talks with Israel, as the head of its political bureau. Hamas’s armed wing, the Ezzedine Al-Qassam Brigades, also declared their “full support”. Mr. Hayya succeeds Yahya al-Sinwar who was killed by Israel in 2024. <span class=\"tagline_credit\" edition=\"EPaper\" layoutdesk=\"TH_Foreign\" multiline=\"0\" section=\"A\" zone=\"Delhi\">AFP</span></p><p></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, aption class=\"caption\">\n                                \n  \n   \n    AFP\n   \n  \n \n                            </figcaption></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>U.S. Secretary of State Marco Rubio said on Sunday that Iran is using the Strait of Hormuz as leverage, adding that other countries must put pressure to protect global shipping. “Iran want to control the straits and hold that as leverage... the U.S. will do what it needs to, but other nations need to step up and provide help,” he said. <span class=\"tagline_credit\" edition=\"EPaper\" layoutdesk=\"TH_Foreign\" multiline=\"0\" section=\"A\" zone=\"Delhi\">AFP</span></p><p></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The
