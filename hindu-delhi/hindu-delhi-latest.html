 the new series of the ICI, with an updated base year of 2022-23 from the earlier 2011-12. Further, the updated index has an additional sector of iron ore added to it, taking the total number of sectors it covers to nine. The sectoral weights and methods of estimation have also been updated.</p><p>Within the index, the fastest growth was recorded by iron ore, which grew 43.9% in June 2026 against 19% in May.</p><p>This growth, however, was likely due to a statistical base effect, since the sector contracted 16.4% in June last year. Electricity, cement, steel, and coal grew 9.8%, 9.8%, 4.6% and 1.4% respectively.</p><p></p><p>The Index of Core Industries last grew faster in January 2026 when it hit a growth of 5.2%, as per the new series. “Owing to intensive use of iron ore in the production process, and its contribution to industrial development, it has been included in the list of core industries as a new item in the revised series of ICI (base year 2022-23),” the Ministry said in a statement.</p><p>Nearly all the sectors relating to hydrocarbon energy and its products, such as crude oil (-4.2%), natural gas (-7.4%), refinery products (-4.7%), and fertilisers (-3.3%) contracted in June 2026.</p><p>“The entire crude oil related sectors — crude oil, gas, refinery products and fertilizers — witnessed negative growth in June which can be attributed to higher imports with global crude prices cooling off,” Madan Sabnavis, chief economist at the Bank of Baroda said. “The export of refinery products had slowed down this month. In case of fertilizers, imports tended to increase.”</p><p>The only energy sector to have witnessed growth was The coal sector which grew 1.4% in June 2025, snapping a three-month streak of contraction.</p><p></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 54, "title": "Adult unmarried daughter can seek money for education from father: HC", "section": "National", "page": "6", "teaser": "Observing that an adult unmarried daughter is entitled to invoke Section 20(d) of the Protection of Women from Domestic Violence Act, 2005, to seek monetary rel...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tAdult unmarried daughter can seek money for education from father: HC\n</h1><div class=\"author\"><div class=\"author-name\">The Hindu Bureau</div></div><div class=\"dateLine\"><div class=\"dateline\">Bengaluru</div></div><div class=\"article-picture\"><div class=\"picture verticle\"><img alt=\"Adult unmarried daughter can seek money for education from father: HC\" class=\"lazy\" data-device-variant=\"FREE~FREE~FREE~FREE\" data-src-template=\"https://eimg.thgim.com/ccidist-ws/th/th_delhi/issues/195330/OPS/Public/GCQG9E8BS.1+G6EG9G4C8.1.jpg\" src=\"../images/ch0055_001.jpg\" title=\"Adult unmarried daughter can seek money for education from father: HC\"/></div><figcaption class=\"caption\">\n                                \n  \n   \n    The father was directed to pay ₹16 lakh towards his daughter’s PG medical course fees.  File photo \n   \n  \n \n                            </figcaption></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>Observing that an adult unmarried daughter is entitled to invoke Section 20(d) of the Protection of Women from Domestic Violence Act, 2005, to seek monetary relief from her father for pursuing postgraduation amid her parents’ strained relationship, the Karnataka High Court upheld a trial court order directing a man to pay ₹16 lakh towards the annual fee for his daughter’s PG medical course.</p><p>“The obligations of parents to provide basic amenities, healthcare and education cannot be said to be extinguished upon a child attaining majority. It is the custom and practice everywhere in the world that parents are morally obligated to provide basic amenities, including healthcare and education,” the High Court observed.</p><div class=\"subhead\" edition=\"EPaper\" layoutdesk=\"TH_National\" section=\"A\" zone=\"Delhi\"><p>Two orders</p></div><p>Justice H.P. Sandesh passed the order while dismissing a revision petition filed by a 53-year-old man from Mangaluru. He had challenged the orders issued by two trial courts — one directing him to pay ₹16 lakh towards his daughter’s fee and another upholding the first order.</p><p>The High Court noted that the girl’s father and mother were living together when she was pursuing her MBBS course and that it was the father who had paid her fees then. The court said all three now live in the same building, with the mother and daughter on one floor and the father on another owing to the strained relationship between the couple.</p><p>The High Court also observed that the father had the financial capacity to meet his daughter’s educational expenses.</p><p></p><p>Citing the Supreme Court’s recent judgment, Justice Sandesh said that it had held that a daughter has an “indefeasible, legally enforceable and legitimate right to secure educational expenses from her parents”, and parents in conflict could be compelled to provide necessary funds for higher education of the daughter within their financial limit.</p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 55, "title": "Court orders release of accused in Nithin Raj case", "section": "National", "page": "6", "teaser": "The Thalassery Principal District Sessions Court on Monday ordered the release of M.K. Ram, the first accused in the abetment to suicide case related to the dea...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tCourt orders release of accused in Nithin Raj case\n</h1><div class=\"author\"><div class=\"author-name\">The Hindu Bureau</div></div><div class=\"dateLine\"><div class=\"dateline\">KANNUR</div></div><div class=\"article-picture\"><div class=\"picture verticle\"><img alt=\"Court orders release of accused in Nithin Raj case\" class=\"lazy\" data-device-variant=\"FREE~FREE~FREE~FREE\" data-src-template=\"https://eimg.thgim.com/ccidist-ws/th/th_delhi/issues/195330/OPS/Public/GCQG9E8BS.1+G6EG9G4C9.1.jpg\" src=\"../images/ch0056_001.jpg\" title=\"Court orders release of accused in Nithin Raj case\"/></div><figcaption class=\"caption\">\n                                \n  \n   \n    Dr. M.K.Ram being arrested by the Crime Branch in Kannur on Monday.S.K.MOHAN  MOHAN SK \n   \n  \n \n                            </figcaption></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>The Thalassery Principal District Sessions Court on Monday ordered the release of M.K. Ram, the first accused in the abetment to suicide case related to the death of first-year BDS student R.L. Nithin Raj of Kannur Dental College, Anjarakandy, citing procedural lapses in his arrest.</p><p>Dr. Ram, former head of the Department of Dental Anatomy of the college, had been produced before the District Sessions Court after being arrested by the Crime Branch. The court declined to remand him in judicial custody and ordered his release.</p><p>Defence counsel B. Latheef told <span class=\"italic\" edition=\"EPaper\" layoutdesk=\"TH_National\" multiline=\"0\" section=\"A\" zone=\"Delhi\">The Hindu </span>that the court found that the investigating agency had failed to communicate the grounds of arrest to the accused as required under the Supreme Court guidelines.</p><p>Earlier, Crime Branch SP K.V. Venugopal confirmed that Dr. Ram had been arrested from Perumbadi in Kodagu, Karnataka, on Sunday after remaining absconding for weeks following the rejection of his anticipatory bail plea by the Supreme Court.</p><p>He was brought to Kannur on Sunday night and the arrest was formally recorded at 9.30 a.m. on Monday. He was then produced in court.</p><p>Dr. Ram had been evading arrest since the High Court dismissed his anticipatory bail on June 19. The Supreme Court rejected his appeal on July 13, following which a Crime Branch team intensified the search.</p><p>Investigators had earlier tracked him to Chittoor in Andhra Pradesh, but he allegedly escaped. He was eventually traced and arrested while travelling with a relative in Kodagu.</p><p></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 56, "title": "Bengaluru to host India-U.S. space group meet in August", "section": "National", "page": "6", "teaser": "The next meeting of India-U.S. Civil Space Joint Working Group (CSJWG) will be held in Bengaluru in August. Eric Atkins, Public Diplomacy Officer, U.S. Consulat...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tBengaluru to host India-U.S. space group meet in August\n</h1><div class=\"author\"><div class=\"author-name\">The Hindu Bureau</div></div><div class=\"dateLine\"><div class=\"dateline\">Bengaluru</div></div><h2 class=\"sub-title\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n  Experts from the\n   two countries will hold bilateral talks, says U.S. Public Diplomacy Officer\n</h2><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>The next meeting of India-U.S. Civil Space Joint Working Group (CSJWG) will be held in Bengaluru in August.</p><p>Eric Atkins, Public Diplomacy Officer, U.S. Consulate General, said on Monday that the CSJWG experts from the U.S. and India would hold bilateral talks at the meetings.</p><p>“The very next collaboration on the calendar is the next meeting of the CSJWG, which is being held here in Bengaluru. A bilateral meeting of experts from the U.S. and India will be held in the first week of August,” he said.</p><p>The CSJWG was established in 2005 and over the years, officials from the Indian Space Research Organisation (ISRO) and experts from other Indian government agencies have held discussions with the NASA and the U.S. government agencies.</p><p>The two countries have had a strong bilateral cooperation in space and collaborated on various space programmes, including the NASA-ISRO Synthetic Aperture Radar (NISAR) mission which was launched in 2025.</p><p>Meanwhile, Swati Mohan, space scientist and project manager for AstroNav at NASA Jet Propulsion Laboratory who is on a visit to Bengaluru, during an interaction with media, highlighted the achievements of the Mars 2020 Perseverance Rover.</p><p>“The Perseverace Rover has had a phenomenal run, its prime mission was designed for about three Earth years which it has exceeded... Its primary objective is to collect samples that could hold the science of past life on Mars, and it has done that successfully,” Dr. Mohan said.</p><p></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 57, "title": "Karnataka starts door delivery of caste and residence certificates amid SIR", "section": "National", "page": "6", "teaser": "Amid the ongoing special intensive revision (SIR) of electoral rolls, Karnataka Chief Minister D.K. Shivakumar on Monday launched an initiative to issue Permane...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tKarnataka starts door delivery of caste and residence certificates amid SIR\n</h1><div class=\"author\"><div class=\"author-name\">The Hindu Bureau</div></div><div class=\"dateLine\"><div class=\"dateline\">Bengaluru</div></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>Amid the ongoing special intensive revision (SIR) of electoral rolls, Karnataka Chief Minister D.K. Shivakumar on Monday launched an initiative to issue Permanent Residence Certificates (PRCs), one of the 11 documents accepted by the Election Commission (EC) for voter verification under the exercise, on the doorstep of people.</p><p>The government also rolled out a programme to deliver caste certificates free of cost to beneficiaries across the State.</p><p>While Tahsildars are the competent authority to issue PRCs, the State government has also authorised Deputy Tahsildars to issue the certificates to speed up the process.</p><p>Addressing the media, Mr. Shivakumar said the initiatives were aimed at reducing the need for citizens to visit multiple government offices. Terming the move a “new concept” by Karnataka, he said that no other State government had provided such a service. “This initiative is to ensure eligible voters do not lose their voting rights during the SIR,” he said. A mobile application has been developed to record beneficiaries’ details and acknowledgements after the certificates are delivered, he added.</p><p></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 58, "title": "Final report on Sabarimala gold ‘theft’ will be filed soon, SIT tells HC", "section": "National", "page": "6", "teaser": "The Special Investigation Team (SIT) probing the Sabarimala gold theft case informed the Kerala High Court on Monday that a final report on the alleged misappro...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tFinal report on Sabarimala gold ‘theft’ will be filed soon, SIT tells HC\n</h1><div class=\"author\"><div class=\"author-name\">The Hindu Bureau</div></div><div class=\"dateLine\"><div class=\"dateline\">KOCHI</div></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>The Special Investigation Team (SIT) probing the Sabarimala gold theft case informed the Kerala High Court on Monday that a final report on the alleged misappropriation at the temple would be submitted at the earliest.</p><p>The investigating agency notified the court that the final report on the alleged pilfering of gold from the door frame to the sanctum sanctorum of the temple would be filed within 30 days. The sanction to prosecute the accused officials would be obtained thereafter. </p><p>The final report on the offences registered against the alleged misappropriation of gold from the <span class=\"italic\" edition=\"EPaper\" layoutdesk=\"TH_National\" multiline=\"0\" section=\"A\" zone=\"Delhi\">Dwarapalaka</span> idols in the temple would also be filed without delay. The transactions related to the alleged pilfering of gold in September 2025 would be clubbed with this crime and investigated together. </p><p>A Division Bench of Justices Raja Vijayaraghavan and K.V. Jayakumar noted that the scientific report from the CSIR National Metallurgical Laboratory, Jamshedpur, Jharkhand, was received only on July 6 and that it explained the delay in the investigation. </p><p>H. Venkitesh, the Additional Director General of Police (Crimes), filed a report revealing that the stripping salt seized from Smart Creations, a Chennai-based company where the idols were allegedly taken for gold plating, was also sent to the lab to probe if it was used to strip the gold cladding. </p><p></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 59, "title": "Karnataka takes steps to replace 3rd language with AI", "section": "National", "page": "6", "teaser": "The Karnataka government has taken steps to implement Artificial Intelligence (AI) in Skill Education instead of a third language in 1,652 government high schoo...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tKarnataka takes steps to replace 3rd language with AI\n</h1><div class=\"article-picture\"><div class=\"picture verticle\"><img alt=\"Karnataka takes steps to replace 3rd language with AI\" class=\"lazy\" data-device-variant=\"FREE~FREE~FREE~FREE\" data-src-template=\"https://eimg.thgim.com/ccidist-ws/th/th_delhi/issues/195330/OPS/Public/GCQG9E8BS.1+G6EG9G4CC.1.jpg\" src=\"../images/ch0060_001.jpg\" title=\"Karnataka takes steps to replace 3rd language with AI\"/></div><figcaption class=\"caption\"></figcaption></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>The Karnataka government has taken steps to implement Artificial Intelligence (AI) in Skill Education instead of a third language in 1,652 government high schools in the State under the National Skills Qualifications Framework (NSQF) from the 2026-27 academic year. The ‘Samagra Shikshana-Karnataka’ (SSK) has issued a circular for the appointment of guest teachers to teach AI and for necessary preparations to be made at the school level.</p><p></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 60, "title": "Seafarer from Kerala killed in attack on ship off Ukraine", "section": "National", "page": "6", "teaser": "A 26-year-old merchant navy seafarer from Kasaragod in Kerala was reportedly killed in a Russian attack on a cargo ship off the Ukranian port of Odessa, accordi...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tSeafarer from Kerala killedin attack on ship off Ukraine\n</h1><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>A 26-year-old merchant navy seafarer from Kasaragod in Kerala was reportedly killed in a Russian attack on a cargo ship off the Ukranian port of Odessa, according to information received by his family on Monday. The deceased has been identified as Akhil Joyan. The shipping company informed the family of his death via email. Following reports that a Keralite had been killed in the attack, the Chief Minister’s Office initiated efforts to ascertain the facts.</p><p></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle g-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>Telangana government launched the scheme for construction of Indiramma Houses in Hyderabad Core Urban Region (CURE), on Monday. The houses will be built in high-rise buildings. Applications for the houses will be received from July 21 to August 10, through MeeSeva Centres, its portal, or its services on WhatsApp, as per official communication. While the government’s subsidy will be ₹5 lakh, the beneficiary’s tentative contribution is ₹6 lakh.</p><p></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 62, "title": "Reclaiming footpaths, taking cities back from cars", "section": "Edit", "page": "8", "teaser": "Few sights are more ordinary in an Indian city than a pedestrian being pushed off a footpath and onto the road. A mother, holding a school bag in one hand and a...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tReclaiming footpaths, taking cities back from cars\n</h1><h2 class=\"sub-title\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n  Safe, accessible footpaths are\n   a test of governance, revealing whether India’s cities truly serve\n   their people\n</h2><div class=\"article-picture\"><div class=\"picture verticle\"><img alt=\"Reclaiming footpaths, taking cities back from cars\" class=\"lazy\" data-device-variant=\"FREE~FREE~FREE~FREE\" data-src-template=\"https://eimg.thgim.com/ccidist-ws/th/th_delhi/issues/195330/OPS/Public/GCQG9E8BU.1+G6EG9G4C3.1.jpg\" src=\"../images/ch0063_001.jpg\" title=\"Reclaiming footpaths, taking cities back from cars\"/></div><figcaption class=\"caption\">\n                                \n  \n   \n    Chandrakant Lahariya\n    \n     Practising specialist\n     in ‘preventive and cardiometabolic medicine’ with nearly 18 years of work experience with the World Health Organization and\n     the United Nations system\n    \n   \n  \n \n                            </figcaption></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p><span class=\"drop_initial\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" multiline=\"0\" section=\"A\" zone=\"Delhi\"></span>Few sights are more ordinary in an Indian city than a pedestrian being pushed off a footpath and onto the road. A mother, holding a school bag in one hand and a child in the other, walks around a parked car. An elderly man tests a broken footpath before stepping down onto the road. A wheelchair user gives up before the journey has even begun. A vendor, debris, an open drain, a two-wheeler, and a signboard together form what is still, with bureaucratic optimism, called a pavement. The citizen is then forced to walk on a road designed as though only vehicles possess rights.</p><div class=\"subhead\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" section=\"A\" zone=\"Delhi\"><p>Upholding walkability</p></div><p>In June 2026, the Supreme Court of India gave constitutional language to this daily indignity, in <span class=\"italic\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" multiline=\"0\" section=\"A\" zone=\"Delhi\">Maniyar Iliyaz @ Shaik Riyaz vs P. Ayyappan</span> (2026). It held that walking on demarcated footpaths is a fundamental constitutional right, protected under Article 19(1)(d) and Article 21 of the Constitution. It observed that pedestrians have a right to safe footpaths and footways, and directed States and Union Territories to frame policies and guidelines for their provision and maintenance. This is not a minor municipal instruction. It is a public health intervention, a road safety measure, and a democratic test of whether Indian cities are built for people or merely for machines.</p><p>The timing could not be more urgent. India is becoming less active precisely when it needs movement the most. Health risk factors and diseases such as diabetes, hypertension, fatty liver disease, and obesity are rising rapidly, as reported by every newly available population health dataset.</p><p>Walking and increased physical activity are among the low- and no-cost interventions that can halt and reverse this rise in metabolic diseases. Yet, the World Health Organization (WHO)’s India Physical Activity Profile 2024 estimates that 49.4% of Indian adults do not meet the recommended levels of physical activity; among women, the figure is 57.2%. Among children and adolescents aged 11 to 17 years, it is 74%. WHO recommends at least 150 minutes of moderate-intensity physical activity each week for adults. For most citizens, this does not mean gym memberships or elite fitness routines. It means having the ability to walk safely to a bus stop, school, market, clinic, metro station, or park.</p><p>These are not failures of willpower alone; rather, they are exacerbated by the built environment. A city that makes walking difficult quietly prescribes sedentary living. Footpaths, therefore, are not decorative strips of cement added after roads have been designed. They are preventive medicine laid in stone. A usable pavement allows children to walk to school, office-goers to use public transport, older adults to remain mobile, and women to move safely. Walking improves blood pressure, insulin sensitivity, weight control, mood, sleep, and joint function. It is the simplest health habit available to the largest number of citizens. Yet, we in India have made it difficult and dangerous. Many Indians would prefer to use cars and scooters less if cities offered safe, continuous, shaded footpaths.</p><p>The road safety argument is equally compelling. The Union Ministry of Road Transport and Highways (Transport Research Wing) ‘Road Accidents in India 2024’ report found that two-wheeler riders and pedestrians together accounted for nearly 67% of road fatalities, with 1.28 lakh deaths among these vulnerable groups. The National Crime Records Bureau’s 2024 data place the number at more than 1.1 lakh and the share at at least 60%. The exact totals differ across official sources, but the message is unambiguous: pedestrians and two-wheeler riders remain India’s most vulnerable road users. Every time a footpath disappears, the road becomes a contest between flesh and metal.</p><div class=\"subhead\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" section=\"A\" zone=\"Delhi\"><p>Orderly shared streets</p></div><p>The solution cannot be episodic anti-encroachment drives, in which a few carts and cars are removed before the same disorder returns the following week. Nor can it be a punitive war on street vendors, who are workers with legal protections and legitimate economic claims. The answer lies in planned allocation: footpaths for walking, vending zones for vendors, parking spaces for vehicles, utility corridors for public infrastructure, and meaningful penalties for violations. A humane city organises the street so that livelihoods and mobility can coexist without endangering lives.</p><p>Citizens, too, have a role, though not the only one. First, walk deliberately: begin with 10 to 15 minutes after two major meals, or build towards 30 minutes at a fixed time each day. Second, convert short errands into walking errands; distances under one kilometre should not automatically require a scooter or car. Third, combine walking with public transport by using the metro, bus, or shared mobility for part of the commute. Fourth, make walking social: families, resident welfare associations, and workplaces can create walking groups and car-free morning routines. Fifth, reclaim walking as a health check. If breathlessness, knee pain, fear of falling, or unsafe streets prevent walking, treat that as a signal to seek medical advice, improve strength, or demand civic correction. Most importantly, the recent Supreme Court decision has given citizens and resident welfare associations an opportunity to demand their right to walk on encroachment-free footpaths.</p><p>Yet, citizens cannot easily walk their way out of poor urban planning. Civic bodies and governments must act with seriousness. Every road project should include continuous, shaded, well-lit, and barrier-free footpaths, along with safe crossings. Footpaths must be wide enough for two people or a wheelchair, with ramps and clear passageways near bus stops. Encroachment control should be continuous, transparent, and fair. Parking on footpaths must invite stringent action, with penalties that change behaviour. Street design should prioritise schools, hospitals, bus stops, markets, and metro stations, where pedestrian volumes are high. Tree cover, benches, public toilets, and lighting are not embellishments; they determine whether women, children, persons with disabilities, and older people can walk.</p><div class=\"subhead\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" section=\"A\" zone=\"Delhi\"><p>Policy action</p></div><p>India also needs a national active-mobility mission linking urban development, transport, health, and education. Cities and urban planning should be assessed not by the length of flyovers built, but by the number of safe walking kilometres created. Municipal commissioners should publish ward-level footpath maps and annual audits of encroachment-free footpaths. School zones should have traffic calming measures and protected crossings. Employers should encourage active commuting. Doctors should prescribe walking advice to nudge behaviour, but governments must provide the pavements on which those prescriptions can be followed.</p><p>The Supreme Court has moved the footpath from the margins of municipal housekeeping to the centre of constitutional rights. The next task is to move it from judgment to habit, budget, design, and enforcement. A country battling diabetes, hypertension, obesity, stress, and road deaths cannot treat walking as an afterthought. India does not merely need more roads; it needs more rights of way for ordinary citizens. The footpath is where public health, dignity, and democracy meet. We need to take our cities back from cars. We need to rebuild our cities for people. The proportion of encroachment-free footpaths should become a barometer of whether elected governments value citizens’ fundamental rights in every ward and on every major road.</p><p></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 63, "title": "Canada-India defence collaboration for a secure future", "section": "Edit", "page": "8", "teaser": "Canada is seeing an historic shift for our country — one that opens new opportunities for relations between Canada and India. Speaking at CANSEC 2026, Canada’s ...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tCanada-India defence collaboration for a secure future\n</h1><h2 class=\"sub-title\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n  Shared interests drive Canada and India toward a stronger strategic defence partnership\n</h2><div class=\"article-picture\"><div class=\"picture verticle\"><img alt=\"Canada-India defence collaboration for a secure future\" class=\"lazy\" data-device-variant=\"FREE~FREE~FREE~FREE\" data-src-template=\"https://eimg.thgim.com/ccidist-ws/th/th_delhi/issues/195330/OPS/Public/GCQG9E8BU.1+G6EG9G4C2.1.jpg\" src=\"../images/ch0064_001.jpg\" title=\"Canada-India defence collaboration for a secure future\"/></div><figcaption class=\"caption\">\n                                \n  \n   \n    Chris Cooter\n    \n     High Commissioner for Canada to India\n    \n   \n  \n \n                            </figcaption></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p><span class=\"drop_initial\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" multiline=\"0\" section=\"A\" zone=\"Delhi\"></span>Canada is seeing an historic shift for our country — one that opens new opportunities for relations between Canada and India. Speaking at CANSEC 2026, Canada’s leading defence, security and emerging technology event, on May 27, 2026, Prime Minister Mark Carney said: “The very nature of war is rapidly evolving, driven by the proliferation of drones, autonomous systems, and weapons in orbit. Conflicts could emerge closer to our borders than before, and new weapons are reducing the distance that separates us from them. The world has changed, and Canada must change with it. That is why, six weeks after forming the government, we announced our ambitious plan to rebuild, rearm, and reinvest in the Canadian Armed Forces.”</p><p>This is at a time when the world is changing, and Canada-India defence collaboration can translate into a strategy for a secure future.</p><p>The good news is that we are already walking on this path. In 2025, Mr. Carney announced that Canada is on track to spend 5% of its GDP on defence by 2035. In March, we already surpassed 2% of the GDP, placing Canada among one of the 10 largest economies in the world.</p><p>As Mr. Carney said during his speech in January 2026 at the World Economic Forum’s Annual Meeting in Davos, there has been a rupture in the world order. Or as Prime Minister Narendra Modi has said, we are living through a decade of crisis.</p><div class=\"subhead\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" section=\"A\" zone=\"Delhi\"><p>Bilateral defence engagement</p></div><p>In this changing world, defence cooperation between Canada and India has become crucial and we have already taken steps to bolster it.</p><p>Most recently, we accredited Defence Advisers in both Ottawa and Delhi. Mr. Carney and Mr. Modi agreed to establish a Defence Dialogue to prioritise cooperation on shared interests and align capacities. Canadian and Indian navies participated in the Rim of the Pacific exercises and Talisman Sabre exercises. In June this year, a delegation from India’s National Defence College visited Canada. This will allow Indian officers to have direct exchanges with military colleges and bases in Canada.</p><p>We have established a national Defence Investment Agency to streamline military procurement. We have also launched a defence Industrial Strategy to diversify supply chains so Canada does not rely on just one country. That is why we are calling on natural partners such as India to participate in co-development, subsystem manufacturing, and sustainment. We are investing in innovation, including through a half billion-dollar investment in next generation aerospace technologies, including a drone innovation hub.</p><div class=\"subhead\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" section=\"A\" zone=\"Delhi\"><p>Strategic technology cooperation</p></div><p>Canada’s strengths in advanced technologies can complement India’s scale, manufacturing capacity, and expanding industrial base. Canada is one of only a few countries with a full-spectrum aerospace sector, while India’s domestic aviation industry is the third largest domestic market in the world. Canada is a research and development powerhouse, while India is focused on advancing innovation capacity and high-end manufacturing.</p><p>Canada and India are part of a small group of countries with advanced space capabilities. The importance of civilian space cooperation was highlighted in the joint statement between our two Prime Ministers. Canada’s strengths in advanced components for satellite technology and space robotics can complement India’s strengths in low-cost platforms. Canada’s RADARSAT constellation system can have application in meeting India’s aim of advancing its naval capacity in the region. Critical minerals are the building block of defence technologies — another area where Canada and India can expand their partnership. Amid the crisis in West Asia, national security and economic security are inextricably linked. Here, a critical partnership between Canada and India can take shape.</p><p>Canada has vast geological reserves of 31 critical minerals from cobalt to helium. Canada holds the tenth largest reserves of rare earth elements; the third largest recoverable resources of uranium; and 5% of the world’s tungsten reserves. Additionally, Canada is the second largest producer and exporter of uranium globally, with 24% of global production in 2024. Canada has embarked on a strategy to diversify its trusted partners. For India, there is a need for reliable partners such as Canada to reach its own economic and national security goals. The Canada-India memorandum of understanding on Critical Minerals Value Chain, signed during Mr. Carney’s visit to India in February-March 2026, laid the groundwork for the integration of stable, resilient supply chains between the two countries.</p><div class=\"subhead\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" section=\"A\" zone=\"Delhi\"><p>Building on shared legacy</p></div><p>As we look forward, it is worth recalling our shared history and common sacrifice. Recently, I visited the Kirkee War Cemetery in Pune where members of the Royal Canadian Air Force killed during the Second World War were laid to rest. As I walked through the memorial site, I was reminded that our countries have stood shoulder to shoulder in the past, not just on the battlefield but for common causes and for the shared security of our countries. Let us continue that long-standing tradition as we reshape the defence cooperation between our two countries.</p><p></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 64, "title": "letters to the editor", "section": "Edit", "page": "8", "teaser": "Batons over dialogue I am writing to express my anguish and concern following the events I witnessed at Jantar Mantar on July 20. As someone who was present at ...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\"></h1><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><div class=\"header\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" section=\"A\" zone=\"Delhi\"><p>Batons over dialogue</p></div><p>I am writing to express my anguish and concern following the events I witnessed at Jantar Mantar on July 20. As someone who was present at the site from the night of July 19 till 4 p.m. on July 20, I stood among thousands of students and youth who had gathered there peacefully to demand transparency and accountability regarding examination irregularities. What I witnessed was not the handling of a public order issue, but a disproportionate and brutal crackdown on the democratic right to dissent. Is this the landscape of our democracy today, where the voices of the youth are met with batons instead of dialogue? Using force to disperse peaceful protesters does not address the underlying issues of the movement; it only deepens the divide and erodes trust in our institutions.</p><div class=\"signature\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" section=\"A\" zone=\"Delhi\"><p>Kota Venkata Yogesh,</p></div><p><span class=\"signature_credit\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" multiline=\"1\" section=\"A\" zone=\"Delhi\">Proddatur, Andhra Pradesh</span></p><p></p><div class=\"header\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" section=\"A\" zone=\"Delhi\"><p>A threat to federalism</p></div><p>The ongoing parliamentary session presents a dangerous turning point for Indian federalism. In its push to pass structural shifts such as “One Nation, One Election” and delimitation, the ruling BJP is seeking a contrived majority to fundamentally alter the constitutional balance. It is alarming to see regional forces — some a fierce bulwark of state autonomy — flirt with tactical concessions on these Bills. In political terms, this is asymmetrical co-optation. For States such as Tamil Nadu, population-based delimitation and synchronised elections will permanently dilute their parliamentary representation and penalise development. Defending the core federal values of the Constitution is no longer just an ideological duty. It is a matter of absolute political survival.</p><div class=\"signature\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" section=\"A\" zone=\"Delhi\"><p>M. Jameel Ahmed,</p></div><p><span class=\"signature_credit\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" multiline=\"1\" section=\"A\" zone=\"Delhi\">Mysuru</span></p><p></p><div class=\"header\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" section=\"A\" zone=\"Delhi\"><p>FIFA World Cup final</p></div><p>While Spain’s performance was masterful, Argentina’s was widely criticised as lacklustre. Spain dictated the tempo from the start with 65% ball possession at one point in the final match. Despite this heavy pressure, Argentina hung on to force extra time largely due to goalkeeper Emiliano Martínez, who set a game record of 11 saves. While Argentina displayed defensive resilience, their inability to maintain ball possession or create offensive momentum led many — including me — to view the game as a one-sided tactical exercise.</p><div class=\"signature\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" section=\"A\" zone=\"Delhi\"><p>Govardhana Myneedu,</p></div><p><span class=\"signature_credit\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" multiline=\"1\" section=\"A\" zone=\"Delhi\">Vijayawada, Andhra Pradesh</span></p><p>Spain’s triumph was a masterclass in modern football, where collective brilliance outweighed individual stardom. Argentina fought with determination and resilience, and Lionel Messi remains one of the finest players ever seen. Yet, this final was a reminder that even the greatest player cannot single-handedly overcome an opponent whose strength lies in collective organisation, tactical discipline, and unwavering teamwork.<span class=\"extra_leading\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" multiline=\"0\" section=\"A\" zone=\"Delhi\"></span></p><p></p><div class=\"signature\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" section=\"A\" zone=\"Delhi\"><p>A.P. Thiruvadi,</p></div><p><span class=\"signature_credit\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" multiline=\"0\" section=\"A\" zone=\"Delhi\">Chennai</span></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 65, "title": "Allowing dissent", "section": "Edit", "page": "8", "teaser": "Using criminal law to protect reputation of rulers is condemnable", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tAllowing dissent\n</h1><h2 class=\"sub-title\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n  Using criminal law to protect reputation of rulers is condemnable\n</h2><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p></p><p><span class=\"drop_initial\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" multiline=\"0\" section=\"A\" zone=\"Delhi\"></span>At the heart of democratic disposition is tolerance of dissent and upholding of the rule of law; threats to these can undo the knit of a democracy. In the first couple of months of the Tamilaga Vettri Kazhagam (TVK)’s rule in Tamil Nadu, at least 10 people have been subject to police action, on account of speaking against the Chief Minister or his cabinet colleagues. While the case of former Minister Anitha Radhakrishnan’s arrest for criticising Chief Minister C. Joseph Vijay gained the spotlight, there were several others who were arrested or faced police action over the course of this period. This includes James Raja of Tirunelveli; V. Vishnuprabhu and T. Manojkumar, residents of Coimbatore, for a Facebook post criticising the Chief Minister; and Thangamani of Karur. In the case of the Dravida Munnetra Kazhagam (DMK)’s Gen Z wing leader A. Anbanantham, police searched his residence claiming that he made ‘derogatory’ posts regarding Mr. Vijay and his family. YouTuber Maridhas was arrested by the Chennai Cyber Crime police for his remarks against the Chief Minister and Industries Minister S. Keerthana. DMK MLA Markandayan was arrested in Thoothukudi over an alleged threat he made against the Chief Minister. Others arrested include Vinoth Suryakumar who commented on HR&amp;CE Minister S. Ramesh and RJ Saran Jayaraman who was arrested by the police for content posted on Instagram targeting a woman who supported the TVK. A case was also filed against Indrani Sudalaimuthu for remarks made against S. Ramesh.</p><p>Political actors of all hues have normalised using the police and criminal law as a shield to protect their reputation, whenever they come to power. This creates a structural risk for democracy. The actions of the police indicate a wider pattern of speech-related arrests, and authoritarianism under the TVK government, where defamation, the IT Act and cyber crime provisions are invoked at will for any criticism against individuals in the government or the ruling party. Complaints being filed by the TVK cadre and the <span class=\"italic\" edition=\"EPaper\" layoutdesk=\"TH_Edit\" multiline=\"0\" section=\"A\" zone=\"Delhi\">suo motu</span> action of the police targeting dissenters could run the administration off the rails. The a
