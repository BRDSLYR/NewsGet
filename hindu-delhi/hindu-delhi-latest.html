<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
<title>The Hindu — Delhi — 21 July 2026</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink:        #1a1a18;
  --ink-muted:  #4a4a45;
  --ink-faint:  #8a8a82;
  --paper:      #f8f6f0;
  --paper-warm: #f0ede4;
  --rule:       #c8c4b8;
  --red:        #b00020;
  --font-head:  'Georgia', 'Times New Roman', serif;
  --font-body:  'Georgia', 'Times New Roman', serif;
  --font-ui:    system-ui, -apple-system, sans-serif;
}

html, body {
  height: 100%; width: 100%; overflow: hidden;
  background: var(--paper); color: var(--ink);
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
}

/* ── Masthead ── */
#masthead {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: var(--ink); color: var(--paper);
  padding: 0 1rem;
  display: flex; align-items: center; justify-content: space-between;
  height: 52px;
  user-select: none;
}
#masthead .nameplate {
  font-family: var(--font-head);
  font-size: 1.3rem; font-weight: 700;
  letter-spacing: -0.01em;
  line-height: 1;
}
#masthead .edition-date {
  font-family: var(--font-ui);
  font-size: 0.7rem; color: #aaa;
  text-align: right; line-height: 1.35;
}
#masthead .back-btn {
  display: none; align-items: center; gap: 6px;
  background: none; border: none; color: var(--paper);
  font-family: var(--font-ui); font-size: 0.8rem;
  cursor: pointer; padding: 8px 0; min-width: 60px;
}
#masthead .back-btn svg { flex-shrink: 0; }

/* ── Section nav strip ── */
#section-nav {
  position: fixed; top: 52px; left: 0; right: 0; z-index: 99;
  background: var(--paper-warm);
  border-bottom: 2px solid var(--ink);
  overflow-x: auto; overflow-y: hidden;
  white-space: nowrap;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
  transition: opacity 0.2s, transform 0.2s;
}
#section-nav::-webkit-scrollbar { display: none; }
#section-nav .nav-inner {
  display: inline-flex; padding: 0 0.5rem;
}
.sec-tab {
  display: inline-block;
  font-family: var(--font-ui); font-size: 0.72rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--ink-muted);
  padding: 9px 10px;
  border-bottom: 3px solid transparent;
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
  white-space: nowrap;
}
.sec-tab.active {
  color: var(--ink);
  border-bottom-color: var(--red);
}

/* ── Pages viewport ── */
#pages-viewport {
  position: fixed;
  top: 93px; left: 0; right: 0; bottom: 0;
  overflow: hidden;
}
#pages-track {
  display: flex; height: 100%;
  transition: transform 0.38s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  will-change: transform;
}

/* ── Individual section page ── */
.section-page {
  flex: 0 0 100vw; width: 100vw; height: 100%;
  overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding: 1.2rem 0 2rem;
}
.section-page::-webkit-scrollbar { width: 3px; }
.section-page::-webkit-scrollbar-thumb { background: var(--rule); }

.sec-header {
  padding: 0 1rem 0.6rem;
  border-bottom: 3px double var(--ink);
  margin-bottom: 0.1rem;
}
.sec-header h2 {
  font-family: var(--font-head);
  font-size: 1.05rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--red);
}
.sec-header .art-count {
  font-family: var(--font-ui); font-size: 0.7rem;
  color: var(--ink-faint); margin-top: 1px;
}

.article-row {
  display: grid;
  grid-template-columns: 1fr;
  border-bottom: 0.5px solid var(--rule);
  padding: 0.75rem 1rem;
  cursor: pointer;
  transition: background 0.12s;
  gap: 0.25rem;
}
.article-row:active { background: var(--paper-warm); }
@media (hover: hover) {
  .article-row:hover { background: var(--paper-warm); }
}

.art-meta {
  font-family: var(--font-ui); font-size: 0.65rem;
  color: var(--ink-faint); letter-spacing: 0.04em;
  text-transform: uppercase;
  display: flex; gap: 0.5rem; align-items: center;
}
.art-meta .page-tag {
  background: var(--ink); color: var(--paper);
  padding: 1px 5px; border-radius: 2px;
  font-size: 0.6rem;
}
.art-headline {
  font-family: var(--font-head);
  font-size: 1.02rem; font-weight: 700;
  line-height: 1.3; color: var(--ink);
}
.art-teaser {
  font-family: var(--font-body); font-size: 0.8rem;
  color: var(--ink-muted); line-height: 1.45;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.art-read-cue {
  font-family: var(--font-ui); font-size: 0.68rem;
  color: var(--red); font-weight: 600;
  letter-spacing: 0.03em;
  align-self: end;
  text-align: right;
}

/* ── Article pane ── */
#article-pane {
  position: fixed;
  top: 52px; left: 0; right: 0; bottom: 0;
  background: var(--paper);
  overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  transform: translateX(100%);
  transition: transform 0.32s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  will-change: transform;
  z-index: 50;
  padding: 1.5rem 1.1rem 3rem;
  max-width: 780px;
  margin: 0 auto;
}
#article-pane::-webkit-scrollbar { width: 3px; }
#article-pane::-webkit-scrollbar-thumb { background: var(--rule); }

#article-pane .art-pane-section {
  font-family: var(--font-ui); font-size: 0.68rem;
  font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--red);
  margin-bottom: 0.5rem;
  display: flex; align-items: center; gap: 0.5rem;
}
#article-pane .art-pane-section::after {
  content: ''; flex: 1; height: 1px; background: var(--rule);
}
#article-pane h1 {
  font-family: var(--font-head);
  font-size: clamp(1.3rem, 4vw, 1.8rem);
  font-weight: 700; line-height: 1.25;
  color: var(--ink); margin-bottom: 0.75rem;
}
#article-pane .art-pane-meta {
  font-family: var(--font-ui); font-size: 0.72rem;
  color: var(--ink-faint); margin-bottom: 1rem;
  padding-bottom: 0.75rem;
  border-bottom: 1px solid var(--rule);
  display: flex; gap: 1rem; flex-wrap: wrap;
}
#article-pane .art-pane-body {
  font-size: 1rem; line-height: 1.75; color: var(--ink);
}
#article-pane .art-pane-body p { margin-bottom: 0.9rem; }
#article-pane .art-pane-body h2,
#article-pane .art-pane-body h3 {
  font-family: var(--font-head);
  font-weight: 700; margin: 1.25rem 0 0.4rem;
  color: var(--ink);
}
#article-pane .art-pane-body img {
  max-width: 100%; height: auto;
  display: block; margin: 1rem 0;
}
#article-pane .art-pane-body figcaption {
  font-size: 0.75rem; color: var(--ink-faint);
  margin-top: -0.5rem; margin-bottom: 1rem;
  font-style: italic;
}
#article-pane .art-source-link {
  margin-top: 1.5rem;
  padding-top: 1rem;
  border-top: 1px solid var(--rule);
  font-family: var(--font-ui); font-size: 0.75rem;
  color: var(--ink-faint);
}
#article-pane .art-source-link a { color: var(--red); }

/* ── Fallback notice ── */
.fallback-notice {
  font-family: var(--font-ui); font-size: 0.75rem;
  background: #fff8dc; border: 1px solid #e0c000;
  color: #555; padding: 0.5rem 1rem;
  margin: 0.5rem 1rem 0;
  border-radius: 4px;
}

/* ── Swipe hint (first load) ── */
#swipe-hint {
  position: fixed; bottom: 1.2rem; left: 50%;
  transform: translateX(-50%);
  background: rgba(26,26,24,0.75); color: #f8f6f0;
  font-family: var(--font-ui); font-size: 0.72rem;
  padding: 6px 14px; border-radius: 20px;
  pointer-events: none;
  animation: fadeout 3s ease 1.5s forwards;
  white-space: nowrap; z-index: 200;
}
@keyframes fadeout { to { opacity: 0; } }

/* ── Desktop: wider article reading column ── */
@media (min-width: 700px) {
  #article-pane {
    left: 0; right: 0;
    padding: 2rem 2.5rem 4rem;
  }
  .article-row {
    grid-template-columns: 1fr;
    padding: 0.9rem 1.5rem;
  }
  .sec-header { padding: 0 1.5rem 0.7rem; }
  .section-page { padding: 1.4rem 0 2rem; }
  .art-headline { font-size: 1.1rem; }
  #masthead .nameplate { font-size: 1.5rem; }
  .fallback-notice { margin: 0.5rem 1.5rem 0; }
}
</style>
</head>

<script>
const ARTICLES = [{"id": 0, "title": "Several hurt in crackdown on CJP Parliament march", "section": "Regional", "page": "1", "teaser": "Scores hospitalised with fractures, head and eye injuries as police resort to baton-charge during the protest; 70 protesters detained, say police; CJP leaders meet Nadda, demand Pradhan’s ouster", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tSeveral hurt in crackdown on CJP Parliament march\n</h1><div class=\"author\"><div class=\"author-name\">Aroon Deep</div></div><div class=\"dateLine\"><div class=\"dateline\">NEW DELHI</div></div><h2 class=\"sub-title\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n  Scores hospitalised with fractures, head and eye injuries as police resort to baton-charge during the protest; 70 protesters detained, say police; CJP leaders meet Nadda, demand Pradhan’s ouster\n</h2><div class=\"article-picture\"><div class=\"picture verticle\"><img alt=\"Several hurt in crackdown on CJP Parliament march\" class=\"lazy\" data-device-variant=\"FREE~FREE~FREE~FREE\" data-src-template=\"https://eimg.thgim.com/ccidist-ws/th/th_delhi/issues/195330/OPS/Public/GCQG9E8BN.1+G6EG9G4Q1.1.jpg\" src=\"../images/ch0001_001.jpg\" title=\"Several hurt in crackdown on CJP Parliament march\"/></div><figcaption class=\"caption\">\n                                \n  \n   \n    Security forces using tear gas to disperse CJP protesters during\n    their march in New Delhi on Monday. Sushil Kumar VermaSHUBHOMOY SIKDAR\n   \n  \n \n                            </figcaption></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p><span class=\"drop_initial\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" multiline=\"0\" section=\"A\" zone=\"Delhi\"></span>Several people were injured here on Monday when the police cracked down on a Parliament march called by the Cockroach Janta Party (CJP) seeking the resignation of Union Education Minister Dharmendra Pradhan even as the government reached out to the CJP.</p><p>At least 38 of the injured were taken to the Lady Hardinge Medical College and around 65 to the Dr. Ram Manohar Lohia Hospital, with fractures, swellings, and head and eye injuries, sources said.</p><p>The protests brought to the fore the growing discontent over the NEET paper leak and irregularities in the CBSE school examination process as slogans of “Dharmendra Pradhan, <span class=\"italic\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" multiline=\"0\" section=\"A\" zone=\"Delhi\">isteefa do</span> (resign)” boomed. The police action on one of the largest protests in the national capital in recent years came amid an Internet shutdown in the New Delhi district.</p><p>Police resorted to baton-charge and lobbed tear-gas shells on multiple occasions in Jantar Mantar, Patel Chowk, India Gate, Connaught Place, and other parts of the area where large groups protested. Police, however, denied using disproportionate force.</p><p>The Delhi police said in a statement that 70 protesters were detained. “Appropriate legal action is being initiated, and an FIR is being registered... for rioting, assault on public servants, damage to public property, and other offences,” a press release said.</p><p>Representatives of the CJP, Saurav Das and Ashutosh Ranka, later met Union Minister J.P. Nadda to formally seek resignation of the Union Education Minister. They said Mr. Nadda had agreed to discuss the demands with the government. However, the CJP was still waiting for a response, Mr. Das said in the evening, adding: “The protest is continuing at Jantar Mantar.”</p><p></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 1, "title": "4 Indian seafarers killed near Odessa", "section": "Regional", "page": "1", "teaser": "Four Indian citizens were killed and one was critically injured in an attack on a merchant vessel near the Ukrainian port of Odessa on Sunday. India condemned t...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\t4 Indian seafarers killed near Odessa\n</h1><div class=\"author\"><div class=\"author-name\">Kallol Bhattacherjee</div></div><div class=\"dateLine\"><div class=\"dateline\">NEW DELHI</div></div><div class=\"article-picture\"><div class=\"picture verticle\"><img alt=\"4 Indian seafarers killed near Odessa\" class=\"lazy\" data-device-variant=\"FREE~FREE~FREE~FREE\" data-src-template=\"https://eimg.thgim.com/ccidist-ws/th/th_delhi/issues/195330/OPS/Public/GCQG9E8BN.1+G6EG9G4PS.1.jpg\" src=\"../images/ch0002_001.jpg\" title=\"4 Indian seafarers killed near Odessa\"/></div><figcaption class=\"caption\">\n                                \n  \n   \n    Smoke rises from the vessel \n    MV Golden Leo after an alleged Russian attack on Sunday. AFPHANDOUT\n   \n  \n \n                            </figcaption></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>Four Indian citizens were killed and one was critically injured in an attack on a merchant vessel near the Ukrainian port of Odessa on Sunday. India condemned the incident and called such attacks impeding freedom of navigation “deplorable”.</p><p>The Ministry of External Affairs on Monday reiterated India’s opposition to attacks on merchant vessels as such incidents violate the freedom of navigation.</p><div class=\"subhead\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" section=\"A\" zone=\"Delhi\"><p>First instance</p></div><p>The incident near Ukraine’s largest sea port in the Black Sea is the first instance of Indian seafarers being killed in the Russia-Ukraine war that started in February 2022.</p><p>Ukraine’s Acting Foreign Minister, Andrii Sybiha, has blamed Russia for the attack and said five crew members of the ship remain missing.</p><p><span class=\"TypographyTag1\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" multiline=\"0\" section=\"A\" zone=\"Delhi\">“On the evening of 19 July 2026, the vessel </span><span class=\"italic\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" multiline=\"0\" section=\"A\" zone=\"Delhi\"><span class=\"TypographyTag1\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" multiline=\"0\" section=\"A\" zone=\"Delhi\">MV Golden Leo</span></span><span class=\"TypographyTag1\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" multiline=\"1\" section=\"A\" zone=\"Delhi\"> was attacked while departing the port of Odessa. At the time of the incident, there were 17 crew members on board, including five Indian nationals. As per information available, four Indian nationals have tragically lost their lives, while one is hospitalised in a critical condition,” read a statement from the Ministry of External Affairs.</span></p><p></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 2, "title": "Police deny ‘intrusive surveillance’ of CJP stir at Jantar Mantar", "section": "Regional", "page": "2", "teaser": "No snooping; videography done to maintain law and order: police to HC in response to PIL by former JNUSU president; hearing to resume today", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tPolice deny ‘intrusive surveillance’ of CJP stir at Jantar Mantar\n</h1><div class=\"author\"><div class=\"author-name\">The Hindu Bureau</div></div><div class=\"dateLine\"><div class=\"dateline\">New Delhi</div></div><h2 class=\"sub-title\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n  No snooping; videography done to maintain law and order: police to HC in response to PIL by former JNUSU president; hearing to resume today\n</h2><div class=\"article-picture\"><div class=\"picture verticle\"><img alt=\"Police deny ‘intrusive surveillance’ of CJP stir at Jantar Mantar\" class=\"lazy\" data-device-variant=\"FREE~FREE~FREE~FREE\" data-src-template=\"https://eimg.thgim.com/ccidist-ws/th/th_delhi/issues/195330/OPS/Public/GCQG9E8BO.1+G6EG9G4D4.1.jpg\" src=\"../images/ch0003_001.jpg\" title=\"Police deny ‘intrusive surveillance’ of CJP stir at Jantar Mantar\"/></div><figcaption class=\"caption\">\n                                \n  \n   \n    Police personnel at Jantar Mantar on Monday. SHIV KUMAR PUSHPAKAR SHIV KUMAR PUSHPAKAR\n   \n  \n \n                            </figcaption></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p><span class=\"drop_initial\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" multiline=\"0\" section=\"A\" zone=\"Delhi\"></span>Delhi Police on Monday told the Delhi High Court that it had not carried out any “intrusive surveillance” of the Cockroach Janta Party’s (CJP) protest at Jantar Mantar. The police made the submission during the hearing of a public interest litigation (PIL) plea by former Jawaharlal Nehru University Students’ Union (JNUSU) president Aishe Ghosh, challenging what she described as the police’s “indiscriminate and continuous surveillance” of the ongoing agitation at the historic protest site.</p><p>Appearing for Delhi Police, Solicitor General Tushar Mehta said protests are a regular feature at Jantar Mantar and that recording activities at the site is standard practice.</p><p>He added that videography at the site is done solely to maintain law and order. “At Jantar Mantar, some protest or another is always going on. These are always recorded. As a matter of fact, at this protest, hundreds of people made viral videos. This is only for the purpose of law and order. There is no snooping. There is no surveillance,” Mr. Mehta told the Bench of Chief Justice D.K. Upadhyaya and Justice Tejas Karia.</p><p>The Bench referred to the Supreme Court’s landmark judgment in the 2018 <span class=\"italic\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" multiline=\"0\" section=\"A\" zone=\"Delhi\">Mazdoor Kisan Shakti Sangathan </span>case, in which the apex court upheld the fundamental right to peaceful protest. The High Court asked the police whether they had framed guidelines regarding protests in compliance with the apex court’s directions and scheduled the next hearing for Tuesday.</p><p>In her petition, Ms. Ghosh stated, “Police personnel stationed at the site routinely photograph and videograph the protesters, their activities, interactions, movements, and gatherings.” She added that a permanent surveillance tower equipped with cameras has been installed at the centre of the protest site, enabling continuous monitoring and recording.</p><p>The former JNUSU president contended that the surveillance infrastructure is being used as “an instrument of intimidation and deterrence against student protesters”.</p><div class=\"subhead\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" section=\"A\" zone=\"Delhi\"><p>‘Protesters threatened’</p></div><p>“On several occasions, police personnel threatened student participants by stating that photographs and videos taken of them at the protest site would be forwarded to their parents, guardians, and principals or authorities at their respective educational institutions,” stated her plea.</p><p>She argued that such threats have “created a pervasive atmosphere of fear and have deterred several students from attending the protest, associating themselves with the movement, or openly expressing their views”.</p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 3, "title": "Delhi Cabinet clears implementation of Central govt. scheme to phase out old, polluting commercial vehicles", "section": "Regional", "page": "2", "teaser": "The Delhi Cabinet has cleared the implementation of the PARIVARTAN (Programme for Accelerated Renewal and Incentivization of Vehicle Assets for Reducing Transpo...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tDelhi Cabinet clears implementation of Central govt. scheme to phase out old, polluting commercial vehicles\n</h1><div class=\"author\"><div class=\"author-name\">The Hindu Bureau</div></div><div class=\"dateLine\"><div class=\"dateline\">New Delhi</div></div><div class=\"article-picture\"><div class=\"picture verticle\"><img alt=\"Delhi Cabinet clears implementation of Central govt. scheme to phase out old, polluting commercial vehicles\" class=\"lazy\" data-device-variant=\"FREE~FREE~FREE~FREE\" data-src-template=\"https://eimg.thgim.com/ccidist-ws/th/th_delhi/issues/195330/OPS/Public/GCQG9E8BO.1+G6EG9G4D2.1.jpg\" src=\"../images/ch0004_001.jpg\" title=\"Delhi Cabinet clears implementation of Central govt. scheme to phase out old, polluting commercial vehicles\"/></div><figcaption class=\"caption\">\n                                \n  \n   \n    CM Rekha Gupta said the PARIVARTAN scheme will accelerate the modernisation of the commercial vehicle fleet in Delhi. File PhotoANI\n   \n  \n \n                            </figcaption></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>The Delhi Cabinet has cleared the implementation of the PARIVARTAN (Programme for Accelerated Renewal and Incentivization of Vehicle Assets for Reducing Transport Air Pollution and Network Emissions) scheme, Chief Minister Rekha Gupta said on Monday.</p><p>The initiative aims to reduce air pollution by incentivising the replacement of older, highly polluting trucks and buses operating in the Delhi-National Capital Region (NCR) with electric and BS-VI compliant vehicles.</p><p>The CM said the scheme is expected to benefit around 2.07 lakh truck and bus owners in Delhi-NCR.</p><p>“It will replace a large number of old, highly polluting commercial vehicles with cleaner and more modern ones, leading to a reduction in air pollution,” said Ms. Gupta.</p><p></p><p>The PARIVARTAN scheme, with a total outlay of ₹9,585 crore, including ₹5,041 crore from the Centre, was approved by the Union Cabinet on June 3.</p><p>Affirming her government’s resolve to promote clean transport, Ms. Gupta said the Central government programme will help achieve the objectives laid out in the Delhi EV Policy-2026 and accelerate the modernisation of the commercial vehicle fleet in the Capital, thereby reducing vehicular emissions.</p><p></p><p>Under the scheme, owners of BS-IV or older light goods vehicles (LGVs) who scrap their vehicles and purchase a new electric LGV will receive a 100% exemption from motor vehicle tax and registration fees for 10 years from the Delhi government, among other benefits. The initiative offers similar benefits for medium goods vehicles and heavy goods vehicles that are BS-IV or older.</p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 4, "title": "AAP hits out at BJP over police action on protesting students", "section": "Regional", "page": "2", "teaser": "The Aam Aadmi Party (AAP) on Monday criticised the Bharatiya Janata Party (BJP)-led government at the Centre over the police action against protesters in Delhi,...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tAAP hits out at BJP over police action on protesting students\n</h1><div class=\"author\"><div class=\"author-name\">The Hindu Bureau</div></div><div class=\"dateLine\"><div class=\"dateline\">New Delhi</div></div><div class=\"article-picture\"><div class=\"picture verticle\"><img alt=\"AAP hits out at BJP over police action on protesting students\" class=\"lazy\" data-device-variant=\"FREE~FREE~FREE~FREE\" data-src-template=\"https://eimg.thgim.com/ccidist-ws/th/th_delhi/issues/195330/OPS/Public/GCQG9E8BO.1+G6EG9G4D3.1.jpg\" src=\"../images/ch0005_001.jpg\" title=\"AAP hits out at BJP over police action on protesting students\"/></div><figcaption class=\"caption\">\n                                \n  \n   \n    Police lathi-charging Cockroach Janta Party supporters during a protest march in New Delhi on Monday. SHIV KUMAR PUSHPAKARSHIV KUMAR PUSHPAKAR\n   \n  \n \n                            </figcaption></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>The Aam Aadmi Party (AAP) on Monday criticised the Bharatiya Janata Party (BJP)-led government at the Centre over the police action against protesters in Delhi, alleging that students were treated as “enemies”. The Opposition party described the police action as “deeply condemnable” and said it reflected Prime Minister Narendra Modi’s “authoritarianism”.</p><p>“They are lathi-charging our children, and tear-gas shells are being fired. It seems that instead of fixing the education system and examination system, Modi<span class=\"italic\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" multiline=\"0\" section=\"A\" zone=\"Delhi\">ji</span> has directly declared war on the country’s youth,” AAP chief Arvind Kejriwal stated in a post on X.</p><p>Senior AAP leader Manish Sisodia claimed that the protest signalled growing opposition to the BJP government. “PM Modi, your barricades will not be able to stop the youth today. On one side stand batons, guns, and the arrogance of power; on the other are chants of ‘Bharat Mata ki Jai’. The end of your tyranny is now certain,” he said.</p><p>Addressing a press conference at the party headquarters, AAP MP Sanjay Singh criticised the “police brutality” against the protesting youth.</p><p>“Young people are being treated like citizens of an enemy country. Prime Minister Modi must now understand that the youth have awakened. What we witnessed today is a clear message to the PM. If he does not listen to the demands of the youth, they will uproot his government,” he said. Mr. Singh said several AAP leaders and workers participated in the protest and that the party supports the protesters’ demands.</p><p>Leader of the Opposition in Delhi and former Chief Minister Atishi said, “If the demands of the lakhs of young people now on the streets are ignored, they will bring an end to the government’s authoritarianism.”</p><p>Unlike other full-fledged States, in Delhi the police report to the Union Home Ministry.</p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 5, "title": "2020 riots ‘larger conspiracy’ case: apex court stays HC order granting Kalita access to probe documents", "section": "Regional", "page": "2", "teaser": "The Supreme Court on Monday stayed a Delhi High Court order permitting Pinjra Tod activist Devangana Kalita to inspect documents and other material collected du...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\t2020 riots ‘larger conspiracy’ case: apex court staysHC order granting Kalita access to probe documents\n</h1><div class=\"author\"><div class=\"author-name\">Aaratrika Bhaumik</div></div><div class=\"dateLine\"><div class=\"dateline\">New Delhi</div></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>The Supreme Court on Monday stayed a Delhi High Court order permitting Pinjra Tod activist Devangana Kalita to inspect documents and other material collected during the investigation but not relied upon by Delhi Police in its chargesheet in the 2020 north-east Delhi riots ‘larger conspiracy’ case.</p><p>The interim order came on an appeal filed by the police against the High Court’s June 5 judgment, which had allowed Ms. Kalita to inspect the police <span class=\"italic\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" multiline=\"0\" section=\"A\" zone=\"Delhi\">malkhana</span>, including material seized during the investigation but neither relied upon by the investigating agency nor filed along with the chargesheet.</p><p>A Bench of Justices Aravind Kumar and Vipul M. Pancholi issued notice on the police’s appeal and stayed the execution of the High Court’s order. “In the meantime, there shall be a stay of the impugned order,” the Bench directed.</p><p>Appearing for Ms. Kalita, advocate Adit S. Pujari submitted that the High Court’s decision was consistent with the Supreme Court’s 2025 ruling in <span class=\"italic\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" multiline=\"0\" section=\"A\" zone=\"Delhi\">Sarla Gupta v. Enforcement Directorate</span>, which held that an accused prosecuted under the Prevention of Money Laundering Act is entitled to obtain the list of documents not relied upon by the probe agency while filing the chargesheet.</p><p></p><div class=\"subhead\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" section=\"A\" zone=\"Delhi\"><p>Police response</p></div><p>Opposing the plea, Additional Solicitor General S.V. Raju, appearing for Delhi Police, said Ms. Kalita was not entitled to inspect any material beyond the chargesheet before charges were framed.</p><p>The Bench agreed with Mr. Raju’s submission, observing that permitting such inspection at this stage would only delay the trial further.</p><p></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 6, "title": "Rahul Gandhi to address city students on Aug. 9: Cong.", "section": "Regional", "page": "2", "teaser": "Senior Congress leader and Leader of the Opposition in Lok Sabha Rahul Gandhi will address a major students’ meeting in Delhi on August 9 as part of the party’s...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tRahul Gandhi to address city students on Aug. 9: Cong.\n</h1><div class=\"author\"><div class=\"author-name\">Press Trust of India</div></div><div class=\"dateLine\"><div class=\"dateline\">New Delhi</div></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>Senior Congress leader and Leader of the Opposition in Lok Sabha Rahul Gandhi will address a major students’ meeting in Delhi on August 9 as part of the party’s campaign against alleged paper leaks, party’s Delhi unit president Devender Yadav said on Monday.</p><p>Addressing a press conference, Mr. Yadav said the Congress will hold a ‘Chhatron Ki Goonj’ event in the national capital on Wednesday, which will be addressed by senior party leaders and MPs Gaurav Gogoi, Imran Masood and Praniti Shinde.</p><p>He said Mr. Gandhi will address a larger event on August 9 as part of the party’s nationwide campaign.</p><div class=\"subhead\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" section=\"A\" zone=\"Delhi\"><p>‘Waging a battle’</p></div><p>“Rahul Gandhi has vowed to wage a battle from the streets to Parliament to secure justice for students whose futures have been ruined by repeated leaks of question papers in major competitive examinations,” Mr. Yadav said.</p><p>The Congress has demanded the resignation of Union Education Minister Dharmendra Pradhan and accused the Bharatiya Janata Party-led Central government of failing to prevent repeated paper leaks and ensure accountability.</p><p></p><p>The Delhi Congress president claimed that around 7.5 crore people have been affected by 90 paper leaks across the country over the last 10 years.</p><p></p><p></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 7, "title": "L-G orders all-out measures to tackle monsoon flooding", "section": "Regional", "page": "2", "teaser": "Lieutenant-Governor (L-G) Taranjit Singh Sandhu on Monday directed the Delhi government to take all possible measures to prevent monsoon flooding and warned tha...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tL-G orders all-out measuresto tackle monsoon flooding\n</h1><div class=\"article-picture\"><div class=\"picture verticle\"><img alt=\"L-G orders all-out measuresto tackle monsoon flooding\" class=\"lazy\" data-device-variant=\"FREE~FREE~FREE~FREE\" data-src-template=\"https://eimg.thgim.com/ccidist-ws/th/th_delhi/issues/195330/OPS/Public/GCQG9E8BO.1+GTBG9E9SA.1.jpg\" src=\"../images/ch0008_001.jpg\" title=\"L-G orders all-out measuresto tackle monsoon flooding\"/></div><figcaption class=\"caption\"></figcaption></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>Lieutenant-Governor (L-G) Taranjit Singh Sandhu on Monday directed the Delhi government to take all possible measures to prevent monsoon flooding and warned that responsibility would be fixed for any lapses. Mr. Sandhu, along with Chief Minister Rekha Gupta, chaired a meeting of the Delhi Disaster Management Authority, where he reviewed the city’s preparedness for heavy rain, progress on the Urban Flood Mitigation plan and the rollout of the State Disaster Response Force, stated a release from Lok Niwas.</p><p></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 8, "title": "DU to set up two control rooms to check ragging", "section": "Regional", "page": "2", "teaser": "Delhi University on Monday announced several anti-ragging measures such as setting up two control rooms to monitor violations ahead of the new session. It also ...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tDU to set up two control rooms tocheck ragging\n</h1><div class=\"author\"><div class=\"author-name\">The Hindu Bureau</div></div><div class=\"dateLine\"><div class=\"dateline\">New Delhi</div></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>Delhi University on Monday announced several anti-ragging measures such as setting up two control rooms to monitor violations ahead of the new session. It also cautioned students against using AI to alter their admission documents.</p><p>As of Monday evening, 45,316 candidates had confirmed their admission by paying the fees, the university said. The window to accept allotted seats and pay fees will close at 11.59 p.m. on Tuesday. The second list will be released on July 25, and the session will commence on July 28.</p><p>“The university has decided to set up two control rooms to monitor violations of anti-ragging rules. Additionally, banners and posters will be put up across campuses listing the punishments for flouting the rules,” said an official.</p><p></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 9, "title": "Panel formed to probe death of patient at GTB Hospital", "section": "Regional", "page": "2", "teaser": "The Delhi government constituted a committee on Monday to probe the incident at Guru Teg Bahadur (GTB) Hospital in which a ceiling fan fell on a 42-year-old pat...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tPanel formed to probe death of patient at GTB Hospital\n</h1><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>The Delhi government constituted a committee on Monday to probe the incident at Guru Teg Bahadur (GTB) Hospital in which a ceiling fan fell on a 42-year-old patient, who died hours later. Health Minister Pankaj Kumar Singh said strict action would be taken based on the findings. The panel has been asked to submit its report within three days. The incident occurred around 9.30 p.m. in Ward 27 on Saturday, and the patient, Akbar, died on Sunday afternoon.</p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 10, "title": "BJP announces new team of office-bearers for Delhi unit", "section": "Regional", "page": "2", "teaser": "Delhi Bharatiya Janata Party (BJP) chief Harsh Malhotra on Monday announced a new 38-member team of office-bearers. Mr. Malhotra, who took charge as the Delhi B...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tBJP announces new team of office-bearers for Delhi unit\n</h1><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>Delhi Bharatiya Janata Party (BJP) chief Harsh Malhotra on Monday announced a new 38-member team of office-bearers. Mr. Malhotra, who took charge as the Delhi BJP chief in May, has named 10 vice-presidents, three general secretaries and nine secretaries in the new team. Praveen Shankar Kapoor has been reappointed as the media head. The party said five appointees belong to the Scheduled Castes and seven to the Other Backward Classes.</p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 11, "title": "‘Promise unfulfilled’: NC stages stir in Delhi for J&K Statehood", "section": "Regional", "page": "3", "teaser": "Democracy is being strangled, says Omar Abdullah who was unable to reach the protest site due to heavy deployment of police personnel; sit-in gets overshadowed by the CJP’s march to Parliament; lacklustre event, says PDP leader Iltija Mufti", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\t‘Promise unfulfilled’: NC stagesstir in Delhi for J&amp;K Statehood\n</h1><div class=\"author\"><div class=\"author-name\">Press Trust of India</div></div><div class=\"dateLine\"><div class=\"dateline\">New Delhi</div></div><h2 class=\"sub-title\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n  Democracy is being strangled, says Omar Abdullah  who was unable to reach the protest site due to heavy deployment of police personnel; sit-in gets overshadowed by the CJP’s march to Parliament; lacklustre event, says PDP leader Iltija Mufti\n</h2><div class=\"article-picture\"><div class=\"picture verticle\"><img alt=\"‘Promise unfulfilled’: NC stagesstir in Delhi for J&amp;K Statehood\" class=\"lazy\" data-device-variant=\"FREE~FREE~FREE~FREE\" data-src-template=\"https://eimg.thgim.com/ccidist-ws/th/th_delhi/issues/195330/OPS/Public/GCQG9E8BP.1+G6EG9G4CM.1.jpg\" src=\"../images/ch0012_001.jpg\" title=\"‘Promise unfulfilled’: NC stagesstir in Delhi for J&amp;K Statehood\"/></div><figcaption class=\"caption\">\n                                \n  \n   \n    CM Omar Abdullah taking part in the rally to demand the restoration of J&amp;K’s Statehood, in New Delhi on Monday.SHIV KUMAR PUSHPAKAR\n   \n  \n \n                            </figcaption></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p><span class=\"drop_initial\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" multiline=\"0\" section=\"A\" zone=\"Delhi\"></span>Escalating the showdown over Jammu and Kashmir’s political status, National Conference (NC) chief Farooq Abdullah, Chief Minister Omar Abdullah, Ministers, MLAs, and party workers staged a protest in the national capital on Monday demanding immediate restoration of Statehood to the Union Territory.</p><p>However, the NC’s protest was overshadowed by the Cockroach Janta Party’s (CJP) march to Parliament on the opening day of the Monsoon Session.</p><p>Mr. Omar, who arrived from Jammu in the morning, was unable to reach the protest site at Jantar Mantar due to heavy deployment of police personnel for the CJP protest.</p><p>About 100 NC protesters held up placards that read “<span class=\"italic\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" multiline=\"0\" section=\"A\" zone=\"Delhi\">Apna wada pura karo</span> (Fulfil your promise)” and “Restore full Statehood” and raised slogans targeting the Central government led by Prime Minister Narendra Modi over the delay in restoring Statehood. Mr. Omar later tried to reach the Constitution Club, where a seminar on Statehood was scheduled, but was stopped by police.</p><p>Wearing a jacket emblazoned with “Restore Statehood”, he sat on the pavement on Ashoka Road, where some youngsters participating in the CJP protest also joined him.</p><p>The protesters raised slogans such as “<span class=\"italic\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" multiline=\"0\" section=\"A\" zone=\"Delhi\">Modi ka wada kyun raha aadha?</span> (Why has Modi’s promise remained unfulfilled?)”.</p><p>The police allegedly used tear gas to disperse protesters near the Constitution Club while the Chief Minister and his supporters were holding the sit-in.</p><p>Addressing reporters later, Mr. Omar criticised the Centre and the Delhi police over the action. “Here, along with the rest of the people, we were also targeted by tear gas. It is such a shame,” he said.</p><p>“We came to Delhi with about 100 supporters to press the Centre for early restoration of Statehood, but we are not allowed to protest peacefully here either. Democracy is being strangled,” he said.</p><p>Condemning the police action, he said young people who had gathered from different parts of the country seeking justice had been subjected to tear gas.</p><p>“They were harassed during the NEET exam. They were tense and stressed and for that they want someone to take responsibility,” he said.</p><p></p><p>Mr. Farooq urged the Modi administration to respect the democratic mandate of the region.</p><p></p><div class=\"subhead\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" section=\"A\" zone=\"Delhi\"><p>Staying away</p></div><p>Peoples Democratic Party (PDP) leader Iltija Mufti described the NC protest as a “lacklustre and deliberately understated event”.</p><p>She said it was “unfortunate” that the elected government is choosing to normalise an “illegal and disempowering act” of abrogation of Article 370.</p><p>The PDP, one of the parties invited by the NC, did not join the protest.</p><p></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The
