 HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 12, "title": "Martyrs’ Day: TMC camps, Cong. to hold separate rallies today", "section": "Regional", "page": "3", "teaser": "Kolkata will witness three competing Martyrs’ Day rallies on Tuesday within a 3-km radius as two factions of the Trinamool Congress (TMC) and the Congress fight...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tMartyrs’ Day: TMC camps, Cong. to hold separate rallies today\n</h1><div class=\"author\"><div class=\"author-name\">Shrabana Chatterjee</div></div><div class=\"dateLine\"><div class=\"dateline\">Kolkata</div></div><div class=\"article-picture\"><div class=\"picture verticle\"><img alt=\"Martyrs’ Day: TMC camps, Cong. to hold separate rallies today\" class=\"lazy\" data-device-variant=\"FREE~FREE~FREE~FREE\" data-src-template=\"https://eimg.thgim.com/ccidist-ws/th/th_delhi/issues/195330/OPS/Public/GCQG9E8BP.1+G6EG9G4CL.1.jpg\" src=\"../images/ch0013_001.jpg\" title=\"Martyrs’ Day: TMC camps, Cong. to hold separate rallies today\"/></div><figcaption class=\"caption\">\n                                \n  \n   \n    TMC chief Mamata Banerjee addressing party workers in Kolkata on Monday. ANI\n   \n  \n \n                            </figcaption></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>Kolkata will witness three competing Martyrs’ Day rallies on Tuesday within a 3-km radius as two factions of the Trinamool Congress (TMC) and the Congress fight to claim ownership of the July 21 event.</p><p>Martyrs’ Day is observed every year in West Bengal to commemorate the 13 Youth Congress workers killed in police firing on July 21, 1993 during the Left Front regime.</p><p>TMC chairperson Mamata Banerjee on Monday visited the venue of her faction’s rally in front of the Birla Planetarium. The rival Ritabrata Banerjee-led faction has chosen Mayo Road for its meeting. The Congress is conducting its own rally at Shaheed Minar and its leaders have been on the ground overseeing arrangements.</p><p>While Ms. Banerjee used to address supporters outside Victoria House till last year, the police have denied permission to any political group to hold a rally at the site this year.</p><div class=\"subhead\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" section=\"A\" zone=\"Delhi\"><p>Litmus test</p></div><p>The event will be a litmus test of the ability of the rival factions to mobilise crowds after the TMC lost the 2026 Assembly election and the BJP came to power in the State.</p><p>Ms. Banerjee has urged her supporters not to be misled by the police and attend only the rally in front of the Birla Planetarium in the Maidan area.</p><p>“Mamata Banerjee will remember the martyrs and show us the way forward,” said Kunal Ghosh, legislator from the Mamata faction. He also alleged that those attending the rival faction’s event on Tuesday would not be honouring the martyrs, but “only honouring the BJP”.</p><p>Meanwhile, Firhad Hakim, once a close confidant of Ms. Banerjee and now with the Ritabrata faction, said, “All of us who could have been martyrs that day (July 21, 1993) will be here on this stage.”</p><p>The rebel faction also claimed that the families of the 13 martyrs are likely to be present on its platform on Tuesday.</p><p></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 13, "title": "44 Somali pirates get life term in jail; court praises Indian Navy", "section": "Regional", "page": "3", "teaser": "A special court in Mumbai on Monday sentenced 44 Somali nationals to life imprisonment in two different cases on charges of piracy and other offences. The court...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\t44 Somali pirates get life term in jail; court praises Indian Navy\n</h1><div class=\"author\"><div class=\"author-name\">Press Trust of India</div></div><div class=\"dateLine\"><div class=\"dateline\">Mumbai</div></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>A special court in Mumbai on Monday sentenced 44 Somali nationals to life imprisonment in two different cases on charges of piracy and other offences.</p><p>The court also appreciated the bravery of the Indian Navy in discharging legal and international duty in letter and spirit.</p><p>While imposing the maximum punishment of life imprisonment, Special Judge S.B. Dige noted that the offences committed by the accused were serious in nature.</p><p>All the accused, comprising 35 in one case and nine in the other, had pleaded guilty before the court and urged for leniency. The court said it was aware of their poor condition and that they voluntarily pleaded guilty.</p><p>“But on the other hand, the act of piracy on high sea by hijacking a vessel and keeping crew members hostage for ransom by attempting to kill them and to keep them as human shields and not obeying the lawful directions of the Indian Navy are very serious and cannot be taken casually,” the court said.</p><p></p><p></p><div class=\"subhead\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" section=\"A\" zone=\"Delhi\"><p>Prompt action</p></div><p>In March 2024, a hijacking alert was received from the Iranian-flagged vessel <span class=\"TypographyTag1\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" multiline=\"0\" section=\"A\" zone=\"Delhi\">FV Al Kambar</span>. Indian Navy ships <span class=\"TypographyTag11\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" multiline=\"0\" section=\"A\" zone=\"Delhi\">Trishul </span>and <span class=\"TypographyTag12\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" multiline=\"0\" section=\"A\" zone=\"Delhi\">Sumedha</span> were deployed in the Gulf of Aden (east coast of Somalia) for the anti-piracy mission. It led to the arrest of nine Somali nationals.</p><p></p><p>In December 2023, <span class=\"TypographyTag13\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" multiline=\"0\" section=\"A\" zone=\"Delhi\">INS Kolkata</span> apprehended 35 accused, all Somali nationals, who had hijacked <span class=\"TypographyTag14\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" multiline=\"0\" section=\"A\" zone=\"Delhi\">Ex-Ruen</span>, a Malta-flagged bulk carrier. The accused were then charged and convicted under provisions of the Unlawful Activities (Prevention) Act.</p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 14, "title": "NHRC seeks report on ‘stripping, assault’ of girls in Rajasthan", "section": "Regional", "page": "3", "teaser": "The National Human Rights Commission (NHRC) on Monday took suo motu cognisance of reports alleging that girl students at a government school in Rajasthan were f...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tNHRC seeks report on ‘stripping, assault’ of girls in Rajasthan\n</h1><div class=\"author\"><div class=\"author-name\">The Hindu Bureau</div></div><div class=\"dateLine\"><div class=\"dateline\">New Delhi</div></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>The National Human Rights Commission (NHRC) on Monday took <span class=\"italic\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" multiline=\"0\" section=\"A\" zone=\"Delhi\">suo motu</span> cognisance of reports alleging that girl students at a government school in Rajasthan were frisked, beaten, and forced to remove their clothes by teachers after one of them reported losing ₹1,000.</p><p>The incident took place at a government school in Sawai Madhopur district’s Liwali village. The students of Classes 9 and 11 were allegedly assaulted and forced to remove their clothes, but no money was recovered.</p><div class=\"subhead\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" section=\"A\" zone=\"Delhi\"><p>Parents protest</p></div><p>The students informed their parents about the incident after returning home. The following day, a large number of parents reportedly gathered at the school to stage a protest.</p><p>“The contents of the news report, if true, raise serious issues of violation of human rights of the victim students,” read a statement from the NHRC.</p><p>It sought a detailed report from the government on the incident and action taken in the matter.</p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 15, "title": "Four dead after ‘inhaling toxic gas’ in Haryana well", "section": "Regional", "page": "3", "teaser": "Four men died after entering an abandoned well on Sunday evening to rescue a calf in Haryana’s Jhajjar district. The police suspect that inhalation of toxic gas...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tFour dead after ‘inhaling toxic gas’ in Haryana well\n</h1><div class=\"author\"><div class=\"author-name\">Press Trust of India</div></div><div class=\"dateLine\"><div class=\"dateline\">Chandigarh</div></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>Four men died after entering an abandoned well on Sunday evening to rescue a calf in Haryana’s Jhajjar district. The police suspect that inhalation of toxic gas led to their deaths.</p><p> </p><p>“A calf fell into the abandoned well that is about 40-50 years old. To save the animal, two men entered the well. When they did not come out, two more entered the well but they too did not come out,” Jhajjar Sadar SHO Inspector Paramjit said.</p><p>Jhajjar Police Commissioner Rajshree Singh said rescue efforts were launched and the men were brought out and taken to hospital, but they were declared dead.</p><p>The deceased have been identified as Monu, Dalbir, Narender, all locals, and migrant labourer Ramu, the police said.</p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 16, "title": "30,000 students, 1,100 seats: DU’s 1-year PG rollout hits a roadblock", "section": "Regional", "page": "4", "teaser": "With more than 30,000 students graduating from Delhi University’s (DU) inaugural four-year undergraduate programme and only a little over 1,100 seats on offer a...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\t30,000 students, 1,100 seats: DU’s 1-year PG rollout hits a roadblock\n</h1><div class=\"author\"><div class=\"author-name\">Ira Wasan</div></div><div class=\"dateLine\"><div class=\"dateline\">NEW DELHI</div></div><div class=\"article-picture\"><div class=\"picture verticle\"><img alt=\"30,000 students, 1,100 seats: DU’s 1-year PG rollout hits a roadblock\" class=\"lazy\" data-device-variant=\"FREE~FREE~FREE~FREE\" data-src-template=\"https://eimg.thgim.com/ccidist-ws/th/th_delhi/issues/195330/OPS/Public/GCQG9E8BQ.1+GTBG9EADU.1.jpg\" src=\"../images/ch0017_001.jpg\" title=\"30,000 students, 1,100 seats: DU’s 1-year PG rollout hits a roadblock\"/></div><figcaption class=\"caption\">\n                                \n  \n   \n    Members of the ABVP staging a protest on the Delhi University campus on July 17. Special arrangement Ankita Singh 4501\n   \n  \n \n                            </figcaption></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>With more than 30,000 students graduating from Delhi University’s (DU) inaugural four-year undergraduate programme and only a little over 1,100 seats on offer across 46 one-year postgraduate courses, several students contend that the promised progression from the undergraduate degree to a one-year master’s has not been matched by adequate capacity despite having invested an additional year in pursuit of the pathway.</p><p>Introduced for the 2026-27 academic session under the National Education Policy (NEP) 2020, it allows students who have completed DU’s Four-Year Undergraduate Programme (FYUP) to pursue a master's degree in one year instead of the conventional two-year programme.</p><p></p><p></p><p>The programme has been introduced in addition to DU’s existing two-year postgraduate programmes, which offer around 13,500 seats across 74 disciplines.</p><p>According to the university’s information bulletin, the one-year postgraduate programmes together offer just over 1,100 seats across 46 disciplines, taking the total postgraduate intake to around 14,600 seats. Students, however, argue that the intake for the one-year programme remains disproportionately small.</p><p>The issue prompted student organisations to stage protests on campus, demanding an increase in the number of seats.</p><p>The Akhil Bharatiya Vidyarthi Parishad (ABVP) on July 17 staged a protest at the university campus.</p><p>ABVP Delhi secretary Sarthak Sharma said, “The university administration must immediately enhance the number of seats to ensure that no deserving student is denied access to higher education because of seat constraints.”</p><p>Aanchal Nainawat, a fourth-year student at Hansraj College, said the possibility of pursuing a one-year master’s programme was among the primary reasons she opted for the additional year.</p><p>“We spent an additional year, along with our time, money and trust, expecting the one-year master’s programme to be a genuine opportunity. Instead, we found ourselves competing for a handful of seats, and the promise we relied on simply was not matched in its implementation,” she said.</p><p>According to the information bulletin issued on July 5, one-year M.A. in English programme offers 45 seats across all reservation categories. Aastha Upadhyay, a fourth-year B.A. English (Hons.) student at Atma Ram Sanatan Dharma College, said, “When the information bulletin was released, the scale of the mismatch became clear. Hundreds of students had opted for the fourth year, but the M.A. in English had only 45 seats. It fundamentally altered how we viewed the one-year master’s programme.”</p><div class=\"subhead\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" section=\"A\" zone=\"Delhi\"><p>Navigating uncertainty</p></div><p>Faculty members said that while the policy itself had merit, its implementation was marked by inadequate planning, frequent procedural changes and unclear communication, leaving both teachers and students navigating uncertainty.</p><p>Priyanka Kulhari, Assistant Professor at Atma Ram Sanatan Dharma College, said, “On paper, the idea is excellent. The problem began with its implementation. We were receiving new guidelines every week, and faculty members themselves were often unsure of the procedures.”</p><p></p><p>Prateek Arsh, a fourth-year student at Hansraj College, questioned the transparency of the admission process.</p><p>“We were informed about important admission criteria only in the eighth semester. If the university had communicated these guidelines before students opted for the fourth year, many would have made a more informed decision,” he said.</p><p>In response to the issue, the university has constituted a six-member committee to examine requests for expanding the intake in its one-year postgraduate programmes.</p><p>A notification issued by the DU Registrar’s office on July 17 stated: “The university has received requests for an increase in the number of seats in the one-year postgraduate programmes being offered in various departments of the university for the academic session. The competent authority has constituted the following committee to consider the request and suggest measures for its implementation. The committee may submit its recommendations within 10 days.”</p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 17, "title": "Kerala Catholic Church reiterates concerns over FCRA amendment Bill", "section": "Regional", "page": "4", "teaser": "Kerala Catholic Bishops’ Council says existing laws and income tax returns enable monitoring of proper utilisation of foreign funds; urges MPs from State to oppose Bill if introduced in Parliament", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tKerala Catholic Churchreiterates concerns overFCRA amendment Bill\n</h1><div class=\"author\"><div class=\"author-name\">The Hindu Bureau</div></div><div class=\"dateLine\"><div class=\"dateline\">IDUKKI</div></div><h2 class=\"sub-title\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n  Kerala Catholic Bishops’ Council says existing laws and income tax returns enable monitoring of proper utilisation of foreign funds; urges MPs from State to oppose Bill if introduced in Parliament\n</h2><div class=\"article-picture\"><div class=\"picture verticle\"><img alt=\"Kerala Catholic Churchreiterates concerns overFCRA amendment Bill\" class=\"lazy\" data-device-variant=\"FREE~FREE~FREE~FREE\" data-src-template=\"https://eimg.thgim.com/ccidist-ws/th/th_delhi/issues/195330/OPS/Public/GCQG9E8BQ.1+G6EG9G4CI.1.jpg\" src=\"../images/ch0018_001.jpg\" title=\"Kerala Catholic Churchreiterates concerns overFCRA amendment Bill\"/></div><figcaption class=\"caption\">\n                                \n  \n   \n    Union Minister Amit Shah has earlier assured that the FCRA Bill will not be applied retrospectively.file photo\n   \n  \n \n                            </figcaption></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p><span class=\"drop_initial\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" multiline=\"0\" section=\"A\" zone=\"Delhi\"></span>Even as the Foreign Contribution (Regulation) Amendment Bill, 2026, is scheduled to be presented in the ongoing Monsoon Session of Parliament, the Catholic Church leadership in Kerala reiterated concerns over the legislation on Monday.</p><p>The Kerala Catholic Bishops’ Council (KCBC) said that the Church’s apprehensions over the Bill had not been cleared, adding that it did not receive any foreign contribution through personal accounts.</p><p>KCBC spokesperson Fr. Thomas Tharayil told <span class=\"italic\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" multiline=\"0\" section=\"A\" zone=\"Delhi\">The Hindu </span>that existing laws were fully capable of monitoring the proper utilisation of foreign funds. “The reality is that the Church is not receiving foreign funds in any personal accounts. All funds are received through the RBI special branch in New Delhi. Those receiving the funds need to file utilisation details. Also, income tax returns need to be submitted every year. The government can easily verify the utilisation and details of the total money received through IT returns’ verification,” said Fr. Tharayil.</p><div class=\"subhead\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" section=\"A\" zone=\"Delhi\"><p>‘Unmet promise’</p></div><p>The KCBC spokesperson said when the Bill was announced during the Assembly election period, Bharatiya Janata Party leaders in Kerala had promised that they would intervene to address the concerns raised by the Church.</p><p>“But after the Assembly election, no BJP leader in Kerala contacted the Church leadership on the issue. During a recent meeting the Catholic Bishops’ Conference of India representatives had with Union Home Minister Amit Shah, the Minister only gave an assurance that the FCRA Bill would not have a retroactive effect. We don’t know how that assurance will work, and we will get the details only after the original content of the Bill is out,” said Fr. Tharayil.</p><p>The KCBC has already submitted letters to all Opposition MPs from Kerala, demanding that they oppose the Bill when it is presented in Parliament. “We hope the MPs from Kerala will raise their voice against the Bill,” he said.</p><div class=\"subhead\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" section=\"A\" zone=\"Delhi\"><p>‘Alarming clauses’</p></div><p>The KCBC also noted that some clauses in the Bill are alarming.</p><p>“If an organisation fails to submit details of a foreign donation or decides to stop receiving foreign donations, the Bill states that the building constructed using those funds will go to the government. But the reality is that for the construction of hospitals or schools, 80% of the funding comes from local resources, with only the remaining 20% supported by foreign funds. Yet, the Bill recommends taking over of such properties. Such provisions are raising serious concerns,” said Fr. Tharayil.</p><p></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 18, "title": "Sukhbir Badal appears before SIT in 2015 Punjab firing case", "section": "Regional", "page": "4", "teaser": "Shiromani Akali Dal (SAD) chief Sukhbir Singh Badal on Monday was questioned for around two hours by the Punjab police’s Special Investigation Team (SIT) probin...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tSukhbir Badal appears before SIT in 2015 Punjab firing case\n</h1><div class=\"author\"><div class=\"author-name\">Press Trust of India</div></div><div class=\"dateLine\"><div class=\"dateline\">Chandigarh</div></div><div class=\"article-picture\"><div class=\"picture verticle\"><img alt=\"Sukhbir Badal appears before SIT in 2015 Punjab firing case\" class=\"lazy\" data-device-variant=\"FREE~FREE~FREE~FREE\" data-src-template=\"https://eimg.thgim.com/ccidist-ws/th/th_delhi/issues/195330/OPS/Public/GCQG9E8BQ.1+GTBG9EADQ.1.jpg\" src=\"../images/ch0019_001.jpg\" title=\"Sukhbir Badal appears before SIT in 2015 Punjab firing case\"/></div><figcaption class=\"caption\">\n                                \n  \n   \n    Akali Dal chief Sukhbir Badal\n   \n  \n \n                            </figcaption></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>Shiromani Akali Dal (SAD) chief Sukhbir Singh Badal on Monday was questioned for around two hours by the Punjab police’s Special Investigation Team (SIT) probing the 2015 Behbal Kalan police firing incident.</p><p>Mr. Badal, who was summoned by the SIT led by Deputy Inspector General (Bathinda range) Harjit Singh to appear before it at the Punjab Police Officers Institute (PPOI) in Sector 32, Chandigarh, alleged the SIT was formed by the Bhagwant Mann government to fight a political battle.</p><p>Heavy police deployment was made around the PPOI with Chandigarh police erecting barricades on roads leading to the venue, where Akali Dal leaders, including former MLA N.K. Sharma, and party supporters gathered ahead of Mr. Badal’s arrival.</p><p>SAD chief was accompanied by party leaders Bikram Singh Majithia and Balwinder Singh Bhundar as he left for the PPOI from his Sector 9 residence.</p><p></p><p>Speaking to reporters after questioning, Mr. Badal said it was the fourth time that he was summoned.</p><p>“Whenever I was called, I came because as the president of the Akali Dal, I want the real culprits to be apprehended,” he said.</p><p>“However, the SIT has not been formed to catch culprits but to fight a political battle,” the SAD chief alleged.</p><p>He said it has been nearly 11 years but the SIT has not been able to complete its investigation.</p><div class=\"subhead\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" section=\"A\" zone=\"Delhi\"><p>AAP govt. criticised</p></div><p>Criticising the Aam Aadmi Party (AAP) government, Mr. Badal said, “They want to show in the media that Badal has been summoned. It does not matter to me.” Attacking the Chief Minister, he claimed that the entire Punjab was against Mr. Mann and alleged that AAP has “looted” the State.</p><p>“It is a drama. Akali Dal is neither scared nor it will bow down,” Mr. Badal said.</p><p></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 19, "title": "Panchayat, local elections to be over by Nov. 15: Rajasthan govt.", "section": "Regional", "page": "4", "teaser": "The long-awaited elections to panchayati raj and urban local bodies in Rajasthan will be completed by November 15 this year, following the submission of a repor...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tPanchayat, local elections to be over by Nov. 15: Rajasthan govt.\n</h1><div class=\"author\"><div class=\"author-name\">Mohammed Iqbal</div></div><div class=\"dateLine\"><div class=\"dateline\">JAIPUR</div></div><h2 class=\"sub-title\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n  Reservation of seats will be determined on the basis of the OBC panel’s report to be submitted in August\n</h2><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>The long-awaited elections to panchayati raj and urban local bodies in Rajasthan will be completed by November 15 this year, following the submission of a report by the Other Backward Classes (OBC) Political Representation Commission in August. The reservation of seats in the polls will be determined on the basis of the commission’s report.</p><p>The Bharatiya Janata Party government submitted the schedule for panchayat and local body elections in the Rajasthan High Court during the hearing on a batch of public interest petitions on Monday. The High Court had on November 14, 2025, directed the State government to complete the delimitation process by December 31 and hold the polls by April 15, 2026.</p><p>After the court’s strict observations, the Local Self-Government Department and Panchayati Raj Department filed an affidavit stating that the classification of wards for reservation would be completed within 10 days after the submission of the OBC commission’s report.</p><p>The reservation for Scheduled Castes, Scheduled Tribes, Other Backward Classes and women will be completed through the lottery process by August 15, after which the State Election Commission will initiate the process for conducting the polls, according to the affidavit.</p><p>When the Division Bench led by Acting Chief Justice S.P. Sharma asked for specific dates, the Advocate-General stated that the local body elections would be notified on August 17 and held by September 20, followed by panchayat election notification on September 23 and completion of polls by November 15.</p><div class=\"subhead\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" section=\"A\" zone=\"Delhi\"><p>Petitions over delay</p></div><p>The petitions over the delay in conducting elections were filed by a citizen, Giriraj Singh Devanda, and former MLA Sanyam Lodha. The High Court had on April 2 this year issued contempt notices to the State Election Commission and Election Commissioner Rajeshwar Singh, taking exception to the delay despite its previous order.</p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 20, "title": "DMK MLA arrested for remarks against Tamil Nadu CM", "section": "Regional", "page": "4", "teaser": "The Thoothukudi District Crime Branch Police on Monday arrested Vilathikulam MLA G.V. Markandayan of the DMK on the charge of making remarks “derogatory” to Tam...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tDMK MLA arrested for remarks against Tamil Nadu CM\n</h1><div class=\"author\"><div class=\"author-name\">The Hindu Bureau</div></div><div class=\"dateLine\"><div class=\"dateline\">THOOTHUKUDI/CHENNAI</div></div><div class=\"article-picture\"><div class=\"picture verticle\"><img alt=\"DMK MLA arrested for remarks against Tamil Nadu CM\" class=\"lazy\" data-device-variant=\"FREE~FREE~FREE~FREE\" data-src-template=\"https://eimg.thgim.com/ccidist-ws/th/th_delhi/issues/195330/OPS/Public/GCQG9E8BQ.1+G6EG9G4CH.1.jpg\" src=\"../images/ch0021_001.jpg\" title=\"DMK MLA arrested for remarks against Tamil Nadu CM\"/></div><figcaption class=\"caption\">\n                                \n  \n   \n    G.V. Markandayan\n   \n  \n \n                            </figcaption></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>The Thoothukudi District Crime Branch Police on Monday arrested Vilathikulam MLA G.V. Markandayan of the DMK on the charge of making remarks “derogatory” to Tamil Nadu Chief Minister C. Joseph Vijay at a public meeting organised by the party in Kovilpatti.</p><p>The meeting was held on Saturday to thank the voters following the Assembly election. Several DMK leaders, including DMK organisation secretary R.S. Bharathi and former Minister P. Geetha Jeevan, were present. In his speech, Mr. Markandayan had allegedly made certain remarks against Mr. Vijay. Following this, Tamilaga Vettri Kazhagam (TVK) north district secretary Balasubramanian lodged a complaint with the police on Sunday.</p><p>On Monday morning, the police arrived at Mr. Markandayan’s residence at Vilathikulam and arrested him. He was taken to the office of Superintendent of Police in Thoothukudi for further inquiry. The police have booked him under three Sections of the Bharatiya Nyaya Sanhita: 351(3) (criminal intimidation), 352 (intentional insult with intent to provoke breach of peace), and 353(2) (statements conducing to public mischief).</p><p>Ms. Geetha Jeevan and over 100 DMK workers were detained after they staged a sit-in in front of the Thoothukudi Collectorate. They started the protest after the police denied them permission to meet Mr. Markandayan.</p><p></p><div class=\"subhead\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" section=\"A\" zone=\"Delhi\"><p>‘No case filed’</p></div><p>Ms. Geetha Jeevan alleged that no case was filed against the Srivaikuntam MLA of the TVK even after a woman made charges of sexual assault. “If a matter involves TVK members, no action is taken. If it involves the DMK, an immediate arrest is made. This is suppression and authoritarianism,” she added.</p><p></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 21, "title": "Suvendu tables police firing report, blames Mamata for ‘inaction’", "section": "Regional", "page": "4", "teaser": "West Bengal Chief Minister Suvendu Adhikari on Monday tabled in the Assembly an inquiry panel report on the 1993 police firing, which killed 13 Indian Youth Con...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tSuvendu tables police firing report, blames Mamata for ‘inaction’\n</h1><div class=\"author\"><div class=\"author-name\">The Hindu Bureau</div></div><div class=\"dateLine\"><div class=\"dateline\">Kolkata</div></div><div class=\"article-picture\"><div class=\"picture verticle\"><img alt=\"Suvendu tables police firing report, blames Mamata for ‘inaction’\" class=\"lazy\" data-device-variant=\"FREE~FREE~FREE~FREE\" data-src-template=\"https://eimg.thgim.com/ccidist-ws/th/th_delhi/issues/195330/OPS/Public/GCQG9E8BQ.1+G6EG9G4CG.1.jpg\" src=\"../images/ch0022_001.jpg\" title=\"Suvendu tables police firing report, blames Mamata for ‘inaction’\"/></div><figcaption class=\"caption\">\n                                \n  \n   \n    CM Suvendu Adhikari\n   \n  \n \n                            </figcaption></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p><span class=\"TypographyTag1\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" multiline=\"2\" section=\"A\" zone=\"Delhi\"><span class=\"TypographyTag11\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" multiline=\"2\" section=\"A\" zone=\"Delhi\">West Bengal Chief Minister Suvendu Adhikari on Monday tabled in the Assembly an inquiry panel report on the 1993 police firing, which killed 13 Indian Youth Congress supporters.</span></span></p><p><span class=\"TypographyTag1\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" multiline=\"2\" section=\"A\" zone=\"Delhi\"><span class=\"TypographyTag11\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" multiline=\"2\" section=\"A\" zone=\"Delhi\">Tabling the Justice (retd.) Sushanta Chatterjee Commission report a day ahead of the Trinamool Congress’s (TMC) July 21 annual Martyrs’ Day rally, which commemorates all those killed in the incident over three decades ago, Mr. Adhikari said, Ms. Banerjee neither implemented several key recommendations of the panel nor made its report public despite receiving it in 2014.</span></span></p><p><span class=\"TypographyTag1\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" multiline=\"2\" section=\"A\" zone=\"Delhi\">The commission was set up by former Chief Minister Mamata Banerjee after she came to power in 2011. Ms. Banerjee, a Youth Congress leader at the time of the incident, was also injured in the police action. </span></p><p><span class=\"TypographyTag1\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" multiline=\"2\" section=\"A\" zone=\"Delhi\">The report was made public on the eve of Martyrs’ Day rally, when the rival factions of the TMC will hold separate rallies in Kolkata. </span></p><p>“The commission recommended ₹25 lakh as compensation for the family of each person killed and ₹5 lakh for every injured person,” Mr. Adhikari said. The families of those killed received only ₹2 lakh and the injured ₹15,000, the Chief Minister alleged.</p><p></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 22, "title": "HC orders CID probe into ashram school sexual assault case", "section": "Regional", "page": "4", "teaser": "The Bombay High Court’s Kolhapur Circuit Bench has transferred the investigation into the 2025 sexual assault of a minor girl at an ashram school in Ratnagiri d...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tHC orders CID probe into ashram school sexual assault case\n</h1><div class=\"author\"><div class=\"author-name\">Chinmay Gaikwad</div></div><div class=\"dateLine\"><div class=\"dateline\">MUMBAI</div></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>The Bombay High Court’s Kolhapur Circuit Bench has transferred the investigation into the 2025 sexual assault of a minor girl at an ashram school in Ratnagiri district to the State Criminal Investigation Department (CID). The court also expressed concerns over the shoddy investigation and the handling of the case by the police.</p><p>The Division Bench of Justices Vrushali Joshi and Sandesh Patil passed the order on July 13, with a copy made available on Monday.</p><p>The parents of the victim had approached the court seeking transfer of the probe to an independent agency, alleging that the police probe was improper.</p><p>According to the complaint, the headmaster and a teacher of the Kolhapur residential school had inappropriately touched and physically assaulted the minor victim. The accused were booked under relevant provisions of the Bharatiya Nyaya Sanhita and the Protection of Children from Sexual Offences Act.</p><p>The court took note of two FIRs lodged against the accused. The Bench observed that the manner in which the police maintained the case diary did not meet professional standards, with the court noting that it consisted of loose sheets of paper.</p><p>The Superintendent of Police informed the court that a show-cause notice had been issued to the investigating officer.</p><p></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 23, "title": "UCC Bill in M.P. House; uproar over ‘land deals’ linked to CM", "section": "Regional", "page": "4", "teaser": "The Madhya Pradesh government on Monday introduced the draft Uniform Civil Code Bill, prohibiting polygamy and mandating the registration of marriages and divor...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tUCC Bill in M.P. House; uproar over ‘land deals’ linked to CM\n</h1><div class=\"article-picture\"><div class=\"picture verticle\"><img alt=\"UCC Bill in M.P. House; uproar over ‘land deals’ linked to CM\" class=\"lazy\" data-device-variant=\"FREE~FREE~FREE~FREE\" data-src-template=\"https://eimg.thgim.com/ccidist-ws/th/th_delhi/issues/195330/OPS/Public/GCQG9E8BQ.1+G6EG9G4CJ.1.jpg\" src=\"../images/ch0024_001.jpg\" title=\"UCC Bill in M.P. House; uproar over ‘land deals’ linked to CM\"/></div><figcaption class=\"caption\"></figcaption></div><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>The Madhya Pradesh government on Monday introduced the draft Uniform Civil Code Bill, prohibiting polygamy and mandating the registration of marriages and divorces for all faiths, in the Assembly even as the Congress created uproar over alleged land purchases linked to CM Mohan Yadav. Speaker Narendra Singh Tomar said the House would take up the Bill for discussion on Tuesday. The purported land purchase was raised in a newspaper report, which claimed that Mr. Yadav and his family members bought land parcels after he became the Chief Minister, a charge the BJP denied as baseless. <span class=\"tagline_contrib\" edition=\"EPaper\" layoutdesk=\"TH_Regional\" multiline=\"0\" section=\"A\" zone=\"Delhi\">PTI</span></p><p></p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle05, publisher: The HinduBusinessLine --></div><div class=\"articleblock-container\" id=\"arthardpv\"></div><div class=\"article-ad two-side text-ad print-hide\"><div class=\"ad-text\" id=\"artproduct2\" style=\"display: none;\"></div></div></div></div></div>"}, {"id": 24, "title": "MP Manoj Jha urges PM to stop demolitions at Jauhar varsity", "section": "Regional", "page": "4", "teaser": "The Uttar Pradesh government continues to face opposition over the proposed demolition of 38 out of 40 buildings at Mohammad Ali Jauhar University in Rampur, wi...", "body": "<div class=\"row justify-content-end\"><div class=\"col-xl-9 col-lg-8 col-md-12 col-sm-12 col-12\"><h1 class=\"title\" itemprop=\"name\" style=\"font-family: 'Merriweather', serif; font-weight: bold;\">\n\tMP Manoj Jha urges PM to stopdemolitions at Jauhar varsity\n</h1><div class=\"articlebodycontent col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12\" id=\"content-body-\"><p>The Uttar Pradesh government continues to face opposition over the proposed demolition of 38 out of 40 buildings at Mohammad Ali Jauhar University in Rampur, with Rajya Sabha member Manoj Kumar Jha on Monday writing to Prime Minister Narendra Modi, seeking his immediate intervention to halt any such move. Mr. Jha said such an action would, for all practical purposes, amount to demolishing a functioning university created under State legislation and currently serving 3,000 students. “Should this action be allowed to proceed, it will be remembered as a blot in the history of 21st century India,” he said.</p><div class=\"d-none d-lg-block d-xl-block\"><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead middleonead\" data-devicetype=\"large\" data-size=\"[728, 90]\" data-unit=\"/22390678/TH_Desktop_AT_Mid01\" id=\"Desktop_AT_Mid01\" style=\"{ minHeight: ‘90px’}\"></div><!-- End DFP : /22390678/TH_Desktop_AT_Mid01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"large\" data-size=\"[1, 1]\" data-unit=\"/22390678/Hindu_Desktop_Inarticle_1x1\" id=\"Desktop_Inarticle_1x1\" style=\"{ minHeight: ‘250px’}\"></div><!-- End DFP : /22390678/Hindu_Desktop_Inarticle_1x1, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid03, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid04, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_Desktop_AT_Mid05, publisher: The HinduBusinessLine --></div><div class=\"d-block d-sm-none\"><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><div class=\"dfp-ad articleinlinead\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_MWeb_AT_Middle01\" id=\"MWeb_AT_Middle01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_MWeb_AT_Middle01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><div class=\"dfp-ad\" data-devicetype=\"small\" data-size=\"[[300,250],[336,280],[200,200],[250,250],[300,300]]\" data-unit=\"/22390678/TH_Mweb_AT_Bottom01\" id=\"Mweb_AT_Bottom01\" style=\"{ minHeight: ‘330px’}\"></div><!-- End DFP : /22390678/TH_Mweb_AT_Bottom01, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- End DFP : /22390678/TH_MWeb_AT_Middle02, publisher: The HinduBusinessLine --><!-- Begin DFP : /22390678/TH_MWeb_AT_Middle03, p
